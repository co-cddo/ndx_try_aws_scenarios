# Build and publish Minute container images to ghcr.io
#
# Builds three images in parallel (matrix):
# - ghcr.io/co-cddo/ndx_try_aws_scenarios-minute_frontend:latest
# - ghcr.io/co-cddo/ndx_try_aws_scenarios-minute_backend:latest
# - ghcr.io/co-cddo/ndx_try_aws_scenarios-minute_worker:latest

name: Build Minute Container Images

on:
  push:
    branches: [main]
    paths:
      - 'cloudformation/scenarios/minute/docker/**'
      - '.github/workflows/docker-build-minute.yml'
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push images to registry'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: minute_frontend
            context: cloudformation/scenarios/minute/docker/frontend
            dockerfile: cloudformation/scenarios/minute/docker/frontend/Dockerfile
          - image: minute_backend
            context: cloudformation/scenarios/minute/docker/backend
            dockerfile: cloudformation/scenarios/minute/docker/backend/Dockerfile
          - image: minute_worker
            context: cloudformation/scenarios/minute/docker/worker
            dockerfile: cloudformation/scenarios/minute/docker/worker/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/co-cddo/ndx_try_aws_scenarios-${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.push_image != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          platforms: linux/amd64

      - name: Output image details
        run: |
          echo "## ${{ matrix.image }} Image Built" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
