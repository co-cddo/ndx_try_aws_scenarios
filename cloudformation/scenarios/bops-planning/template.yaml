{
  "Description": "BOPS Planning System - NDX:Try Demonstration Environment",
  "Parameters": {
    "OSVectorTilesApiKey": {
      "Type": "String",
      "Description": "Ordnance Survey Vector Tiles API key",
      "NoEcho": true
    },
    "AdminPassword": {
      "Type": "String",
      "Description": "BOPS admin password (leave blank to auto-generate)",
      "Default": ""
    }
  },
  "Resources": {
    "PasswordGeneratorRole": {
      "Type": "AWS::IAM::Role",
      "Properties": {
        "RoleName": {
          "Fn::Join": ["-", ["InnovationSandbox-ndx-Pwd", { "Fn::Select": [2, { "Fn::Split": ["/", { "Ref": "AWS::StackId" }] }] }]]
        },
        "AssumeRolePolicyDocument": {
          "Version": "2012-10-17",
          "Statement": [{ "Effect": "Allow", "Principal": { "Service": "lambda.amazonaws.com" }, "Action": "sts:AssumeRole" }]
        },
        "ManagedPolicyArns": ["arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"]
      }
    },
    "PasswordGeneratorFunction": {
      "Type": "AWS::Lambda::Function",
      "Properties": {
        "Runtime": "python3.12",
        "Handler": "index.handler",
        "Timeout": 30,
        "Role": { "Fn::GetAtt": ["PasswordGeneratorRole", "Arn"] },
        "Code": {
          "ZipFile": "import cfnresponse, string, secrets\ndef handler(event, context):\n  if event['RequestType'] == 'Delete':\n    cfnresponse.send(event, context, cfnresponse.SUCCESS, {})\n    return\n  pwd = ''.join(secrets.choice(string.ascii_letters + string.digits) for _ in range(16))\n  cfnresponse.send(event, context, cfnresponse.SUCCESS, {'Password': pwd})\n"
        }
      }
    },
    "GeneratedPassword": {
      "Type": "AWS::CloudFormation::CustomResource",
      "Condition": "GeneratePassword",
      "Properties": {
        "ServiceToken": { "Fn::GetAtt": ["PasswordGeneratorFunction", "Arn"] }
      }
    },
