  # Lambda Function - Chatbot Handler (Amazon Nova Pro with Guardrails)
  ChatbotFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ndx-try-chatbot-handler-${AWS::Region}'
      Description: Council chatbot using Amazon Nova Pro with Guardrails
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt ChatbotRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          KNOWLEDGE_BUCKET: !Ref KnowledgeBaseBucket
          ENVIRONMENT: !Ref Environment
          BEDROCK_MODEL_ID: amazon.nova-pro-v1:0
          GUARDRAIL_ID: !GetAtt CouncilGuardrail.GuardrailId
          GUARDRAIL_VERSION: !GetAtt CouncilGuardrailVersion.Version
      Code:
        ZipFile: |
          import json, os, boto3
          from datetime import datetime

          bedrock = boto3.client('bedrock-runtime')
          s3 = boto3.client('s3')

          BUCKET = os.environ.get('KNOWLEDGE_BUCKET', '')
          GUARDRAIL_ID = os.environ.get('GUARDRAIL_ID', '')
          GUARDRAIL_VERSION = os.environ.get('GUARDRAIL_VERSION', '')
          MODEL_ID = os.environ.get('BEDROCK_MODEL_ID', 'amazon.nova-pro-v1:0')

          _docs_cache = None

          def load_documents():
              global _docs_cache
              if _docs_cache is not None:
                  return _docs_cache
              try:
                  resp = s3.list_objects_v2(Bucket=BUCKET, Prefix='documents/')
                  docs = []
                  for obj in resp.get('Contents', []):
                      if obj['Key'].endswith('.txt'):
                          body = s3.get_object(Bucket=BUCKET, Key=obj['Key'])['Body'].read().decode('utf-8')
                          docs.append(body)
                  _docs_cache = '\n\n---\n\n'.join(docs)
                  print(f'Loaded {len(docs)} documents')
                  return _docs_cache
              except Exception as e:
                  print(f'Doc load error: {e}')
                  _docs_cache = ''
                  return ''

          SYSTEM_PROMPT_TEMPLATE = """You are a helpful UK local council service assistant for Sample Council.
          You help residents with council services including waste collection, council tax,
          planning, housing, parking, roads, and general enquiries.
          Keep responses concise (under 200 words), friendly, and helpful.
          Use bullet points for readability. Include contact details where appropriate.
          If you don't know specific details, suggest contacting the council directly.
          Use ONLY the following council documents to answer questions. If the answer is not
          in the documents, say you don't have that specific information and suggest contacting
          the council directly.

          COUNCIL DOCUMENTS:
          {documents}"""

          def get_response(user_message, history=None):
              try:
                  documents = load_documents()
                  system_text = SYSTEM_PROMPT_TEMPLATE.format(documents=documents)
                  messages = []
                  if history:
                      for msg in history[-10:]:
                          role = 'assistant' if msg.get('role') == 'assistant' else 'user'
                          text = msg.get('text', '')
                          if text:
                              messages.append({"role": role, "content": [{"text": text}]})
                  # Strip leading assistant messages (Converse API requires user-first)
                  while messages and messages[0]['role'] != 'user':
                      messages.pop(0)
                  messages.append({"role": "user", "content": [{"text": user_message}]})
                  params = {
                      "modelId": MODEL_ID,
                      "messages": messages,
                      "system": [{"text": system_text}],
                      "inferenceConfig": {"maxTokens": 1024, "temperature": 0.7}
                  }
                  if GUARDRAIL_ID and GUARDRAIL_VERSION:
                      params["guardrailConfig"] = {
                          "guardrailIdentifier": GUARDRAIL_ID,
                          "guardrailVersion": GUARDRAIL_VERSION
                      }
                  response = bedrock.converse(**params)
                  guardrail_active = response.get('stopReason') == 'guardrail_intervened'
                  output_text = response['output']['message']['content'][0]['text']
                  return {'success': True, 'response': output_text, 'guardrail': guardrail_active}
              except Exception as e:
                  print(f"Bedrock error: {e}")
                  return {'success': False, 'error': str(e)}

          def get_topic_from_message(message):
              m = message.lower()
              if any(w in m for w in ['bin','waste','rubbish','recycling','collection']): return 'Bin Collections'
              if any(w in m for w in ['council tax','payment','bill','discount']): return 'Council Tax'
              if any(w in m for w in ['planning','application','build','extension','permission']): return 'Planning'
              if any(w in m for w in ['housing','rent','repair','home','accommodation']): return 'Housing'
              if any(w in m for w in ['parking','car park','permit','ticket']): return 'Parking'
              if any(w in m for w in ['pothole','road','highway','street','pavement','light']): return 'Roads & Highways'
              if any(w in m for w in ['contact','phone','email','hours','open']): return 'Contact Us'
              return 'General Enquiry'

          def render_chat_html():
              return '''<!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Council Chatbot Demo</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box}
          body{font-family:Arial,sans-serif;font-size:16px;line-height:1.5;color:#0b0c0c;background:#fff}
          .banner{background:#ffdd00;padding:12px 20px;text-align:center;font-weight:700;border-bottom:2px solid #0b0c0c}
          .header{background:#0b0c0c;color:#fff;padding:15px 20px;font-size:24px;font-weight:700}
          .container{max-width:1280px;margin:0 auto;padding:20px;display:flex;flex-direction:column;height:calc(100vh - 150px)}
          .messages{flex:1;overflow-y:auto;padding:20px 0;margin-bottom:10px}
          .message{margin-bottom:15px;display:flex;flex-direction:column;align-items:flex-start}
          .message.bot{align-items:flex-start}
          .message.user{align-items:flex-end}
          .topic-badge{background:#f3f2f1;color:#0b0c0c;padding:4px 8px;border-radius:4px;font-size:14px;font-weight:700;margin-bottom:6px;display:inline-block;border:1px solid #b1b4b6}
          .bubble{max-width:70%;padding:12px 16px;border-radius:8px;word-wrap:break-word;white-space:pre-wrap}
          .bot .bubble{background:#f3f2f1;color:#0b0c0c}
          .user .bubble{background:#1d70b8;color:#fff}
          .error-message{border:2px solid #d4351c;background:#f9e6e5}
          .error-message:before{content:"\\26A0\\FE0F ";margin-right:4px}
          .loading{display:flex;gap:4px;align-items:center;padding:12px 16px;background:#f3f2f1;border-radius:8px;max-width:70px}
          .loading span{width:8px;height:8px;background:#505a5f;border-radius:50%;animation:pulse 1.4s infinite ease-in-out both}
          .loading span:nth-child(1){animation-delay:-0.32s}
          .loading span:nth-child(2){animation-delay:-0.16s}
          @keyframes pulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
          .clear-btn{display:block;text-align:right;margin-bottom:10px;font-size:14px}
          .clear-btn button{background:transparent;border:none;color:#1d70b8;text-decoration:underline;cursor:pointer;font-size:14px;padding:4px 8px}
          .clear-btn button:hover{color:#003078}
          .clear-btn button:focus{outline:3px solid #ffdd00;outline-offset:0;background:#ffdd00;color:#0b0c0c}
          .sample-questions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
          .sample-question{background:#fff;border:2px solid #0b0c0c;color:#0b0c0c;padding:8px 12px;border-radius:4px;font-size:14px;cursor:pointer;font-family:Arial,sans-serif;line-height:1.3}
          .sample-question:hover{background:#f3f2f1}
          .sample-question:focus{outline:3px solid #ffdd00;outline-offset:0}
          .sample-question:disabled{background:#f3f2f1;color:#505a5f;cursor:not-allowed;border-color:#b1b4b6}
          .input-group{display:flex;gap:10px}
          .input-group label{position:absolute;left:-9999px}
          #userInput{flex:1;padding:12px;border:2px solid #0b0c0c;border-radius:4px;font-size:16px}
          #userInput:focus{outline:3px solid #ffdd00;outline-offset:0}
          #userInput:disabled{background:#f3f2f1;color:#505a5f;cursor:not-allowed}
          #sendBtn{background:#00703c;color:#fff;border:none;padding:12px 24px;border-radius:4px;font-size:16px;font-weight:700;cursor:pointer;min-width:100px}
          #sendBtn:hover:not(:disabled){background:#005a30}
          #sendBtn:focus{outline:3px solid #ffdd00;outline-offset:0}
          #sendBtn:disabled{background:#b1b4b6;cursor:not-allowed}
          .sr-only{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
          .meta{font-size:12px;color:#505a5f;margin-top:4px}
          @media(max-width:768px){
          .header{font-size:20px;padding:12px 15px}
          .container{padding:15px}
          .bubble{max-width:85%}
          #sendBtn{padding:12px 16px;min-width:80px}
          .sample-question{font-size:13px;padding:6px 10px}
          }
          @media(max-width:375px){
          .header{font-size:18px}
          .bubble{max-width:90%;font-size:14px}
          .sample-question{font-size:12px;padding:5px 8px}
          }
          </style>
          </head>
          <body>
          <div class="banner">Powered by Amazon Nova Pro with Bedrock Guardrails</div>
          <div class="header"><span style="font-size:14px;opacity:0.8">NDX:Try</span> Council Chatbot Demo</div>
          <div class="container">
          <div class="messages" id="messages" role="log" aria-live="polite" aria-atomic="false"></div>
          <div class="clear-btn"><button id="clearBtn" aria-label="Clear conversation history">Clear conversation</button></div>
          <div class="sample-questions" id="sampleQuestions"></div>
          <div class="input-group">
          <label for="userInput">Your question</label>
          <input type="text" id="userInput" placeholder="Type your question..." maxlength="500">
          <button id="sendBtn" aria-label="Send message">Send</button>
          </div>
          <div id="statusMsg" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
          </div>
          <script>
          var isProcessing=false;
          var loadingElement=null;
          var conversationKey='ndx-chatbot-conversation';
          var maxMessages=20;
          var sampleQuestionsList=["What are my bin collection days?","How do I pay council tax?","I want to apply for planning permission","How do I report a pothole?","What are your opening hours?","How do I get a parking permit?"];
          function getHistory(){try{var saved=sessionStorage.getItem(conversationKey);if(!saved)return[];var c=JSON.parse(saved);var h=[];for(var i=0;i<c.length;i++){var item=c[i];h.push({role:item.type==='user'?'user':'assistant',text:item.text})}return h.slice(-10)}catch(e){return[]}}
          function announceStatus(msg){document.getElementById('statusMsg').textContent=msg}
          function scrollToBottom(){var msgs=document.getElementById('messages');msgs.scrollTop=msgs.scrollHeight}
          function setInputDisabled(d){document.getElementById('userInput').disabled=d;var btn=document.getElementById('sendBtn');btn.disabled=d;btn.textContent=d?'Sending...':'Send';var sq=document.querySelectorAll('.sample-question');for(var i=0;i<sq.length;i++)sq[i].disabled=d}
          function focusInput(){document.getElementById('userInput').focus()}
          function showLoading(){var msg=document.createElement('div');msg.className='message bot';msg.id='loadingMsg';var l=document.createElement('div');l.className='loading';l.setAttribute('aria-label','Waiting for response');l.innerHTML='<span></span><span></span><span></span>';msg.appendChild(l);loadingElement=msg;document.getElementById('messages').appendChild(msg);scrollToBottom()}
          function hideLoading(){if(loadingElement&&loadingElement.parentNode){loadingElement.parentNode.removeChild(loadingElement);loadingElement=null}}
          function saveConversation(){try{var msgs=document.getElementById('messages').querySelectorAll('.message:not(#loadingMsg)');var c=[];for(var i=0;i<msgs.length;i++){var msg=msgs[i];var type=msg.classList.contains('user')?'user':'bot';var bubble=msg.querySelector('.bubble');if(!bubble)continue;var text=bubble.textContent;var topic=null;var badge=msg.querySelector('.topic-badge');if(badge)topic=badge.textContent;c.push({type:type,text:text,topic:topic})}if(c.length>maxMessages)c=c.slice(-maxMessages);sessionStorage.setItem(conversationKey,JSON.stringify(c))}catch(e){console.error('Save failed:',e)}}
          function loadConversation(){try{var saved=sessionStorage.getItem(conversationKey);if(!saved)return false;var c=JSON.parse(saved);var md=document.getElementById('messages');for(var i=0;i<c.length;i++){var item=c[i];var msg=document.createElement('div');msg.className='message '+item.type;if(item.type==='bot'&&item.topic){var badge=document.createElement('div');badge.className='topic-badge';badge.textContent=item.topic;msg.appendChild(badge)}var bubble=document.createElement('div');bubble.className='bubble';if(item.text.indexOf('Unable to connect')!==-1||item.text.indexOf('Request timed out')!==-1||item.text.indexOf('API error')!==-1)bubble.className='bubble error-message';bubble.textContent=item.text;msg.appendChild(bubble);md.appendChild(msg)}scrollToBottom();return true}catch(e){return false}}
          function clearConversation(){try{sessionStorage.removeItem(conversationKey);var md=document.getElementById('messages');md.innerHTML='';var w=document.createElement('div');w.className='message bot';var b=document.createElement('div');b.className='bubble';b.textContent="Hello! I'm the council chatbot. I can help with bin collections, council tax, planning, housing, parking, roads, and general enquiries. What would you like to know?";w.appendChild(b);md.appendChild(w);saveConversation();announceStatus('Conversation cleared');focusInput()}catch(e){console.error('Clear failed:',e)}}
          function addUserMessage(text){var msg=document.createElement('div');msg.className='message user';var b=document.createElement('div');b.className='bubble';b.textContent=text;msg.appendChild(b);document.getElementById('messages').appendChild(msg);scrollToBottom();saveConversation()}
          function displayBotResponse(data){var msg=document.createElement('div');msg.className='message bot';if(data.topic){var badge=document.createElement('div');badge.className='topic-badge';badge.textContent=data.topic;msg.appendChild(badge)}var b=document.createElement('div');b.className='bubble';b.textContent=data.response;msg.appendChild(b);if(data.guardrail){var meta=document.createElement('div');meta.className='meta';meta.textContent='guardrail active';msg.appendChild(meta)}document.getElementById('messages').appendChild(msg);scrollToBottom();announceStatus('Response received: '+data.topic);saveConversation()}
          function displayError(e){var msg=document.createElement('div');msg.className='message bot';var b=document.createElement('div');b.className='bubble error-message';b.textContent=e;msg.appendChild(b);document.getElementById('messages').appendChild(msg);scrollToBottom();announceStatus('Error: '+e);saveConversation()}
          async function sendMessage(text){if(isProcessing||!text.trim())return;isProcessing=true;try{setInputDisabled(true);announceStatus('Sending message');var hist=getHistory();addUserMessage(text);showLoading();var controller=new AbortController();var tid=setTimeout(function(){controller.abort()},30000);var response=await fetch(window.location.href,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,history:hist}),signal:controller.signal});clearTimeout(tid);hideLoading();if(!response.ok){var ed;try{ed=await response.json();displayError(ed.error||'API error: '+response.status)}catch(e){displayError('API error: '+response.status)}return}var data=await response.json();if(data.error){displayError(data.error)}else{displayBotResponse(data)}}catch(error){hideLoading();if(error.name==='AbortError'){displayError('Request timed out. Please try again.')}else{displayError('Unable to connect. Please try again.')}}finally{isProcessing=false;setInputDisabled(false);focusInput()}}
          function handleSend(){var input=document.getElementById('userInput');var text=input.value.trim();if(text&&!isProcessing){input.value='';sendMessage(text)}}
          function renderSampleQuestions(){var c=document.getElementById('sampleQuestions');for(var i=0;i<sampleQuestionsList.length;i++){var btn=document.createElement('button');btn.className='sample-question';btn.textContent=sampleQuestionsList[i];btn.setAttribute('aria-label','Send this question: '+sampleQuestionsList[i]);btn.onclick=(function(q){return function(){if(!isProcessing)sendMessage(q)}})(sampleQuestionsList[i]);c.appendChild(btn)}}
          window.onload=function(){var has=loadConversation();if(!has){var w=document.createElement('div');w.className='message bot';var b=document.createElement('div');b.className='bubble';b.textContent="Hello! I'm the council chatbot. I can help with bin collections, council tax, planning, housing, parking, roads, and general enquiries. What would you like to know?";w.appendChild(b);document.getElementById('messages').appendChild(w);saveConversation()}renderSampleQuestions();focusInput()};
          document.getElementById('sendBtn').onclick=handleSend;
          document.getElementById('clearBtn').onclick=clearConversation;
          document.getElementById('userInput').onkeypress=function(e){if(e.key==='Enter'&&!isProcessing)handleSend()};
          </script>
          </body>
          </html>'''

          def lambda_handler(event, context):
              try:
                  method = event.get('requestContext', {}).get('http', {}).get('method', 'GET')
                  if method == 'GET':
                      return {'statusCode': 200, 'headers': {'Content-Type': 'text/html'}, 'body': render_chat_html()}

                  body = json.loads(event['body']) if isinstance(event.get('body'), str) else event.get('body', event)
                  user_message = body.get('message', body.get('query', '')).strip()
                  if not user_message:
                      return {'statusCode': 400, 'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'error': 'Message is required'})}

                  history = body.get('history', [])
                  result = get_response(user_message, history or None)
                  topic = get_topic_from_message(user_message)

                  if not result.get('success'):
                      return {'statusCode': 500, 'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'error': f"AI service error: {result.get('error', 'Unknown')}"})}

                  return {
                      'statusCode': 200,
                      'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'},
                      'body': json.dumps({
                          'success': True, 'response': result['response'], 'topic': topic,
                          'query': body.get('message', body.get('query', '')),
                          'timestamp': datetime.utcnow().isoformat(),
                          'model': 'Amazon Nova Pro', 'guardrail': result.get('guardrail', False)
                      })
                  }
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {'statusCode': 500, 'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'error': str(e)})}
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: council-chatbot

  # Lambda Function URL
  ChatbotFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt ChatbotFunction.Arn
      Cors:
        AllowCredentials: false
        AllowHeaders:
          - content-type
          - x-session-id
        AllowMethods:
          - POST
          - GET
        AllowOrigins:
          - '*'
        MaxAge: 86400

  ChatbotFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ChatbotFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  # Permission for public invocation (required since Oct 2025)
  ChatbotFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ChatbotFunction
      Action: lambda:InvokeFunction
      Principal: '*'
      InvokedViaFunctionUrl: true

  # CloudWatch Log Group
  ChatbotLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ChatbotFunction}'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: council-chatbot

Outputs:
  ChatbotURL:
    Description: Web interface URL to interact with the chatbot
