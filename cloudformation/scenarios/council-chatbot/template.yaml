AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  NDX:Try - Council Chatbot Scenario (Sandbox)
  AI-powered resident Q&A with Bedrock Knowledge Base, Guardrails, and RAG retrieval.
  Version: 3.0.0

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Scenario Configuration
        Parameters:
          - Environment
          - KnowledgeBaseSource

Parameters:
  Environment:
    Type: String
    Default: sandbox
    AllowedValues:
      - sandbox
      - development
      - production
    Description: Deployment environment

  KnowledgeBaseSource:
    Type: String
    Default: council-sample-data
    Description: Knowledge base source for chatbot

Resources:
  # S3 Bucket for Knowledge Base
  KnowledgeBaseBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ndx-try-chatbot-kb-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: council-chatbot
        - Key: AutoCleanup
          Value: 'true'

  # S3 Vectors storage for Knowledge Base embeddings
  KnowledgeBaseVectorBucket:
    Type: AWS::S3Vectors::VectorBucket
    DeletionPolicy: Delete
    Properties:
      VectorBucketName: !Sub 'ndx-try-chatbot-vectors-${AWS::AccountId}-${AWS::Region}'

  KnowledgeBaseVectorIndex:
    Type: AWS::S3Vectors::Index
    DeletionPolicy: Delete
    DependsOn: KnowledgeBaseVectorBucket
    Properties:
      VectorBucketName: !Sub 'ndx-try-chatbot-vectors-${AWS::AccountId}-${AWS::Region}'
      IndexName: council-kb-index
      DataType: float32
      Dimension: 1024
      DistanceMetric: cosine

  # Bedrock Guardrail for content safety
  CouncilGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Sub 'ndx-try-council-guardrail-${AWS::Region}'
      Description: Content safety guardrail for council chatbot
      BlockedInputMessaging: >-
        I'm sorry, I can only help with council service enquiries such as
        bin collections, council tax, planning applications, housing, and
        parking. How can I help you with a council service today?
      BlockedOutputsMessaging: >-
        I apologise, but I'm unable to provide that information. I can help
        with council services such as waste collection, council tax, planning,
        housing, parking, and road maintenance. What council service can I
        assist you with?
      ContentPolicyConfig:
        FiltersConfig:
          - Type: HATE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: INSULTS
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: SEXUAL
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: VIOLENCE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: MISCONDUCT
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: PROMPT_ATTACK
            InputStrength: HIGH
            OutputStrength: NONE
      TopicPolicyConfig:
        TopicsConfig:
          - Name: PoliticalOpinions
            Definition: >-
              Political party views, voting recommendations, commentary on
              government policy, partisan political advice
            Type: DENY
            Examples:
              - "Which party should I vote for in the local elections?"
              - "What do you think of the government's housing policy?"
              - "Is the Conservative or Labour party better for local councils?"
          - Name: MedicalLegalAdvice
            Definition: >-
              Medical diagnoses, legal counsel, medication recommendations,
              treatment advice
            Type: DENY
            Examples:
              - "Can you diagnose why I've been feeling unwell?"
              - "Should I sue my landlord?"
              - "What medication should I take for my condition?"
          - Name: NonCouncilTopics
            Definition: >-
              Entertainment, sports, recipes, general knowledge trivia,
              celebrity gossip, and other topics unrelated to council services
            Type: DENY
            Examples:
              - "What's a good recipe for chocolate cake?"
              - "Who won the football last night?"
              - "Tell me a joke"
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: NAME
            Action: ANONYMIZE
          - Type: EMAIL
            Action: ANONYMIZE
          - Type: PHONE
            Action: ANONYMIZE
          - Type: ADDRESS
            Action: ANONYMIZE
          - Type: UK_NATIONAL_INSURANCE_NUMBER
            Action: BLOCK
          - Type: UK_NATIONAL_HEALTH_SERVICE_NUMBER
            Action: BLOCK
          - Type: UK_UNIQUE_TAXPAYER_REFERENCE_NUMBER
            Action: BLOCK
          - Type: CREDIT_DEBIT_CARD_NUMBER
            Action: BLOCK
      WordPolicyConfig:
        ManagedWordListsConfig:
          - Type: PROFANITY
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: council-chatbot

  # Guardrail Version
  CouncilGuardrailVersion:
    Type: AWS::Bedrock::GuardrailVersion
    Properties:
      GuardrailIdentifier: !GetAtt CouncilGuardrail.GuardrailArn

  # IAM Role for Bedrock Knowledge Base service
  KnowledgeBaseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'InnovationSandbox-ndx-chatbot-kb-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                AWS:SourceArn: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*'
      Policies:
        - PolicyName: BedrockModelAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:ListFoundationModels
                  - bedrock:ListCustomModels
                Resource: '*'
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0'
        - PolicyName: S3DataSourceAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt KnowledgeBaseBucket.Arn
                Condition:
                  StringEquals:
                    aws:ResourceAccount: !Ref AWS::AccountId
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub '${KnowledgeBaseBucket.Arn}/*'
                Condition:
                  StringEquals:
                    aws:ResourceAccount: !Ref AWS::AccountId
        - PolicyName: S3VectorsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3vectors:PutVectors
                  - s3vectors:GetVectors
                  - s3vectors:DeleteVectors
                  - s3vectors:QueryVectors
                  - s3vectors:GetIndex
                Resource: !Sub 'arn:aws:s3vectors:${AWS::Region}:${AWS::AccountId}:bucket/ndx-try-chatbot-vectors-${AWS::AccountId}-${AWS::Region}/index/council-kb-index'
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: council-chatbot

  # Bedrock Knowledge Base with S3 Vectors storage
  CouncilKnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    DependsOn:
      - KnowledgeBaseRole
      - KnowledgeBaseVectorIndex
    Properties:
      Name: !Sub 'ndx-try-council-kb-${AWS::Region}'
      Description: Council service documents for RAG retrieval
      RoleArn: !GetAtt KnowledgeBaseRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0'
      StorageConfiguration:
        Type: S3_VECTORS
        S3VectorsConfiguration:
          IndexArn: !GetAtt KnowledgeBaseVectorIndex.IndexArn
      Tags:
        Project: ndx-try
        Scenario: council-chatbot

  # S3 Data Source for Knowledge Base
  CouncilDataSource:
    Type: AWS::Bedrock::DataSource
    DependsOn: CouncilKnowledgeBase
    Properties:
      Name: council-documents
      KnowledgeBaseId: !Ref CouncilKnowledgeBase
      DataDeletionPolicy: DELETE
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !GetAtt KnowledgeBaseBucket.Arn
          InclusionPrefixes:
            - 'documents/'

  # Seed Data Lambda Role
  SeedDataRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'InnovationSandbox-ndx-chatbot-seed-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Write
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt KnowledgeBaseBucket.Arn
                  - !Sub '${KnowledgeBaseBucket.Arn}/*'
        - PolicyName: BedrockIngestion
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:StartIngestionJob
                  - bedrock:GetIngestionJob
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*'
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: council-chatbot

  # Seed Data Lambda Function
  SeedDataFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ndx-try-chatbot-seed-data-${AWS::Region}'
      Description: Seeds sample council documents into S3 bucket
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SeedDataRole.Arn
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          BUCKET_NAME: !Ref KnowledgeBaseBucket
          KB_ID: !Ref CouncilKnowledgeBase
          DS_ID: !GetAtt CouncilDataSource.DataSourceId
      Code:
        ZipFile: |
          import json, boto3, urllib.request, os, time

          s3 = boto3.client('s3')

          DOCUMENTS = {
            "waste-collection-guide.txt": """SAMPLE COUNCIL - WASTE COLLECTION AND RECYCLING GUIDE

          Bin Collection Schedule
          Your bins are collected on a regular schedule based on your area. To find your exact collection day, enter your postcode on our website or contact us.

          General Waste (Black Bin) - Collected WEEKLY every Monday
          Place your black bin at the kerbside by 7am on collection day. The bin must have the lid fully closed. We will not collect overflowing bins.
          Accepted: general household waste, nappies, pet waste (bagged), broken crockery, vacuum cleaner contents.
          Not accepted: garden waste, electrical items, batteries, paint, chemicals, building rubble.

          Recycling (Blue Bin) - Collected FORTNIGHTLY on Thursdays (odd weeks)
          Clean and dry recyclables only. Do not bag items - place them loose in the bin.
          Accepted: paper, cardboard (flattened), plastic bottles and tubs, tin cans, aluminium foil (clean), glass bottles and jars, aerosol cans (empty), food and drink cartons.
          Not accepted: plastic bags, cling film, polystyrene, nappies, food waste, textiles, electrical items.

          Garden Waste (Green Bin) - Collected FORTNIGHTLY on Thursdays (even weeks)
          This is an opt-in service costing 35 pounds per year. Register on our website or call 01234-567-890.
          Accepted: grass cuttings, hedge trimmings, weeds, leaves, small branches (under 10cm diameter), flowers, plants.
          Not accepted: soil, stones, treated wood, animal waste, food waste, plastic pots.

          Bulky Waste Collection
          We collect large household items for a fee. Book online or by phone.
          - 1-3 items: 25 pounds
          - 4-6 items: 45 pounds
          Items collected: furniture, mattresses, carpets, appliances (not fridges/freezers).

          Household Waste Recycling Centre
          Location: Riverside Industrial Estate, Sample Road, SM1 2AB
          Opening hours: Monday to Saturday 8am-6pm, Sunday 9am-4pm
          Proof of address required. Cars and small vans only (permit needed for larger vehicles).

          Missed Collections
          Report a missed collection within 2 working days. We will return within 3 working days.
          Phone: 01234-567-890
          Online: www.samplecouncil.gov.uk/missed-collection

          Christmas Collection Changes
          Collections may change during the Christmas period. Revised schedules are published in December on our website and in the local press.

          Contaminated Bins
          If your recycling bin contains non-recyclable items, we will leave a tag explaining why it was not collected. Remove the contamination and present the bin on your next collection day.

          Contact: waste@samplecouncil.gov.uk or 01234-567-890""",

            "council-tax-guide.txt": """SAMPLE COUNCIL - COUNCIL TAX GUIDE 2024-25

          What is Council Tax?
          Council tax is a local tax on domestic properties to fund local services including schools, police, fire service, roads, libraries, and waste collection.

          Council Tax Bands and Charges 2024-25
          Band A: 1,198.42 pounds (properties valued up to 40,000 pounds in 1991)
          Band B: 1,398.16 pounds (40,001 to 52,000 pounds)
          Band C: 1,597.90 pounds (52,001 to 68,000 pounds)
          Band D: 1,797.63 pounds (68,001 to 88,000 pounds)
          Band E: 2,197.10 pounds (88,001 to 120,000 pounds)
          Band F: 2,596.58 pounds (120,001 to 160,000 pounds)
          Band G: 2,996.05 pounds (160,001 to 320,000 pounds)
          Band H: 3,595.26 pounds (over 320,000 pounds)

          How to Pay
          - Direct Debit: Set up online or by phone. Pay over 10 or 12 monthly instalments.
          - Online: Pay by debit or credit card at www.samplecouncil.gov.uk/pay
          - Phone: Call 01234-567-891 (automated 24-hour line)
          - Bank transfer: Sort code 12-34-56, Account 12345678, Reference: your council tax account number
          - Post Office or PayPoint: Take your bill to any branch

          Discounts and Exemptions
          - Single Person Discount: 25% reduction if only one adult lives in the property. Apply online or by phone.
          - Student Exemption: Properties occupied only by full-time students are exempt. Provide student certificates from your institution.
          - Disabled Band Reduction: If your property has been adapted for a disabled person, you may qualify for a reduction to the next lower band.
          - Empty Properties: A 100% charge applies to unfurnished empty properties after 2 years, and a 200% premium after 5 years.
          - Second Homes: 100% council tax premium applies from April 2025.

          Council Tax Support (Reduction)
          If you are on a low income or receiving benefits, you may qualify for council tax support of up to 100%. Apply online at www.samplecouncil.gov.uk/cts or collect a form from the council offices.

          Moving Home
          Tell us when you move so we can adjust your bill. You are liable for council tax at your new address from the date you move in. Contact us within 21 days.

          Challenging Your Band
          If you believe your property is in the wrong band, contact the Valuation Office Agency (VOA) at www.voa.gov.uk.

          Contact: counciltax@samplecouncil.gov.uk or 01234-567-891""",

            "planning-applications-guide.txt": """SAMPLE COUNCIL - PLANNING APPLICATIONS GUIDE

          Do I Need Planning Permission?
          You need planning permission for most building work, changes of use, and alterations that affect the external appearance of a building. Some minor works are covered by Permitted Development rights.

          Works that usually NEED planning permission:
          - Building a new house or flat
          - Extensions beyond permitted development limits
          - Changing the use of a building (e.g. house to flats, shop to restaurant)
          - Building in a conservation area or on listed buildings
          - Installing large solar panels facing a road
          - Building a wall or fence over 2 metres high

          Works that usually DO NOT need planning permission (Permitted Development):
          - Small rear extensions (up to 3m for semi-detached, 4m for detached since 2019)
          - Loft conversions within certain limits
          - Internal alterations (unless listed building)
          - Garden sheds and outbuildings under 2.5m height
          - Fences under 2 metres (1 metre next to a highway)
          - Solar panels (not on a listed building)

          How to Apply
          1. Check if you need permission: Use our online tool or speak to our planning team
          2. Pre-application advice: We offer paid pre-application advice (150 pounds for householder, 500 pounds for major). Book at www.samplecouncil.gov.uk/planning
          3. Submit your application: Apply online at www.planningportal.co.uk
          4. Application fees: Householder applications 258 pounds; full applications vary by type

          What Happens Next
          - Validation: We check your application is complete (5 working days)
          - Consultation: Neighbours and statutory consultees are notified (21 days)
          - Assessment: Planning officer assesses against local and national policy
          - Decision: Most applications decided within 8 weeks (householder) or 13 weeks (major)
          - You will receive a decision notice by email

          Planning Enforcement
          If you believe someone has carried out work without planning permission, report it to us. We investigate all reports. Call 01234-567-892 or email planning.enforcement@samplecouncil.gov.uk.

          Building Control
          Building regulations approval is separate from planning permission. You may need both. Contact building.control@samplecouncil.gov.uk or 01234-567-893.

          Contact: planning@samplecouncil.gov.uk or 01234-567-892""",

            "housing-services-guide.txt": """SAMPLE COUNCIL - HOUSING SERVICES GUIDE

          Council Housing
          We manage approximately 8,500 council homes across the borough. Our tenants benefit from secure tenancies, affordable rents, and a responsive repairs service.

          Housing Register (Waiting List)
          To apply for council housing, you must join the housing register. Applications are assessed using a banding system:
          - Band A (Emergency): Fleeing domestic abuse, severe overcrowding, demolition orders
          - Band B (High Priority): Homeless households, medical needs requiring a move, overcrowded by 2+ bedrooms
          - Band C (Medium Priority): Overcrowded by 1 bedroom, sharing facilities
          - Band D (Low Priority): Adequately housed but wanting to move
          Apply online at www.samplecouncil.gov.uk/housing-register. Average waiting time varies by band and property size (Band B: 12-18 months for a 2-bed; Band D: 3-5 years).

          Reporting Repairs
          Emergency repairs (24-hour): 01234-567-800 (gas leaks, burst pipes, no heating in winter, broken external door locks)
          Urgent repairs (3 working days): Partial heating failure, toilet not flushing, leaking roof
          Routine repairs (20 working days): Dripping taps, broken cupboard doors, cracked tiles
          Report online: www.samplecouncil.gov.uk/repairs

          Homelessness and Housing Advice
          If you are homeless or at risk of homelessness, contact us immediately. We have a legal duty to help.
          - Housing Options Team: 01234-567-801 (Mon-Fri 9am-5pm)
          - Out of hours emergency: 01234-567-802
          - Drop-in: Housing Centre, High Street, SM1 1AA (Mon-Fri 9am-4pm, no appointment needed)

          Right to Buy
          If you have been a council tenant for 3+ years, you may be eligible to buy your home at a discount (up to 87,200 pounds for houses, 116,200 pounds for flats in 2024-25). Contact us for an application form.

          Private Sector Housing
          We inspect private rented properties for hazards and can take enforcement action against landlords who fail to maintain safe conditions.

          Contact: housing@samplecouncil.gov.uk or 01234-567-801""",

            "parking-services-guide.txt": """SAMPLE COUNCIL - PARKING SERVICES GUIDE

          Resident Parking Permits
          Annual permits are available for residents in controlled parking zones:
          - First permit: 50 pounds per year
          - Second permit: 100 pounds per year
          - Third permit: Not available (maximum 2 per household)
          - Visitor permits: 1 pound per day (book of 20 for 20 pounds)
          Apply online: www.samplecouncil.gov.uk/parking-permits
          Processing time: 5-10 working days

          Council Car Parks
          Town Centre Multi-Storey (200 spaces): Up to 1 hour 1.50 pounds, up to 3 hours 3.50 pounds, all day 7 pounds
          High Street Surface Car Park (80 spaces): Up to 1 hour 1 pound, up to 3 hours 2.50 pounds, all day 5 pounds
          Railway Station Car Park (150 spaces): All day 8 pounds, season ticket 120 pounds/month
          Free parking after 6pm and all day Sunday in all council car parks.
          Pay by phone: Download the RingGo app or call 01onal number on the machine.

          Penalty Charge Notices (PCNs)
          If you receive a PCN, you have 28 days to pay or challenge it.
          - Higher rate (e.g. parking on double yellow lines): 70 pounds (35 pounds if paid within 14 days)
          - Lower rate (e.g. expired ticket): 50 pounds (25 pounds if paid within 14 days)
          Challenge a PCN: Write to parking.challenges@samplecouncil.gov.uk within 28 days with evidence.

          Blue Badge Holders
          Blue badge holders can park free in all council car parks and on single yellow lines for up to 3 hours.
          Apply for a blue badge: www.gov.uk/apply-blue-badge or visit our offices with supporting documentation.

          Dropped Kerbs
          To request a vehicle crossover (dropped kerb) for your driveway: apply online (250 pound inspection fee, construction costs vary).

          Contact: parking@samplecouncil.gov.uk or 01234-567-894""",

            "roads-highways-guide.txt": """SAMPLE COUNCIL - ROADS AND HIGHWAYS GUIDE

          Report a Pothole
          Report potholes online at www.samplecouncil.gov.uk/potholes or call 01234-567-895.
          Response times:
          - Emergency (danger to life, major road): 2 hours
          - Category 1 (significant defect on main road): 24 hours
          - Category 2 (defect on main road): 5 working days
          - Category 3 (minor defect or residential road): 28 days
          We inspect all reports and prioritise based on risk. We repair approximately 5,000 potholes per year.

          Street Lighting
          Report a faulty street light online or by phone. Include the lamp column number (on the column near the base).
          - Light not working: Repaired within 5 working days
          - Light on during the day: Repaired within 10 working days
          - Damaged column (e.g. vehicle collision): Emergency response within 2 hours

          Winter Gritting
          We grit priority routes (A and B roads, bus routes, steep hills) when temperatures are forecast to drop below zero.
          Grit bins are located on steep residential streets. Report empty grit bins online.
          Priority route map: www.samplecouncil.gov.uk/gritting-routes

          Road Closures and Roadworks
          Check current and planned roadworks at www.one.network or www.samplecouncil.gov.uk/roadworks.
          Apply for a temporary road closure: Contact highways@samplecouncil.gov.uk (minimum 12 weeks notice).

          Pavement Maintenance
          Report damaged or uneven pavements online. We inspect and repair based on the same categories as potholes.
          Tree root damage: We work with our tree team to minimise root damage while preserving trees where possible.

          Flooding and Drainage
          Report blocked drains or flooding online or by phone. Emergency flooding: call 01234-567-895 (24 hours).
          We are the Lead Local Flood Authority and maintain a flood risk register.

          Contact: highways@samplecouncil.gov.uk or 01234-567-895""",

            "contact-information.txt": """SAMPLE COUNCIL - CONTACT INFORMATION

          Main Switchboard: 01234-567-890
          Monday to Friday: 8:30am - 5:30pm
          Saturday: 9:00am - 12:30pm (limited services)
          Sunday and Bank Holidays: Closed (emergency services only)

          Email: contact@samplecouncil.gov.uk
          Website: www.samplecouncil.gov.uk

          Main Council Offices
          Sample Council, Civic Centre, High Street, Sampletown, SM1 1AA
          Opening hours: Monday to Friday 9am-5pm (last entry 4:30pm)
          Accessible entrance via the rear car park. Hearing loop available at all reception desks.

          Key Service Numbers:
          - Council Tax: 01234-567-891
          - Housing Repairs (emergency 24hr): 01234-567-800
          - Housing Options: 01234-567-801
          - Planning: 01234-567-892
          - Building Control: 01234-567-893
          - Parking: 01234-567-894
          - Highways and Potholes: 01234-567-895
          - Waste and Recycling: 01234-567-890
          - Environmental Health: 01234-567-896
          - Licensing: 01234-567-897
          - Benefits: 01234-567-898
          - Electoral Services: 01234-567-899
          - Libraries: 01234-567-870

          Out of Hours Emergencies: 01234-567-999
          For emergencies outside office hours including dangerous buildings, noise nuisance, emergency housing, and highways emergencies.

          Report It Online
          Most services can be reported or requested via our website 24/7:
          www.samplecouncil.gov.uk/report-it

          Social Media
          Twitter/X: @SampleCouncil
          Facebook: facebook.com/SampleCouncil

          Complaints and Compliments
          Stage 1: Contact the service directly
          Stage 2: Write to complaints@samplecouncil.gov.uk
          Stage 3: Local Government and Social Care Ombudsman (www.lgo.org.uk)""",

            "environmental-services-guide.txt": """SAMPLE COUNCIL - ENVIRONMENTAL SERVICES GUIDE

          Noise Complaints
          Report noise nuisance (loud music, barking dogs, construction outside permitted hours, alarms):
          - During office hours: 01234-567-896
          - Out of hours noise service (Fri-Sat 8pm-3am): 01234-567-896 option 2
          - Online diary: Record noise disturbances at www.samplecouncil.gov.uk/noise-diary
          Construction noise is permitted Monday-Friday 8am-6pm, Saturday 8am-1pm. No construction noise on Sundays or bank holidays.

          Pest Control
          We offer subsidised pest control for council tenants (free for rats and mice, 50 pounds for other pests).
          Private residents: Treatment from 75 pounds depending on pest type.
          Pests treated: rats, mice, wasps, cockroaches, bedbugs, fleas.
          Book: www.samplecouncil.gov.uk/pest-control or 01234-567-896

          Fly-Tipping
          Report fly-tipping (illegal dumping) online or by phone. Include photos and location details if possible.
          We investigate all reports and prosecute offenders where evidence is available. Fines up to 50,000 pounds or imprisonment.
          Fixed penalty notice for small-scale fly-tipping: 400 pounds.
          Report: www.samplecouncil.gov.uk/fly-tipping or 01234-567-896

          Air Quality
          We monitor air quality across the borough. Live data available at www.samplecouncil.gov.uk/air-quality.
          Air Quality Management Areas (AQMAs) are declared where pollution exceeds national standards.

          Food Safety
          We inspect all food businesses. Ratings are published at www.food.gov.uk/ratings.
          Report a food safety concern: 01234-567-896 or environmental.health@samplecouncil.gov.uk

          Contact: environmental.health@samplecouncil.gov.uk or 01234-567-896""",

            "libraries-leisure-guide.txt": """SAMPLE COUNCIL - LIBRARIES AND LEISURE GUIDE

          Libraries
          We have 6 libraries across the borough. Library membership is free for all residents.

          Central Library, High Street, SM1 1BB
          Mon-Fri 9am-7pm, Sat 9am-5pm, Sun 11am-4pm
          Services: books, DVDs, free WiFi, public computers, printing (10p/page), meeting rooms, children's activities.

          Branch Libraries (5 locations):
          Mon, Wed, Fri 10am-5pm, Tue, Thu 10am-7pm, Sat 10am-2pm
          Locations: Northside, Southgate, East Park, Westfield, Hillcrest

          Online Services: eBooks and eAudiobooks free via the BorrowBox app. Online reference databases available 24/7.

          Events: Rhyme Time (weekly, under-5s), Code Club (weekly, ages 8-12), Reading Groups (monthly, adults), Digital Skills Drop-in (weekly).

          Parks and Open Spaces
          We maintain 15 parks and 8 play areas across the borough.
          Victoria Park (SM1 3CC): Playground, skate park, tennis courts, bowling green, cafe.
          Riverside Walk: 3km riverside path, accessible for wheelchairs and pushchairs.
          Allotments: Apply for an allotment plot (waiting list approximately 2 years). Annual rent 50-100 pounds depending on plot size.

          Leisure Centres
          Sample Leisure Centre, Sports Way, SM1 4DD
          Facilities: 25m pool, gym, sports hall, squash courts, studio.
          Membership: 35 pounds/month (adult), 20 pounds/month (concession), under-16s free with paying adult.
          Pay-as-you-go: Swim 5 pounds, gym 7 pounds, class 6 pounds.

          Contact: libraries@samplecouncil.gov.uk or 01234-567-870""",

            "benefits-support-guide.txt": """SAMPLE COUNCIL - BENEFITS AND SUPPORT GUIDE

          Housing Benefit
          Housing Benefit helps pay rent if you are on a low income. It is being replaced by Universal Credit for most new claims, but you may still be eligible if you are pension age or living in supported housing.
          Apply: www.samplecouncil.gov.uk/housing-benefit or collect a form from council offices.
          Processing time: New claims 20 working days, changes 10 working days.

          Council Tax Support
          You may be eligible for council tax support if you are on a low income or receiving certain benefits.
          - Working age: Up to 80% reduction (you always pay at least 20%)
          - Pension age: Up to 100% reduction
          Apply online: www.samplecouncil.gov.uk/council-tax-support

          Discretionary Housing Payments
          If Housing Benefit or Universal Credit housing element does not cover your full rent, you may apply for additional help. Limited fund available.

          Free School Meals
          Children whose parents receive certain benefits qualify for free school meals. Apply online at www.samplecouncil.gov.uk/free-school-meals.

          Local Welfare Assistance
          Emergency help for residents in crisis. We can provide food bank vouchers, emergency fuel payments, and essential household items.
          Contact: 01234-567-898 (Mon-Fri 9am-5pm)

          Cost of Living Support
          Visit our Cost of Living Hub: www.samplecouncil.gov.uk/cost-of-living for information about energy grants, food support, debt advice, and benefit calculators.

          Warm Homes Scheme
          Free home insulation and heating improvements for eligible residents (owner-occupiers on low incomes or receiving certain benefits).

          Contact: benefits@samplecouncil.gov.uk or 01234-567-898""",

            "elections-voting-guide.txt": """SAMPLE COUNCIL - ELECTIONS AND VOTING GUIDE

          Register to Vote
          You must be registered to vote in elections. Register online at www.gov.uk/register-to-vote. You need your National Insurance number.
          Registration deadline: 12 working days before an election.
          You can register if you are a British, Irish, or qualifying Commonwealth citizen aged 16 or over (you can vote when you turn 18).

          Voting Methods
          - In person: Vote at your polling station on election day (7am-10pm). Bring photo ID (since October 2023).
          - Postal vote: Apply at www.gov.uk/apply-postal-vote. Applications must be received 11 working days before the election.
          - Proxy vote: Appoint someone to vote on your behalf. Apply at www.gov.uk/apply-proxy-vote.

          Accepted Photo ID for Voting
          Passport, driving licence, blue badge, older person's bus pass, Voter Authority Certificate.
          If you do not have accepted photo ID, apply for a free Voter Authority Certificate at www.gov.uk/apply-for-photo-id-voter-authority-certificate.

          Upcoming Elections
          Check www.samplecouncil.gov.uk/elections for details of upcoming elections in your area.
          Council elections: Held in May. One third of councillors elected each year (no election in the fourth year).
          Parish council elections: Held alongside council elections.

          Becoming a Councillor
          You can stand for election if you are 18 or over, a British/Irish/qualifying Commonwealth citizen, and live or work in the council area.

          Contact: elections@samplecouncil.gov.uk or 01234-567-899""",

            "licensing-guide.txt": """SAMPLE COUNCIL - LICENSING GUIDE

          Premises Licence (Alcohol and Entertainment)
          You need a premises licence to sell alcohol, provide late-night refreshment, or hold regulated entertainment.
          Application fee: 100-1,905 pounds depending on rateable value.
          Apply to: licensing@samplecouncil.gov.uk with plans, DPS consent, and operating schedule.
          Processing time: 28 days consultation plus 2 weeks for decision.

          Personal Licence
          Required for anyone authorising the sale of alcohol. You must hold a licensing qualification.
          Fee: 37 pounds. Apply with your qualification certificate and basic DBS check.

          Taxi and Private Hire Licensing
          Driver licence: Apply with DBS enhanced check, medical certificate, driving record, and knowledge test. Fee: 250 pounds (3 years).
          Vehicle licence: Annual inspection required. Fee: 200 pounds per year.
          Operator licence: For private hire operators. Fee: 500 pounds (5 years).
          Apply: www.samplecouncil.gov.uk/taxi-licensing

          Street Trading
          You need a consent to trade on the street. Designated consent streets are listed on our website.
          Daily consent: 25 pounds. Annual consent: 1,500 pounds.
          Apply at least 28 days before you wish to start trading.

          Animal Licensing
          Licences required for: dog breeding (3+ litters/year), pet shops, animal boarding, riding schools, dangerous wild animals.
          Fee: 150-400 pounds depending on licence type. Inspections required before licence granted.

          Contact: licensing@samplecouncil.gov.uk or 01234-567-897""",

            "council-tax-faq.txt": """SAMPLE COUNCIL - COUNCIL TAX FREQUENTLY ASKED QUESTIONS

          Q: When is my council tax bill due?
          A: Bills are issued in March for the financial year starting 1 April. If paying by direct debit over 10 months, the first payment is in April. You can also choose 12 monthly instalments.

          Q: I've just moved in - what should I do?
          A: Notify us within 21 days at www.samplecouncil.gov.uk/council-tax or call 01234-567-891. We will calculate your bill from the date you moved in.

          Q: Can I pay my council tax weekly?
          A: We offer monthly direct debit (10 or 12 instalments), but not weekly payments. You can make additional payments at any time online.

          Q: My circumstances have changed - will this affect my bill?
          A: Yes, changes such as someone moving in or out, a death, or starting or finishing full-time education can affect your bill. Contact us within 21 days.

          Q: What happens if I don't pay?
          A: We will send reminders. If you still don't pay, we apply to the Magistrates Court for a Liability Order (83 pounds court cost added). This allows us to deduct from wages or benefits, use enforcement agents, or in extreme cases apply for committal to prison. Please contact us early if you are struggling to pay.

          Q: Can I get a reduction if I'm on a low income?
          A: Yes, apply for Council Tax Support (up to 80 percent reduction for working age, up to 100 percent for pension age). Apply online at www.samplecouncil.gov.uk/council-tax-support.

          Contact: counciltax@samplecouncil.gov.uk or 01234-567-891""",

            "waste-collection-faq.txt": """SAMPLE COUNCIL - WASTE AND RECYCLING FREQUENTLY ASKED QUESTIONS

          Q: My bin wasn't collected today - what should I do?
          A: Report it within 2 working days at www.samplecouncil.gov.uk/missed-collection or call 01234-567-890. We will return within 3 working days. Please leave your bin out until collected.

          Q: How do I get a new or replacement bin?
          A: Order online at www.samplecouncil.gov.uk/new-bin. Delivery takes 10 working days. Cost: 25 pounds for a replacement black or blue bin. Green bins are free when you sign up for garden waste.

          Q: Can I put extra rubbish out beside my bin?
          A: No, we only collect waste from the wheeled bin. Extra bags left beside the bin will not be collected. If you regularly have too much waste, consider a larger bin (available for households with 6 or more residents).

          Q: What do I do with old batteries?
          A: Place batteries in a small clear bag on top of your blue recycling bin on collection day. Do not put them loose inside the bin.

          Q: My recycling bin was rejected - why?
          A: Common reasons include food-contaminated items, plastic bags, nappies, or textiles in the blue bin. Remove the contamination and present the bin on your next collection day.

          Contact: waste@samplecouncil.gov.uk or 01234-567-890""",

            "housing-repairs-faq.txt": """SAMPLE COUNCIL - HOUSING REPAIRS FREQUENTLY ASKED QUESTIONS

          Q: I have no heating or hot water - is this an emergency?
          A: Yes, between October and April this is treated as an emergency repair. Call 01234-567-800 (24 hours). Between May and September, it is treated as urgent (3 working days).

          Q: Who is responsible for repairs - me or the council?
          A: The council is responsible for the structure, exterior, plumbing, electrical wiring, heating systems, and communal areas. You are responsible for internal decoration, minor fixtures (curtain rails, shelves), and replacing light bulbs.

          Q: How long will my repair take?
          A: Emergency: 2-4 hours. Urgent: 3 working days. Routine: 20 working days. Complex repairs requiring parts may take longer.

          Q: Can I do my own repairs?
          A: Yes for minor work such as painting and shelving. For gas, electrical, or structural work, you must use the council's approved contractors. Unauthorised alterations may affect your tenancy.

          Q: My window is broken - will the council fix it?
          A: If the damage is due to wear and tear or an attempted break-in, yes. If you or your household caused the damage, you may be charged for the repair.

          Contact: repairs@samplecouncil.gov.uk or 01234-567-800""",

            "planning-faq.txt": """SAMPLE COUNCIL - PLANNING FREQUENTLY ASKED QUESTIONS

          Q: Do I need planning permission for a garden shed?
          A: Usually no, if it meets Permitted Development rules: maximum 2.5m height, located behind the building line, and covering less than 50 percent of the garden. Different rules apply in conservation areas.

          Q: How long does a planning application take?
          A: Householder applications: 8 weeks. Minor applications: 8 weeks. Major applications: 13 weeks. These are statutory deadlines and most applications are decided within these timescales.

          Q: Can I see planning applications for my area?
          A: Yes, view the planning register at www.samplecouncil.gov.uk/planning-register. You can search by address, application number, or view weekly lists.

          Q: My neighbour's extension blocks my light - can I object?
          A: You can comment on any planning application during the 21-day consultation period. Loss of light is a material planning consideration. However, there is no legal right to light in planning law.

          Q: Do I need permission to convert my garage?
          A: If you are converting an integral garage to a habitable room, you usually need planning permission as it changes the front elevation. You will also need Building Regulations approval.

          Contact: planning@samplecouncil.gov.uk or 01234-567-892""",

            "schools-education-guide.txt": """SAMPLE COUNCIL - SCHOOLS AND EDUCATION GUIDE

          School Admissions
          Apply for school places at www.samplecouncil.gov.uk/school-admissions or call 01234-567-860.
          Primary school (Reception year): Apply by 15 January, offers made on 16 April.
          Secondary school (Year 7): Apply by 31 October, offers made on 1 March.
          In-year transfers: Apply at any time, decisions within 15 school days.

          Schools in the Borough
          We have 24 primary schools, 5 secondary schools, and 1 special school. All school performance data and Ofsted reports are available at www.gov.uk/school-performance-tables.

          Special Educational Needs and Disabilities (SEND)
          If your child has additional needs, contact our SEND team: send@samplecouncil.gov.uk or 01234-567-861.
          Education, Health and Care (EHC) plans: Apply via the SEND team. Assessment takes up to 20 weeks.

          School Transport
          Free transport for primary pupils living more than 2 miles from their nearest school, and secondary pupils living more than 3 miles. Additional support for SEND pupils.
          Apply: www.samplecouncil.gov.uk/school-transport

          Free School Meals
          Children whose parents receive Universal Credit (with net earnings under 7,400 pounds) or other qualifying benefits are eligible. Apply online.

          Contact: education@samplecouncil.gov.uk or 01234-567-860""",

            "adult-social-care-guide.txt": """SAMPLE COUNCIL - ADULT SOCIAL CARE GUIDE

          If you or someone you care for needs help with daily living, we can assess your needs and arrange support.

          Requesting an Assessment
          Anyone can request a care needs assessment. Call 01234-567-850 or visit www.samplecouncil.gov.uk/adult-care.
          Assessments are free and usually completed within 28 days.

          Types of Support Available
          Home care: Help with washing, dressing, meals, and medication.
          Day centres: Social activities and respite for carers.
          Residential care: Full-time care in a care home.
          Supported living: Help to live independently in your own home.
          Equipment and adaptations: Grab rails, stairlifts, level-access showers.
          Direct payments: Money to arrange your own care.

          Paying for Care
          If your savings are above 23,250 pounds, you will pay the full cost of care.
          Between 14,250 and 23,250 pounds, you contribute from your savings.
          Below 14,250 pounds, you pay from your income only (assessed individually).

          Carers Support
          If you care for someone, you are entitled to a carer's assessment. We can provide respite care, support groups, and emergency planning.
          Carers helpline: 01234-567-851

          Safeguarding
          If you are concerned about an adult at risk of abuse or neglect, call 01234-567-850 immediately. In an emergency, call 999.

          Contact: adult.care@samplecouncil.gov.uk or 01234-567-850""",

            "childrens-services-guide.txt": """SAMPLE COUNCIL - CHILDREN'S SERVICES GUIDE

          Early Years and Childcare
          Free childcare: 15 hours per week for all 3-4 year olds. 30 hours for eligible working parents.
          2-year-old funding: Free 15 hours for families on low incomes or qualifying benefits.
          Find childcare: www.samplecouncil.gov.uk/childcare-search

          Children's Centres
          Five centres across the borough offering parenting support, health visitor sessions, stay-and-play groups, and adult learning. All services are free.

          Safeguarding Children
          If you are concerned about a child's safety or welfare:
          During office hours: 01234-567-840 (Children's Social Care)
          Out of hours: 01234-567-802 (Emergency Duty Team)
          In immediate danger: Call 999
          All concerns are treated confidentially and investigated by qualified social workers.

          Fostering and Adoption
          We urgently need foster carers, especially for teenagers and sibling groups.
          Fostering enquiries: 01234-567-841 or fostering@samplecouncil.gov.uk
          Adoption enquiries: 01234-567-842 or adoption@samplecouncil.gov.uk

          Youth Services
          Youth clubs for ages 11-19 at three locations. Activities include sports, arts, music, and mentoring.

          Contact: childrens.services@samplecouncil.gov.uk or 01234-567-840""",

            "community-safety-guide.txt": """SAMPLE COUNCIL - COMMUNITY SAFETY GUIDE

          Anti-Social Behaviour (ASB)
          Report ASB online at www.samplecouncil.gov.uk/report-asb or call 01234-567-880.
          Types of ASB we deal with: noise nuisance, harassment, vandalism, fly-tipping, abandoned vehicles, drug dealing, intimidation.
          We work with the police and housing associations to tackle persistent ASB using Community Protection Notices and injunctions.

          Domestic Abuse
          If you or someone you know is experiencing domestic abuse:
          National helpline (24hr): 0808 2000 247
          Local support: Sample Refuge 01234-567-881
          In immediate danger: Call 999
          We can help with emergency housing, legal support, and safety planning.

          CCTV
          We operate 150 CCTV cameras across the town centre, car parks, and key locations. Monitored 24 hours a day 7 days a week. Subject Access Requests for footage must be made within 30 days.

          Neighbourhood Watch
          Join or start a Neighbourhood Watch scheme. Contact community.safety@samplecouncil.gov.uk for support and resources.

          Hate Crime
          Report hate crime to the police on 101 (or 999 in emergency). Third-party reporting is available through our offices or online. All reports are taken seriously.

          Contact: community.safety@samplecouncil.gov.uk or 01234-567-880""",

            "christmas-bin-schedule.txt": """SAMPLE COUNCIL - CHRISTMAS AND NEW YEAR BIN COLLECTION SCHEDULE

          Revised Collection Dates
          If your normal collection day falls on a bank holiday, your collection will be delayed:
          Wednesday 25 December (Christmas Day): Collected Saturday 28 December
          Thursday 26 December (Boxing Day): Collected Sunday 29 December
          Wednesday 1 January (New Year's Day): Collected Saturday 4 January
          All other collection days remain unchanged. Normal schedules resume from Monday 6 January.

          Extra Recycling
          We expect more recycling over the Christmas period. If your blue bin is full:
          Flatten all cardboard boxes.
          Place extra recycling in clear bags next to your blue bin (Christmas period only).
          Remove all wrapping paper that is NOT recyclable (metallic, glitter, or plastic-coated paper goes in the black bin).

          Real Christmas Trees
          Free collection service available in January. Register at www.samplecouncil.gov.uk/tree-collection by 10 January. Trees must be placed at the kerbside on your normal collection day. Remove all decorations and pot.
          The Household Waste Recycling Centre is closed on 25-26 December and 1 January only.

          Contact: waste@samplecouncil.gov.uk or 01234-567-890""",

            "summer-activities-guide.txt": """SAMPLE COUNCIL - SUMMER ACTIVITIES AND EVENTS GUIDE

          Summer Holiday Activities for Children
          Our leisure centres and parks offer activities during the school holidays (late July to early September):
          Sports camps (ages 5-14): Multi-sport, football, tennis, swimming. Book at the leisure centre.
          Play schemes (ages 5-11): Free play sessions in parks and community centres.
          Holiday Activity and Food programme (HAF): Free for children receiving free school meals. Register at www.samplecouncil.gov.uk/haf.

          Outdoor Events
          Music in the Park: Free concerts every Sunday in July and August at Victoria Park bandstand.
          Summer Reading Challenge: Free for all children at our libraries. Complete the challenge to earn a medal and certificate.
          Outdoor cinema: Two screenings per month in Victoria Park. Tickets 5 pounds.

          Parks and Play Areas
          All 15 parks are open from dawn to dusk. Paddling pools at Victoria Park and East Park are open 10am-5pm daily in July and August (weather permitting).

          Swimming
          Outdoor swim sessions at Sample Leisure Centre lido: May to September. Adult 5 pounds, child 3 pounds, family (2 adults and 2 children) 12 pounds.

          Contact: events@samplecouncil.gov.uk or 01234-567-870""",

            "flood-emergency-guide.txt": """SAMPLE COUNCIL - FLOOD EMERGENCY INFORMATION

          Flood Risk
          Parts of the borough are at risk of flooding from rivers and surface water. Check your flood risk at www.gov.uk/check-flood-risk.

          Before a Flood
          Sign up for free flood warnings from the Environment Agency: www.gov.uk/sign-up-for-flood-warnings or call 0345 988 1188.
          Prepare a flood kit: torch, phone charger, medication, important documents, insurance details.
          Know how to turn off gas, electricity, and water.

          During a Flood
          Call 999 if there is a danger to life.
          Do not walk or drive through flood water (15cm can knock you over, 30cm can move a car).
          Move to higher ground if advised.
          Council emergency line: 01234-567-999.

          After a Flood
          Do not return to your property until advised it is safe.
          Report flood damage: www.samplecouncil.gov.uk/flood-report or 01234-567-895.
          We can provide sandbags for future protection (limited availability, priority given to vulnerable residents).
          Council Tax discount may be available for uninhabitable properties. Contact 01234-567-891.

          Contact: flooding@samplecouncil.gov.uk or 01234-567-895""",

            "severe-weather-guide.txt": """SAMPLE COUNCIL - SEVERE WEATHER GUIDANCE

          Snow and Ice
          Priority gritting routes are treated when temperatures drop below zero. Map: www.samplecouncil.gov.uk/gritting-routes.
          Report dangerous ice on pavements: 01234-567-895.
          Grit bins on steep residential streets are refilled regularly during cold spells.
          School closures are announced on our website and social media by 7:30am.

          Heatwave Advice
          Check on elderly and vulnerable neighbours.
          Cool Centres open during heatwaves at libraries and community centres (air-conditioned).
          Report concerns about vulnerable people: 01234-567-850.
          Avoid outdoor exercise between 11am and 3pm during extreme heat.

          High Winds and Storms
          Secure loose items in gardens (trampolines, bins, furniture).
          Report fallen trees blocking roads: 01234-567-895 (priority clearance within 2 hours for main roads).
          Report damaged buildings: 01234-567-999 (out of hours emergency).
          Power cuts: Contact your electricity provider or call 105.

          Cancelled Services
          During severe weather, some services may be affected including bin collections, street cleaning, and outdoor events. Check our website and social media for updates.

          Contact: highways@samplecouncil.gov.uk or 01234-567-895""",

            "birth-death-marriage-guide.txt": """SAMPLE COUNCIL - REGISTRATION SERVICES (BIRTHS, DEATHS, MARRIAGES)

          Registering a Birth
          Births must be registered within 42 days. Book an appointment at the Register Office.
          Both parents' details can be included if married. Unmarried parents must both attend to include the father's details.
          Register Office: Civic Centre, High Street, SM1 1AA
          Appointments: www.samplecouncil.gov.uk/register-birth or 01234-567-865

          Registering a Death
          Deaths must be registered within 5 days (unless referred to the coroner). Book an appointment.
          Bring: medical certificate of cause of death, deceased's birth certificate, NHS card, and marriage certificate if applicable.
          Tell Us Once service available to notify multiple government departments in a single call.

          Marriage and Civil Partnership
          Notice of marriage: Both parties must give notice at their local register office at least 28 days before the ceremony.
          Ceremony venues: Register Office (165 pounds), approved venues across the borough (fees vary).
          Citizenship ceremonies: Held on the third Thursday of each month at the Civic Centre.

          Certificates
          Copies of birth, death, and marriage certificates: 11 pounds each (standard delivery 7 working days) or 35 pounds for priority (next working day).

          Contact: registrars@samplecouncil.gov.uk or 01234-567-865""",

            "dog-warden-stray-animals.txt": """SAMPLE COUNCIL - DOG WARDEN AND STRAY ANIMALS

          Stray Dogs
          If you find a stray dog, contact the Dog Warden: 01234-567-875 (Mon-Fri 8am-5pm).
          Out of hours strays: Call 01234-567-999 (emergency line).
          Stray dogs are held for 7 days. If unclaimed, they are rehomed through local rescue partners.
          Collection fee for reclaimed dogs: 75 pounds plus 15 pounds per day kennelling.

          Dog Fouling
          Dog fouling is an offence. Fixed penalty: 100 pounds. Report persistent fouling hotspots online.
          Dog waste bins are located in all parks. If a dog waste bin is full, use any litter bin.
          All dog walkers must carry bags and clean up after their dogs in public areas.

          Dangerous Dogs
          Report dangerous or out-of-control dogs to the police on 101 (999 if immediate danger).
          Banned breeds under the Dangerous Dogs Act: Pit Bull Terrier, Japanese Tosa, Dogo Argentino, Fila Brasileiro.

          Microchipping
          All dogs over 8 weeks old must be microchipped by law. Free microchipping events are held quarterly at council offices.

          Dog Control Orders
          Dogs must be kept on leads in cemeteries, playing fields, and marked areas in parks.
          Dogs are excluded from children's play areas and formal gardens.

          Contact: dogwarden@samplecouncil.gov.uk or 01234-567-875""",

            "parks-allotments-guide.txt": """SAMPLE COUNCIL - PARKS AND ALLOTMENTS DETAILED GUIDE

          Our Parks
          We maintain 15 parks across the borough, from small pocket parks to Victoria Park (20 acres).
          All parks are open from dawn to dusk. No entry fee.

          Victoria Park (SM1 3CC)
          Our flagship park with playground, skate park, tennis courts (book online, 6 pounds per hour), bowling green, bandstand, and cafe. Friends of Victoria Park volunteer group meets monthly.

          Play Areas
          8 equipped play areas for ages 2-14. Inspected weekly. Report damaged equipment online or call 01234-567-870.

          Allotments
          We manage 4 allotment sites with 200 plots total.
          Full plot (250 sq m): 65 pounds per year.
          Half plot (125 sq m): 35 pounds per year.
          Concession rate (over 65 or registered disabled): 50 percent discount.
          Waiting list: Apply at www.samplecouncil.gov.uk/allotments. Average wait approximately 2 years.
          Plots not cultivated for 6 months may be reclaimed.

          Tree Planting
          We plant approximately 200 new trees per year. Request a tree for your street at www.samplecouncil.gov.uk/tree-request.

          Contact: parks@samplecouncil.gov.uk or 01234-567-870""",

            "council-meeting-schedule.txt": """SAMPLE COUNCIL - COUNCIL MEETINGS AND DEMOCRACY

          Council Meetings
          Full Council meets on the first Wednesday of every month at 7pm in the Council Chamber, Civic Centre.
          Cabinet meets on the third Tuesday of every month at 6pm.
          Planning Committee meets on the second Thursday of every month at 6pm.
          All meetings are open to the public. Agendas published 5 working days before each meeting.

          Public Questions
          Members of the public can ask questions at Full Council meetings. Submit questions at least 3 working days before the meeting to democratic.services@samplecouncil.gov.uk.

          Petitions
          Submit petitions with 25 or more signatures to trigger a council response. Petitions with 1,000 or more signatures trigger a Full Council debate.
          Submit online: www.samplecouncil.gov.uk/petitions

          Your Councillors
          The borough has 36 councillors representing 12 wards (3 per ward). Find your councillor at www.samplecouncil.gov.uk/find-councillor.
          Councillor surgeries are held regularly in each ward. Check your councillor's page for times and locations.

          Freedom of Information
          Submit FOI requests at foi@samplecouncil.gov.uk. Response within 20 working days.

          Contact: democratic.services@samplecouncil.gov.uk or 01234-567-866""",

            "accessibility-services-guide.txt": """SAMPLE COUNCIL - ACCESSIBILITY AND INCLUSIVE SERVICES

          Our Commitment
          We are committed to making all council services accessible. We hold the Disability Confident Leader accreditation.

          Communication
          Documents available in large print, audio, Braille, and Easy Read on request.
          British Sign Language (BSL) interpretation available for appointments (book 5 working days in advance).
          Telephone relay service (TextRelay): Dial 18001 followed by the council number.
          Language interpretation available for over 100 languages.

          Physical Access
          All council buildings have step-free access, accessible toilets, and hearing loops.
          Blue Badge parking spaces at all council buildings.
          Changing Places facility at the Civic Centre and Sample Leisure Centre.

          Online Access
          Our website meets WCAG 2.1 AA standards. Report accessibility issues to webteam@samplecouncil.gov.uk.
          Screen reader compatible forms available for all online services.

          Disabled Facilities Grants
          Grants up to 30,000 pounds for home adaptations (ramps, stairlifts, wet rooms, door widening). Means-tested for adults, not means-tested for children.
          Apply: www.samplecouncil.gov.uk/dfg or call 01234-567-850.

          Contact: accessibility@samplecouncil.gov.uk or 01234-567-890""",

            "business-rates-guide.txt": """SAMPLE COUNCIL - BUSINESS RATES GUIDE

          What are Business Rates?
          Business rates (National Non-Domestic Rates) are the way businesses and other non-domestic property occupiers contribute towards the cost of local services.

          How Rates are Calculated
          Your rates are based on the rateable value (RV) set by the Valuation Office Agency (VOA) multiplied by the rate multiplier set by government.
          2024-25 standard multiplier: 51.2p. Small business multiplier: 49.9p.
          Example: Property with RV of 20,000 pounds = 20,000 x 0.499 = 9,980 pounds per year.

          Small Business Rate Relief
          If your property has a rateable value below 15,000 pounds, you may qualify for Small Business Rate Relief (up to 100 percent for RV under 12,000 pounds, tapered to 0 percent at 15,000 pounds).
          Apply: www.samplecouncil.gov.uk/business-rates-relief

          Other Reliefs Available
          Charitable relief: 80 percent mandatory plus 20 percent discretionary for registered charities.
          Empty property relief: 3 months for commercial, 6 months for industrial.
          Retail, hospitality, and leisure relief: 75 percent discount (current government scheme).
          Hardship relief: Discretionary relief for businesses in financial difficulty.

          Payment
          Pay monthly by direct debit over 10 or 12 instalments. Online payment also available.

          Contact: businessrates@samplecouncil.gov.uk or 01234-567-891"""
          }

          def handler(event, context):
              request_type = event.get('RequestType', 'Create')
              bucket = os.environ['BUCKET_NAME']
              kb_id = os.environ.get('KB_ID', '')
              ds_id = os.environ.get('DS_ID', '')
              try:
                  if request_type in ('Create', 'Update'):
                      for key, content in DOCUMENTS.items():
                          s3.put_object(Bucket=bucket, Key=f'documents/{key}', Body=content.strip(), ContentType='text/plain')
                      print(f'Uploaded {len(DOCUMENTS)} documents to {bucket}')
                      if kb_id and ds_id:
                          bedrock_agent = boto3.client('bedrock-agent')
                          resp = bedrock_agent.start_ingestion_job(knowledgeBaseId=kb_id, dataSourceId=ds_id)
                          job_id = resp['ingestionJob']['ingestionJobId']
                          print(f'Started ingestion job {job_id}')
                          for _ in range(24):
                              time.sleep(10)
                              job = bedrock_agent.get_ingestion_job(knowledgeBaseId=kb_id, dataSourceId=ds_id, ingestionJobId=job_id)
                              status = job['ingestionJob']['status']
                              print(f'Ingestion status: {status}')
                              if status == 'COMPLETE':
                                  stats = job['ingestionJob'].get('statistics', {})
                                  print(f'Ingestion complete: {stats}')
                                  break
                              if status == 'FAILED':
                                  reasons = job['ingestionJob'].get('failureReasons', ['Unknown'])
                                  raise Exception(f'Ingestion failed: {reasons}')
                          else:
                              print('Ingestion still in progress, returning SUCCESS (will complete async)')
                  elif request_type == 'Delete':
                      objs = s3.list_objects_v2(Bucket=bucket, Prefix='documents/')
                      if 'Contents' in objs:
                          s3.delete_objects(Bucket=bucket, Delete={'Objects': [{'Key': o['Key']} for o in objs['Contents']]})
                      print(f'Cleaned up documents from {bucket}')
                  send_response(event, context, 'SUCCESS', {'Message': f'{request_type} completed'})
              except Exception as e:
                  print(f'Error: {str(e)}')
                  send_response(event, context, 'FAILED', {'Error': str(e)})

          def send_response(event, context, status, data):
              body = json.dumps({'Status': status, 'Reason': f'See CloudWatch Log Stream: {context.log_stream_name}', 'PhysicalResourceId': context.log_stream_name, 'StackId': event['StackId'], 'RequestId': event['RequestId'], 'LogicalResourceId': event['LogicalResourceId'], 'Data': data})
              req = urllib.request.Request(event['ResponseURL'], data=body.encode('utf-8'), headers={'Content-Type': ''}, method='PUT')
              urllib.request.urlopen(req)
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: council-chatbot

  # Seed Data Custom Resource
  SeedData:
    Type: Custom::SeedData
    DependsOn: CouncilDataSource
    Properties:
      ServiceToken: !GetAtt SeedDataFunction.Arn
      # Change this value to trigger re-seeding on stack update
      Version: '2'

  # IAM Role for Lambda
