AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  NDX:Try - Smart Car Park Scenario with IoT Core
  Real-time parking availability with IoT sensors, DynamoDB, and CloudWatch.
  Version: 3.0.0

Parameters:
  Environment:
    Type: String
    Default: sandbox
    Description: Deployment environment (NDX:Try session)

Resources:
  # ============================================================
  # DynamoDB Table for Sensor Readings
  # ============================================================
  SensorReadingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'ndx-try-carpark-sensor-readings-${AWS::Region}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sensor_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: zone
          AttributeType: S
      KeySchema:
        - AttributeName: sensor_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: zone-timestamp-index
          KeySchema:
            - AttributeName: zone
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: smart-car-park

  # ============================================================
  # IAM Roles
  # ============================================================
  SimulatorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ndx-try-carpark-${AWS::Region}-simulator-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IoTPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iot:Publish
                Resource: !Sub 'arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/carpark/*'
              - Effect: Allow
                Action:
                  - iot:DescribeEndpoint
                Resource: '*'
        - PolicyName: Logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/ndx-try-carpark-${AWS::Region}-simulator:*'
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: smart-car-park

  ProcessorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ndx-try-carpark-${AWS::Region}-processor-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt SensorReadingsTable.Arn
        - PolicyName: CloudWatchMetrics
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
        - PolicyName: Logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/ndx-try-carpark-${AWS::Region}-processor:*'
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: smart-car-park

  DashboardLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ndx-try-carpark-${AWS::Region}-dashboard-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBQuery
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource:
                  - !GetAtt SensorReadingsTable.Arn
                  - !Sub '${SensorReadingsTable.Arn}/index/zone-timestamp-index'
        - PolicyName: Logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/ndx-try-carpark-${AWS::Region}-dashboard:*'
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: smart-car-park

  # ============================================================
  # Log Groups (explicit to prevent orphans on delete)
  # ============================================================
  SimulatorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/ndx-try-carpark-${AWS::Region}-simulator'
      RetentionInDays: 7

  ProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/ndx-try-carpark-${AWS::Region}-processor'
      RetentionInDays: 7

  DashboardLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/ndx-try-carpark-${AWS::Region}-dashboard'
      RetentionInDays: 7

  # ============================================================
  # Simulator Lambda + EventBridge Schedule
  # ============================================================
  SimulatorFunction:
    Type: AWS::Lambda::Function
    DependsOn: SimulatorLogGroup
    Properties:
      FunctionName: !Sub 'ndx-try-carpark-${AWS::Region}-simulator'
      Description: Publishes simulated IoT sensor batch to IoT Core every 2 minutes
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt SimulatorLambdaRole.Arn
      Timeout: 60
      MemorySize: 128
      Code:
        ZipFile: |
          import json
          import boto3
          import random
          import hashlib
          from datetime import datetime, timezone

          _iot_client = None

          ZONES = {
              'ground': [f'GF-{i:02d}' for i in range(1, 21)],
              'level1': [f'L1-{i:02d}' for i in range(1, 16)],
              'level2': [f'L2-{i:02d}' for i in range(1, 16)]
          }

          PEAK = {'ground': 0.90, 'level1': 0.87, 'level2': 0.73}
          OFF = {'ground': 0.65, 'level1': 0.60, 'level2': 0.53}
          NIGHT = {'ground': 0.15, 'level1': 0.20, 'level2': 0.27}

          def get_client():
              global _iot_client
              if _iot_client is None:
                  iot = boto3.client('iot')
                  ep = iot.describe_endpoint(endpointType='iot:Data-ATS')['endpointAddress']
                  _iot_client = boto3.client('iot-data', endpoint_url=f'https://{ep}')
              return _iot_client

          def target_occ(hour, zone):
              if 8 <= hour <= 9 or 12 <= hour <= 13 or 17 <= hour <= 18:
                  return PEAK[zone]
              elif 22 <= hour or hour < 8:
                  return NIGHT[zone]
              return OFF[zone]

          def lambda_handler(event, context):
              now = datetime.now(timezone.utc)
              seed_base = now.hour * 60 + now.minute
              readings = []
              for zone, sensors in ZONES.items():
                  target = target_occ(now.hour, zone)
                  for sid in sensors:
                      h = int(hashlib.md5(sid.encode()).hexdigest(), 16)
                      random.seed(seed_base + (h % 10000))
                      occupied = random.random() < target
                      readings.append({
                          'sensor_id': sid,
                          'zone': zone,
                          'occupied': occupied,
                          'confidence': round(random.uniform(0.92, 0.99), 2),
                          'battery_level': round(random.uniform(20, 100), 1)
                      })
              payload = {
                  'readings': readings,
                  'timestamp': now.isoformat(),
                  'batch_size': len(readings)
              }
              get_client().publish(
                  topic='carpark/sensors/batch',
                  qos=0,
                  payload=json.dumps(payload)
              )
              print(f'Published {len(readings)} readings')
              return {'statusCode': 200, 'body': f'Published {len(readings)} readings'}
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: smart-car-park

  SimulatorSchedule:
    Type: AWS::Events::Rule
    Properties:
      Description: Invoke IoT simulator every minute
      ScheduleExpression: 'rate(1 minute)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt SimulatorFunction.Arn
          Id: SimulatorTarget

  SimulatorPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SimulatorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SimulatorSchedule.Arn

  # ============================================================
  # Processor Lambda + IoT Core Resources
  # ============================================================
  ProcessorFunction:
    Type: AWS::Lambda::Function
    DependsOn: ProcessorLogGroup
    Properties:
      FunctionName: !Sub 'ndx-try-carpark-${AWS::Region}-processor'
      Description: Processes IoT sensor batch, writes to DynamoDB, publishes CloudWatch metrics
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt ProcessorLambdaRole.Arn
      Timeout: 60
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref SensorReadingsTable
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          import time as time_mod
          from datetime import datetime, timezone
          from decimal import Decimal

          dynamodb = boto3.resource('dynamodb')
          cw = boto3.client('cloudwatch')
          TABLE_NAME = os.environ['TABLE_NAME']
          table = dynamodb.Table(TABLE_NAME)

          def lambda_handler(event, context):
              if isinstance(event, str):
                  event = json.loads(event)
              readings = event.get('readings', [])
              if not readings:
                  print('No readings in event')
                  return {'statusCode': 400, 'body': 'No readings'}

              now = datetime.now(timezone.utc)
              ts = now.isoformat().replace('+00:00', 'Z')
              ttl_value = int(time_mod.time()) + 7 * 86400

              # Batch write in groups of 25 (DynamoDB limit)
              with table.batch_writer() as batch:
                  for r in readings:
                      batch.put_item(Item={
                          'sensor_id': r['sensor_id'],
                          'timestamp': ts,
                          'zone': r['zone'],
                          'occupied': r['occupied'],
                          'confidence': Decimal(str(r['confidence'])),
                          'battery_level': Decimal(str(r['battery_level'])),
                          'ttl': ttl_value
                      })

              # Publish CloudWatch metrics
              zone_occ = {}
              total_occ = 0
              for r in readings:
                  if r['occupied']:
                      zone_occ[r['zone']] = zone_occ.get(r['zone'], 0) + 1
                      total_occ += 1

              metrics = []
              for zone, count in zone_occ.items():
                  metrics.append({
                      'MetricName': 'OccupiedSpaces',
                      'Dimensions': [{'Name': 'Zone', 'Value': zone}],
                      'Value': count,
                      'Unit': 'Count'
                  })
              metrics.append({
                  'MetricName': 'TotalOccupancy',
                  'Value': total_occ,
                  'Unit': 'Count'
              })
              metrics.append({
                  'MetricName': 'SensorsReportingCount',
                  'Value': len(readings),
                  'Unit': 'Count'
              })
              cw.put_metric_data(Namespace='NDXTry/SmartCarPark', MetricData=metrics)

              print(f'Processed {len(readings)} readings, {total_occ} occupied')
              return {'statusCode': 200, 'body': f'Processed {len(readings)} readings'}
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: smart-car-park

  # IoT Core: Thing + Policy (declarative — simulator uses IAM, not certificates)
  IoTThing:
    Type: AWS::IoT::Thing
    Properties:
      ThingName: !Sub 'ndx-try-carpark-sensor-gateway-${AWS::Region}'

  IoTPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: !Sub 'ndx-try-carpark-sensor-policy-${AWS::Region}'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: iot:Publish
            Resource: !Sub 'arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/carpark/*'

  IoTTopicRule:
    Type: AWS::IoT::TopicRule
    Properties:
      TopicRulePayload:
        Sql: "SELECT * FROM 'carpark/sensors/batch'"
        Actions:
          - Lambda:
              FunctionArn: !GetAtt ProcessorFunction.Arn
        RuleDisabled: false

  ProcessorIoTPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessorFunction
      Action: lambda:InvokeFunction
      Principal: iot.amazonaws.com
      SourceArn: !GetAtt IoTTopicRule.Arn

  # ============================================================
  # Dashboard Lambda + Function URL
  # ============================================================
  DashboardFunction:
    Type: AWS::Lambda::Function
    DependsOn: DashboardLogGroup
    Properties:
      FunctionName: !Sub 'ndx-try-carpark-${AWS::Region}-dashboard'
      Description: HTML dashboard querying DynamoDB for real-time car park occupancy
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt DashboardLambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref SensorReadingsTable
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime, timezone, timedelta
          from boto3.dynamodb.conditions import Key
          from collections import defaultdict

          dynamodb = boto3.resource('dynamodb')
          TABLE_NAME = os.environ['TABLE_NAME']
          table = dynamodb.Table(TABLE_NAME)
          ZONE_TOTALS = {'ground': 20, 'level1': 15, 'level2': 15}
          ZONE_NAMES = {'ground': 'Ground Floor', 'level1': 'Level 1', 'level2': 'Level 2'}
          TOTAL = 50

          def query_zones():
              now = datetime.now(timezone.utc)
              cutoff = (now - timedelta(minutes=5)).isoformat().replace('+00:00', 'Z')
              zones = {}
              try:
                  for zone_id in ZONE_TOTALS:
                      resp = table.query(
                          IndexName='zone-timestamp-index',
                          KeyConditionExpression=Key('zone').eq(zone_id) & Key('timestamp').gte(cutoff),
                          ScanIndexForward=False
                      )
                      items = resp.get('Items', [])
                      latest = {}
                      for it in items:
                          sid = it['sensor_id']
                          if sid not in latest or it['timestamp'] > latest[sid]['timestamp']:
                              latest[sid] = it
                      sensors = list(latest.values())
                      occ = sum(1 for s in sensors if s.get('occupied') is True)
                      batt_vals = [float(s['battery_level']) for s in sensors if 'battery_level' in s]
                      zones[zone_id] = {
                          'occupied': occ,
                          'total': len(sensors),
                          'battery': sum(batt_vals) / len(batt_vals) if batt_vals else 0
                      }
                  return zones
              except Exception as e:
                  print(f'Zone query error: {e}')
                  return {}

          def query_history():
              now = datetime.now(timezone.utc)
              cutoff = (now - timedelta(hours=24)).isoformat().replace('+00:00', 'Z')
              all_items = []
              try:
                  for zone_id in ZONE_TOTALS:
                      resp = table.query(
                          IndexName='zone-timestamp-index',
                          KeyConditionExpression=Key('zone').eq(zone_id) & Key('timestamp').gte(cutoff)
                      )
                      all_items.extend(resp.get('Items', []))
                  bins = defaultdict(lambda: {'occ': 0, 'total': 0})
                  for it in all_items:
                      t = datetime.fromisoformat(it['timestamp'].replace('Z', '+00:00'))
                      bucket = t.replace(minute=(t.minute // 15) * 15, second=0, microsecond=0)
                      key = bucket.isoformat()
                      bins[key]['total'] += 1
                      if it.get('occupied') is True:
                          bins[key]['occ'] += 1
                  result = []
                  for t in sorted(bins):
                      b = bins[t]
                      occ_pct = (b['occ'] / b['total']) * TOTAL if b['total'] > 0 else 0
                      result.append({'t': t, 'v': round(occ_pct, 1)})
                  return result
              except Exception as e:
                  print(f'History query error: {e}')
                  return []

          def sparkline(history, w=600, h=80):
              if not history:
                  return f'<svg width="{w}" height="{h}"><text x="300" y="40" text-anchor="middle" fill="#505a5f">Waiting for data...</text></svg>'
              vals = [p['v'] for p in history]
              mn, mx = min(vals), max(vals)
              rng = mx - mn if mx != mn else 1
              pts = []
              for i, v in enumerate(vals):
                  x = (i / max(len(vals) - 1, 1)) * w
                  y = h - ((v - mn) / rng) * (h - 10) - 5
                  pts.append(f'{x:.1f},{y:.1f}')
              return f'<svg width="{w}" height="{h}" viewBox="0 0 {w} {h}"><polyline fill="none" stroke="#1d70b8" stroke-width="2" points="{" ".join(pts)}"/></svg>'

          def zone_card(zid, data):
              d = data.get(zid, {})
              occ = d.get('occupied', 0)
              cap = ZONE_TOTALS[zid]
              avail = cap - occ
              pct = round((occ / cap) * 100) if cap > 0 else 0
              batt = d.get('battery', 0)
              if pct >= 90:
                  col, st = '#d4351c', 'Full'
              elif pct >= 70:
                  col, st = '#f47738', 'Limited'
              else:
                  col, st = '#00703c', 'Available'
              return f'''<div style="flex:1;min-width:250px;background:#fff;border-top:5px solid {col};padding:20px;border-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.1)">
          <h3 style="margin:0 0 8px;font-size:18px">{ZONE_NAMES[zid]}</h3>
          <span style="display:inline-block;background:{col};color:#fff;padding:3px 10px;border-radius:3px;font-size:13px;font-weight:700">{st}</span>
          <div style="background:#f3f2f1;border-radius:4px;height:16px;margin:12px 0;overflow:hidden"><div style="width:{pct}%;height:100%;background:{col}"></div></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:14px">
            <div><span style="color:#505a5f">Occupied</span><br><strong>{occ}/{cap}</strong></div>
            <div><span style="color:#505a5f">Available</span><br><strong style="color:#00703c">{avail}</strong></div>
            <div><span style="color:#505a5f">Occupancy</span><br><strong>{pct}%</strong></div>
            <div><span style="color:#505a5f">Avg Battery</span><br><strong>{batt:.0f}%</strong></div>
          </div></div>'''

          def render(zones, history):
              now = datetime.now(timezone.utc).strftime('%H:%M:%S UTC')
              total_occ = sum(z.get('occupied', 0) for z in zones.values())
              avail = TOTAL - total_occ
              pct = round((total_occ / TOTAL) * 100)
              if pct >= 90: oc = '#d4351c'
              elif pct >= 70: oc = '#f47738'
              else: oc = '#00703c'
              cards = ''.join(zone_card(z, zones) for z in ['ground', 'level1', 'level2'])
              svg = sparkline(history)
              return f'''<!DOCTYPE html>
          <html lang="en"><head><meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Smart Car Park Dashboard - NDX:Try</title>
          <style>
          *{{box-sizing:border-box;margin:0;padding:0}}
          body{{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f3f2f1;color:#0b0c0c;line-height:1.5}}
          a{{color:#1d70b8}}.bn{{background:#1d70b8;color:#fff;padding:10px 20px;text-align:center;font-weight:700}}
          .ph{{background:#f3f2f1;border-bottom:1px solid #b1b4b6;padding:10px 0}}
          .phi{{max-width:960px;margin:0 auto;padding:0 15px}}.tag{{display:inline-block;background:#1d70b8;color:#fff;padding:2px 8px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px}}
          .hd{{background:#0b0c0c;padding:15px 0}}.hdi{{max-width:960px;margin:0 auto;padding:0 15px;color:#fff;font-size:24px;font-weight:700}}
          .mn{{max-width:960px;margin:0 auto;padding:30px 15px}}h1{{font-size:36px;font-weight:700;margin-bottom:20px}}
          .sm{{background:#fff;border-left:5px solid #1d70b8;padding:20px;margin-bottom:30px;box-shadow:0 1px 3px rgba(0,0,0,.1)}}
          .sg{{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:20px;text-align:center}}
          .sv{{font-size:36px;font-weight:700;color:#1d70b8}}.sl{{font-size:14px;color:#505a5f}}
          .zn{{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:30px}}
          .hs{{background:#fff;padding:20px;margin-bottom:30px;border-left:5px solid #1d70b8;box-shadow:0 1px 3px rgba(0,0,0,.1)}}
          .nt{{background:#f3f2f1;border-left:5px solid #1d70b8;padding:15px 20px;margin-top:30px;font-size:14px}}
          .up{{font-size:14px;color:#505a5f;margin-bottom:20px}}.sd{{width:12px;height:12px;border-radius:50%;background:#00703c;display:inline-block;animation:p 2s infinite}}
          @keyframes p{{0%,100%{{opacity:1}}50%{{opacity:.5}}}}
          @media(max-width:640px){{h1{{font-size:28px}}.sv{{font-size:28px}}}}
          </style></head><body>
          <div class="bn">Powered by AWS IoT Core + Amazon DynamoDB</div>
          <div class="ph"><div class="phi"><span class="tag">Live</span> Real-time IoT sensor data from 50 parking sensors</div></div>
          <header class="hd"><div class="hdi">NDX:Try - Smart Car Park Dashboard</div></header>
          <main class="mn">
          <h1>Live Parking Availability</h1>
          <div class="up"><span class="sd"></span> IoT sensors active &mdash; Last updated: {now}</div>
          <div class="sm"><div class="sg">
            <div><div class="sv">{TOTAL}</div><div class="sl">Total Spaces</div></div>
            <div><div class="sv" style="color:#00703c">{avail}</div><div class="sl">Available Now</div></div>
            <div><div class="sv" style="color:{oc}">{total_occ}</div><div class="sl">Occupied</div></div>
            <div><div class="sv">{pct}%</div><div class="sl">Occupancy</div></div>
          </div></div>
          <h2 style="font-size:24px;margin-bottom:15px">Zones</h2>
          <div class="zn">{cards}</div>
          <div class="hs"><h2 style="font-size:20px;margin-bottom:15px">24-Hour Occupancy Trend (occupied spaces)</h2>{svg}</div>
          <div class="nt"><strong>About this demo:</strong> This dashboard queries <strong>Amazon DynamoDB</strong> for real-time sensor data published via <strong>AWS IoT Core</strong>. 50 sensors report every 2 minutes via an EventBridge-scheduled simulator Lambda. Data is stored with a 7-day TTL for automatic expiry.</div>
          </main></body></html>'''

          def lambda_handler(event, context):
              try:
                  zones = query_zones()
                  history = query_history()
                  return {
                      'statusCode': 200,
                      'headers': {'Content-Type': 'text/html; charset=utf-8'},
                      'body': render(zones, history)
                  }
              except Exception as e:
                  print(f'Error: {e}')
                  return {
                      'statusCode': 500,
                      'headers': {'Content-Type': 'text/html'},
                      'body': '<html><body><h1>Dashboard Error</h1><p>Unable to load dashboard data. Check CloudWatch Logs for details.</p></body></html>'
                  }
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: smart-car-park

  DashboardFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt DashboardFunction.Arn

  DashboardFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DashboardFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  DashboardFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DashboardFunction
      Action: lambda:InvokeFunction
      Principal: '*'
      InvokedViaFunctionUrl: true

  # ============================================================
  # CloudWatch Dashboard (4 widgets)
  # ============================================================
  CarParkDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'ndx-try-carpark-dashboard-${AWS::Region}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Occupied Spaces Over Time",
                "metrics": [
                  ["NDXTry/SmartCarPark", "TotalOccupancy"]
                ],
                "view": "timeSeries",
                "stacked": false,
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "yAxis": {"left": {"min": 0, "max": 50, "label": "Spaces"}}
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Occupancy by Zone",
                "metrics": [
                  ["NDXTry/SmartCarPark", "OccupiedSpaces", "Zone", "ground", {"label": "Ground Floor"}],
                  ["NDXTry/SmartCarPark", "OccupiedSpaces", "Zone", "level1", {"label": "Level 1"}],
                  ["NDXTry/SmartCarPark", "OccupiedSpaces", "Zone", "level2", {"label": "Level 2"}]
                ],
                "view": "timeSeries",
                "stacked": true,
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "yAxis": {"left": {"min": 0, "label": "Spaces"}}
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 4,
              "properties": {
                "title": "Available Spaces",
                "metrics": [
                  ["NDXTry/SmartCarPark", "TotalOccupancy", {"id": "m1", "visible": false}],
                  [{"expression": "50-m1", "label": "Available Spaces", "id": "e1"}]
                ],
                "view": "singleValue",
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 4,
              "properties": {
                "title": "Sensors Reporting",
                "metrics": [
                  ["NDXTry/SmartCarPark", "SensorsReportingCount"]
                ],
                "view": "singleValue",
                "stat": "Average",
                "period": 300,
                "region": "${AWS::Region}"
              }
            }
          ]
        }

  # ============================================================
  # CloudWatch Alarms
  # ============================================================
  HighOccupancyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'ndx-try-carpark-high-occupancy-${AWS::Region}'
      AlarmDescription: Fires when total occupied spaces exceeds 45 (90% of 50)
      Namespace: NDXTry/SmartCarPark
      MetricName: TotalOccupancy
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 45
      ComparisonOperator: GreaterThanThreshold
      ActionsEnabled: false

  SensorOfflineAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'ndx-try-carpark-sensor-offline-${AWS::Region}'
      AlarmDescription: Fires when fewer than 45 of 50 sensors report
      Namespace: NDXTry/SmartCarPark
      MetricName: SensorsReportingCount
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 45
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      ActionsEnabled: false

  # ============================================================
  # AppRegistry Application - visible in myApplications on the AWS Console
  # ============================================================
  AppRegistryApplication:
    Type: AWS::ServiceCatalogAppRegistry::Application
    Properties:
      Name: !Sub 'NDXTry_Smart_Car_Park_${AWS::AccountId}'
      Description: 'NDX:Try - Real-time parking availability with IoT sensors and DynamoDB'
      Tags:
        Project: ndx-try
        Scenario: smart-car-park

  AppRegistryAssociation:
    Type: AWS::ServiceCatalogAppRegistry::ResourceAssociation
    Properties:
      Application: !GetAtt AppRegistryApplication.Id
      Resource: !Ref 'AWS::StackId'
      ResourceType: CFN_STACK

# ============================================================
# Outputs
# ============================================================
Outputs:
  DashboardURL:
    Description: HTML dashboard URL (no login required)
    Value: !GetAtt DashboardFunctionUrl.FunctionUrl

  CloudWatchDashboardURL:
    Description: CloudWatch console dashboard URL
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${CarParkDashboard}'

  SensorReadingsTable:
    Description: DynamoDB table name for sensor readings
    Value: !Ref SensorReadingsTable

  StackRegion:
    Description: Deployment region
    Value: !Ref 'AWS::Region'
