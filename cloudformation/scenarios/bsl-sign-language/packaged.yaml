AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "NDX:Try - BSL Sign Language Translation (Sandbox)\nBidirectional British\
  \ Sign Language translation with SageMaker GPU inference,\nBedrock glossing, and\
  \ real-time browser-based pose detection.\nVersion: 1.0.0\n"
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
    - Label:
        default: Scenario Configuration
      Parameters:
      - Environment
      - SageMakerInstanceType
Parameters:
  Environment:
    Type: String
    Default: sandbox
    AllowedValues:
    - sandbox
    - development
    - production
    Description: Deployment environment
  SageMakerInstanceType:
    Type: String
    Default: ml.m5.2xlarge
    AllowedValues:
    - ml.m5.2xlarge
    - ml.m5.xlarge
    - ml.c5.2xlarge
    - ml.g5.xlarge
    - ml.g4dn.xlarge
    Description: SageMaker endpoint instance type
Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: ndx-try-bsl-website-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowCloudFrontOAC
          Effect: Allow
          Principal:
            Service: cloudfront.amazonaws.com
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${WebsiteBucket.Arn}/*
          Condition:
            StringEquals:
              AWS:SourceArn:
                Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}
  DataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: DataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowCloudFrontOAC
          Effect: Allow
          Principal:
            Service: cloudfront.amazonaws.com
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${DataBucket.Arn}/lexicon/*
          Condition:
            StringEquals:
              AWS:SourceArn:
                Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: ndx-try-bsl-data-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
        - AllowedHeaders:
          - '*'
          AllowedMethods:
          - GET
          AllowedOrigins:
          - '*'
          MaxAge: 3600
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  BSLSignLexicon:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ndx-try-bsl-lexicon-${AWS::AccountId}-${AWS::Region}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: Gloss
        AttributeType: S
      - AttributeName: QualityRankSource
        AttributeType: S
      KeySchema:
      - AttributeName: Gloss
        KeyType: HASH
      - AttributeName: QualityRankSource
        KeyType: RANGE
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName:
        Fn::Sub: ndx-try-bsl-users-${AWS::Region}
      AutoVerifiedAttributes:
      - email
      UsernameAttributes:
      - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: bsl-web-client
      UserPoolId:
        Ref: UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
      - ALLOW_USER_SRP_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
      - COGNITO
      CallbackURLs:
      - Fn::Sub: https://${CloudFrontDistribution.DomainName}
      - http://localhost:3000
      LogoutURLs:
      - Fn::Sub: https://${CloudFrontDistribution.DomainName}
      - http://localhost:3000
      AllowedOAuthFlows:
      - code
      AllowedOAuthScopes:
      - openid
      - email
      - profile
      AllowedOAuthFlowsUserPoolClient: true
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain:
        Fn::Sub: ndx-try-bsl-${AWS::AccountId}
      UserPoolId:
        Ref: UserPool
  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName:
        Fn::Sub: ndx_try_bsl_${AWS::Region}
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
      - ClientId:
          Ref: UserPoolClient
        ProviderName:
          Fn::GetAtt:
          - UserPool
          - ProviderName
  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId:
        Ref: IdentityPool
      Roles:
        authenticated:
          Fn::GetAtt:
          - CognitoAuthRole
          - Arn
  CognitoAuthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: InnovationSandbox-ndx-bsl-cognito-auth
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Federated: cognito-identity.amazonaws.com
          Action: sts:AssumeRoleWithWebIdentity
          Condition:
            StringEquals:
              cognito-identity.amazonaws.com:aud:
                Ref: IdentityPool
            ForAnyValue:StringLike:
              cognito-identity.amazonaws.com:amr: authenticated
      Policies:
      - PolicyName: CognitoAuthPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            Resource:
            - Fn::Sub: ${DataBucket.Arn}/output/*
            - Fn::Sub: ${DataBucket.Arn}/lexicon/*
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name:
          Fn::Sub: ndx-try-bsl-oac-${AWS::AccountId}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
        - Id: S3Origin
          DomainName:
            Fn::GetAtt:
            - WebsiteBucket
            - RegionalDomainName
          OriginAccessControlId:
            Fn::GetAtt:
            - CloudFrontOAC
            - Id
          S3OriginConfig:
            OriginAccessIdentity: ''
        - Id: DataOrigin
          DomainName:
            Fn::GetAtt:
            - DataBucket
            - RegionalDomainName
          OriginAccessControlId:
            Fn::GetAtt:
            - CloudFrontOAC
            - Id
          S3OriginConfig:
            OriginAccessIdentity: ''
        CacheBehaviors:
        - PathPattern: /lexicon/*
          TargetOriginId: DataOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        CustomErrorResponses:
        - ErrorCode: 403
          ResponseCode: 200
          ResponsePagePath: /index.html
        - ErrorCode: 404
          ResponseCode: 200
          ResponsePagePath: /index.html
        PriceClass: PriceClass_100
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: InnovationSandbox-ndx-bsl-lambda
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: BSLLambdaPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:ListBucket
            - s3:DeleteObject
            Resource:
            - Fn::Sub: ${DataBucket.Arn}
            - Fn::Sub: ${DataBucket.Arn}/*
            - Fn::Sub: ${WebsiteBucket.Arn}
            - Fn::Sub: ${WebsiteBucket.Arn}/*
          - Effect: Allow
            Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:Query
            - dynamodb:BatchWriteItem
            - dynamodb:Scan
            Resource:
            - Fn::GetAtt:
              - BSLSignLexicon
              - Arn
          - Effect: Allow
            Action:
            - sagemaker:InvokeEndpoint
            Resource:
            - Fn::Sub: arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/ndx-try-bsl-endpoint-${AWS::AccountId}
          - Effect: Allow
            Action:
            - bedrock:InvokeModel
            Resource:
            - Fn::Sub: arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
            - Fn::Sub: arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-lite-v1:0
          - Effect: Allow
            Action:
            - polly:SynthesizeSpeech
            Resource: '*'
          - Effect: Allow
            Action:
            - transcribe:StartTranscriptionJob
            - transcribe:GetTranscriptionJob
            Resource: '*'
          - Effect: Allow
            Action:
            - states:StartExecution
            Resource:
            - Fn::Sub: arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:*
          - Effect: Allow
            Action:
            - lambda:InvokeFunction
            Resource:
            - Fn::Sub: arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:ndx-try-bsl-text-to-gloss-${AWS::Region}
            - Fn::Sub: arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:ndx-try-bsl-gloss-to-video-${AWS::Region}
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  SeedDataRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: InnovationSandbox-ndx-bsl-seed
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: SeedDataPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:ListBucket
            - s3:DeleteObject
            Resource:
            - Fn::Sub: ${DataBucket.Arn}
            - Fn::Sub: ${DataBucket.Arn}/*
            - Fn::Sub: ${WebsiteBucket.Arn}
            - Fn::Sub: ${WebsiteBucket.Arn}/*
          - Effect: Allow
            Action:
            - dynamodb:PutItem
            - dynamodb:BatchWriteItem
            - dynamodb:Scan
            - dynamodb:DeleteItem
            Resource:
            - Fn::GetAtt:
              - BSLSignLexicon
              - Arn
          - Effect: Allow
            Action:
            - bedrock:GetFoundationModelAvailability
            - bedrock:ListFoundationModelAgreementOffers
            - bedrock:CreateFoundationModelAgreement
            Resource: '*'
          - Effect: Allow
            Action:
            - aws-marketplace:ViewSubscriptions
            - aws-marketplace:Subscribe
            Resource: '*'
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  SageMakerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: InnovationSandbox-ndx-bsl-sagemaker
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: sagemaker.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: SageMakerInferencePolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:ListBucket
            Resource:
            - Fn::Sub: ${DataBucket.Arn}
            - Fn::Sub: ${DataBucket.Arn}/*
          - Effect: Allow
            Action:
            - ecr:GetAuthorizationToken
            Resource: '*'
          - Effect: Allow
            Action:
            - ecr:BatchCheckLayerAvailability
            - ecr:GetDownloadUrlForLayer
            - ecr:BatchGetImage
            Resource: '*'
          - Effect: Allow
            Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
            Resource:
              Fn::Sub: arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/sagemaker/*
          - Effect: Allow
            Action:
            - cloudwatch:PutMetricData
            Resource: '*'
            Condition:
              StringEquals:
                cloudwatch:namespace: /aws/sagemaker/Endpoints
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  StepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: InnovationSandbox-ndx-bsl-sfn
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: states.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: StepFunctionsPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - lambda:InvokeFunction
            Resource:
            - Fn::GetAtt:
              - TextToGlossFunction
              - Arn
            - Fn::GetAtt:
              - GlossToVideoFunction
              - Arn
            - Fn::GetAtt:
              - ProcessTranscriptionFunction
              - Arn
          - Effect: Allow
            Action:
            - transcribe:StartTranscriptionJob
            - transcribe:GetTranscriptionJob
            Resource: '*'
          - Effect: Allow
            Action:
            - polly:SynthesizeSpeech
            Resource: '*'
          - Effect: Allow
            Action:
            - s3:PutObject
            - s3:GetObject
            Resource:
            - Fn::Sub: ${DataBucket.Arn}/output/*
            - Fn::Sub: ${DataBucket.Arn}/audio/*
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  BSL1KModel:
    Type: AWS::SageMaker::Model
    DependsOn: SeedDataCustomResource
    Properties:
      ModelName:
        Fn::Sub: ndx-try-bsl-model-v12-${AWS::AccountId}
      ExecutionRoleArn:
        Fn::GetAtt:
        - SageMakerExecutionRole
        - Arn
      PrimaryContainer:
        Image:
          Fn::Sub: 763104351884.dkr.ecr.${AWS::Region}.amazonaws.com/pytorch-inference:2.2.0-cpu-py310-ubuntu20.04-sagemaker
        ModelDataUrl:
          Fn::Sub: s3://${DataBucket}/models/model.tar.gz
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  BSL1KEndpointConfig:
    Type: AWS::SageMaker::EndpointConfig
    Properties:
      EndpointConfigName:
        Fn::Sub: ndx-try-bsl-endpoint-config-v12-${AWS::AccountId}
      ProductionVariants:
      - VariantName: primary
        ModelName:
          Fn::GetAtt:
          - BSL1KModel
          - ModelName
        InstanceType:
          Ref: SageMakerInstanceType
        InitialInstanceCount: 1
        InitialVariantWeight: 1.0
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  BSL1KEndpoint:
    Type: AWS::SageMaker::Endpoint
    Properties:
      EndpointName:
        Fn::Sub: ndx-try-bsl-endpoint-${AWS::AccountId}
      EndpointConfigName:
        Fn::GetAtt:
        - BSL1KEndpointConfig
        - EndpointConfigName
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  SeedDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: ndx-try-bsl-seed-data-${AWS::Region}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role:
        Fn::GetAtt:
        - SeedDataRole
        - Arn
      Timeout: 900
      MemorySize: 2048
      EphemeralStorage:
        Size: 5120
      CodeUri: s3://ndx-try-bsl-cfn-artifacts-360435283473/577b0098d8d7d5ffb8a83313fc5d68d9
      Environment:
        Variables:
          DATA_BUCKET:
            Ref: DataBucket
          WEBSITE_BUCKET:
            Ref: WebsiteBucket
          LEXICON_TABLE:
            Ref: BSLSignLexicon
          CLOUDFRONT_DOMAIN:
            Fn::GetAtt:
            - CloudFrontDistribution
            - DomainName
          USER_POOL_ID:
            Ref: UserPool
          USER_POOL_CLIENT_ID:
            Ref: UserPoolClient
          IDENTITY_POOL_ID:
            Ref: IdentityPool
          RECOGNISE_FUNCTION_URL:
            Fn::Sub: https://${BSLHttpApi}.execute-api.${AWS::Region}.amazonaws.com/recognise
          TEXT_TO_SIGN_FUNCTION_URL:
            Fn::Sub: https://${BSLHttpApi}.execute-api.${AWS::Region}.amazonaws.com/text-to-sign
          AWS_ACCOUNT_ID_PARAM:
            Ref: AWS::AccountId
      Tags:
        Project: ndx-try
        Scenario: bsl-sign-language
        AutoCleanup: 'true'
  SeedDataCustomResource:
    Type: Custom::SeedData
    Properties:
      ServiceToken:
        Fn::GetAtt:
        - SeedDataFunction
        - Arn
      Version: 1.2.0
  RecogniseFramesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName:
        Fn::Sub: ndx-try-bsl-recognise-${AWS::Region}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          SAGEMAKER_ENDPOINT:
            Fn::Sub: ndx-try-bsl-endpoint-${AWS::AccountId}
          DATA_BUCKET:
            Ref: DataBucket
      Code:
        ZipFile: "import json\nimport os\nimport boto3\nimport logging\n\nlogger =\
          \ logging.getLogger()\nlogger.setLevel(logging.INFO)\nsm = boto3.client('sagemaker-runtime')\n\
          bedrock = boto3.client('bedrock-runtime')\nENDPOINT = os.environ['SAGEMAKER_ENDPOINT']\n\
          \ndef lambda_handler(event, context):\n    try:\n        body = json.loads(event.get('body',\
          \ '{}'))\n        frames = body.get('frames', [])\n        batch_id = body.get('batchId',\
          \ 'unknown')\n        if not frames:\n            return resp(400, {'error':\
          \ 'No frames provided'})\n        r = sm.invoke_endpoint(\n            EndpointName=ENDPOINT,\
          \ ContentType='application/json',\n            Body=json.dumps({'frames':\
          \ frames, 'batchId': batch_id}))\n        result = json.loads(r['Body'].read().decode())\n\
          \        preds = result.get('predictions', [])\n        nova_desc = None\n\
          \        if preds and preds[0]['confidence'] < 0.70:\n            nova_desc\
          \ = validate_nova(frames, preds[0])\n        return resp(200, {'type': 'prediction',\
          \ 'batchId': batch_id,\n            'signs': preds, 'novaDescription': nova_desc})\n\
          \    except Exception as e:\n        logger.error(f'Error: {e}', exc_info=True)\n\
          \        return resp(500, {'error': str(e)})\n\ndef validate_nova(frames,\
          \ top_pred):\n    try:\n        mid = frames[len(frames) // 2]\n       \
          \ r = bedrock.invoke_model(modelId='amazon.nova-lite-v1:0',\n          \
          \  contentType='application/json', accept='application/json',\n        \
          \    body=json.dumps({'messages': [{'role': 'user', 'content': [\n     \
          \           {'image': {'format': 'jpeg', 'source': {'bytes': mid}}},\n \
          \               {'text': 'Describe what this person is doing with their\
          \ hands in detail.'}\n            ]}], 'inferenceConfig': {'maxTokens':\
          \ 200}}))\n        res = json.loads(r['body'].read().decode())\n       \
          \ return res.get('output', {}).get('message', {}).get('content', [{}])[0].get('text',\
          \ '')\n    except Exception as e:\n        logger.warning(f'Nova validation\
          \ failed: {e}')\n        return None\n\ndef resp(code, body):\n    return\
          \ {'statusCode': code,\n        'headers': {'Content-Type': 'application/json',\
          \ 'Access-Control-Allow-Origin': '*'},\n        'body': json.dumps(body)}\n"
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  BSLHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: ndx-try-bsl-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
        - '*'
        AllowMethods:
        - POST
        - OPTIONS
        AllowHeaders:
        - content-type
      Tags:
        Project: ndx-try
        Scenario: bsl-sign-language
        AutoCleanup: 'true'
  BSLHttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId:
        Ref: BSLHttpApi
      StageName: $default
      AutoDeploy: true
  RecogniseIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId:
        Ref: BSLHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::GetAtt:
        - RecogniseFramesFunction
        - Arn
      PayloadFormatVersion: '2.0'
  RecogniseRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Ref: BSLHttpApi
      RouteKey: POST /recognise
      Target:
        Fn::Sub: integrations/${RecogniseIntegration}
  RecogniseApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: RecogniseFramesFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${BSLHttpApi}/*/*/recognise
  RecogniseFramesLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${RecogniseFramesFunction}
      RetentionInDays: 7
  TextToGlossFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName:
        Fn::Sub: ndx-try-bsl-text-to-gloss-${AWS::Region}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
      Code:
        ZipFile: "import json\nimport os\nimport boto3\nimport logging\n\nlogger =\
          \ logging.getLogger()\nlogger.setLevel(logging.INFO)\nbedrock = boto3.client('bedrock-runtime')\n\
          MODEL_ID = os.environ.get('MODEL_ID', 'anthropic.claude-3-haiku-20240307-v1:0')\n\
          \nSYSTEM = \"\"\"You are a BSL gloss translator. Convert English to BSL\
          \ gloss:\n- Word order: TIME > TOPIC > COMMENT\n- Remove: articles (a/an/the),\
          \ copula (is/am/are/was/were), infinitive (to)\n- WH-questions: move to\
          \ end\n- Tense: PAST/FUTURE/NOW at start\n- Verbs: base form only, NOT after\
          \ verb for negation\n- Pronouns: IX-1P (I), IX-2P (you), IX-3P (he/she/they)\n\
          Return ONLY JSON: {\"gloss\":\"...\",\"glossWords\":[\"...\"]}\"\"\"\n\n\
          EXAMPLES = [\n    (\"What is your name?\", '{\"gloss\":\"NAME IX-2P WHAT\"\
          ,\"glossWords\":[\"NAME\",\"IX-2P\",\"WHAT\"]}'),\n    (\"I went to the\
          \ shops yesterday\", '{\"gloss\":\"YESTERDAY SHOP IX-1P GO\",\"glossWords\"\
          :[\"YESTERDAY\",\"SHOP\",\"IX-1P\",\"GO\"]}'),\n    (\"The council tax bill\
          \ has not been paid\", '{\"gloss\":\"COUNCIL TAX BILL PAY NOT\",\"glossWords\"\
          :[\"COUNCIL\",\"TAX\",\"BILL\",\"PAY\",\"NOT\"]}'),\n]\n\ndef lambda_handler(event,\
          \ context):\n    text = event.get('text', '')\n    if not text:\n      \
          \  return {'gloss': '', 'glossWords': [], 'originalText': ''}\n    msgs\
          \ = []\n    for eng, bsl in EXAMPLES:\n        msgs.append({'role': 'user',\
          \ 'content': [{'type': 'text', 'text': eng}]})\n        msgs.append({'role':\
          \ 'assistant', 'content': [{'type': 'text', 'text': bsl}]})\n    msgs.append({'role':\
          \ 'user', 'content': [{'type': 'text', 'text': text}]})\n    r = bedrock.invoke_model(modelId=MODEL_ID,\
          \ contentType='application/json',\n        accept='application/json', body=json.dumps({\n\
          \            'anthropic_version': 'bedrock-2023-05-31', 'max_tokens': 512,\n\
          \            'system': SYSTEM, 'messages': msgs}))\n    content = json.loads(r['body'].read().decode())['content'][0]['text']\n\
          \    try:\n        data = json.loads(content)\n        return {'gloss':\
          \ data.get('gloss', ''), 'glossWords': data.get('glossWords', []), 'originalText':\
          \ text}\n    except json.JSONDecodeError:\n        gloss = content.strip().upper()\n\
          \        return {'gloss': gloss, 'glossWords': gloss.split(), 'originalText':\
          \ text}\n"
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  TextToGlossLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${TextToGlossFunction}
      RetentionInDays: 7
  GlossToVideoFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName:
        Fn::Sub: ndx-try-bsl-gloss-to-video-${AWS::Region}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          DATA_BUCKET:
            Ref: DataBucket
          LEXICON_TABLE:
            Ref: BSLSignLexicon
      Code:
        ZipFile: "import json\nimport os\nimport uuid\nimport shutil\nimport subprocess\n\
          import logging\nimport boto3\nfrom boto3.dynamodb.conditions import Key\n\
          \nlogger = logging.getLogger()\nlogger.setLevel(logging.INFO)\ns3 = boto3.client('s3')\n\
          dynamodb = boto3.resource('dynamodb')\nBUCKET = os.environ['DATA_BUCKET']\n\
          TABLE = os.environ['LEXICON_TABLE']\nHAS_FFMPEG = shutil.which('ffmpeg')\
          \ is not None\n\ndef lambda_handler(event, context):\n    words = event.get('glossWords',\
          \ [])\n    if not words:\n        return {'videoUrl': '', 'videoUrls': [],\
          \ 'glossBreakdown': []}\n    table = dynamodb.Table(TABLE)\n    clip_keys,\
          \ breakdown = [], []\n    for w in words:\n        wu = w.upper().strip()\n\
          \        if wu.startswith('IX-'):\n            breakdown.append({'word':\
          \ w, 'source': 'index', 'type': 'index'})\n            continue\n      \
          \  r = table.query(KeyConditionExpression=Key('Gloss').eq(wu), ScanIndexForward=True)\n\
          \        items = r.get('Items', [])\n        if items:\n            best\
          \ = items[0]\n            clip_keys.append(best['VideoKey'])\n         \
          \   breakdown.append({'word': w, 'source': best['Source'], 'signId': best['SignId'],\
          \ 'type': 'sign'})\n        else:\n            for letter in [c for c in\
          \ wu if c.isalpha()]:\n                clip_keys.append(f'lexicon/fingerspelling/{letter}.mp4')\n\
          \            breakdown.append({'word': w, 'source': 'fingerspelling', 'type':\
          \ 'fingerspell'})\n    if not clip_keys:\n        return {'videoUrl': '',\
          \ 'videoUrls': [], 'glossBreakdown': breakdown}\n    # Generate pre-signed\
          \ URLs for each clip (for sequential playback)\n    clip_urls = []\n   \
          \ for ck in clip_keys:\n        try:\n            url = s3.generate_presigned_url('get_object',\n\
          \                Params={'Bucket': BUCKET, 'Key': ck}, ExpiresIn=3600)\n\
          \            clip_urls.append(url)\n        except Exception as e:\n   \
          \         logger.warning(f'Missing clip {ck}: {e}')\n    # If FFmpeg available\
          \ (Lambda Layer), stitch clips\n    if HAS_FFMPEG and len(clip_keys) > 1:\n\
          \        try:\n            local_clips = []\n            for i, ck in enumerate(clip_keys):\n\
          \                lp = f'/tmp/c_{i}.mp4'\n                s3.download_file(BUCKET,\
          \ ck, lp)\n                local_clips.append(lp)\n            out = f'/tmp/out_{uuid.uuid4().hex[:8]}.mp4'\n\
          \            lst = '/tmp/list.txt'\n            with open(lst, 'w') as f:\n\
          \                for c in local_clips:\n                    f.write(f\"\
          file '{c}'\\n\")\n            subprocess.run(['ffmpeg', '-y', '-f', 'concat',\
          \ '-safe', '0', '-i', lst,\n                '-c:v', 'libx264', '-preset',\
          \ 'ultrafast', '-an', out],\n                capture_output=True, timeout=90,\
          \ check=True)\n            key = f'output/{uuid.uuid4().hex}.mp4'\n    \
          \        s3.upload_file(out, BUCKET, key, ExtraArgs={'ContentType': 'video/mp4'})\n\
          \            stitched_url = s3.generate_presigned_url('get_object',\n  \
          \              Params={'Bucket': BUCKET, 'Key': key}, ExpiresIn=3600)\n\
          \            return {'videoUrl': stitched_url, 'videoUrls': clip_urls, 'glossBreakdown':\
          \ breakdown}\n        except Exception as e:\n            logger.warning(f'FFmpeg\
          \ stitch failed, using individual clips: {e}')\n    # Return first clip\
          \ URL as primary, all as sequential playlist\n    return {'videoUrl': clip_urls[0]\
          \ if clip_urls else '', 'videoUrls': clip_urls, 'glossBreakdown': breakdown}\n"
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  GlossToVideoLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${GlossToVideoFunction}
      RetentionInDays: 7
  ProcessTranscriptionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName:
        Fn::Sub: ndx-try-bsl-transcription-${AWS::Region}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          DATA_BUCKET:
            Ref: DataBucket
      Code:
        ZipFile: "import json\nimport os\nimport boto3\nimport logging\n\nlogger =\
          \ logging.getLogger()\nlogger.setLevel(logging.INFO)\ns3 = boto3.client('s3')\n\
          BUCKET = os.environ['DATA_BUCKET']\n\ndef lambda_handler(event, context):\n\
          \    tr = event.get('transcriptionResult', event)\n    uri = tr.get('TranscriptionJob',\
          \ {}).get('Transcript', {}).get('TranscriptFileUri', '')\n    if not uri:\n\
          \        uri = event.get('Transcript', {}).get('TranscriptFileUri', '')\n\
          \    if not uri:\n        return {'text': '', 'error': 'No transcript URI'}\n\
          \    if uri.startswith('s3://'):\n        parts = uri[5:].split('/', 1)\n\
          \        bucket, key = parts[0], parts[1]\n    elif 's3.amazonaws.com' in\
          \ uri or 's3-' in uri:\n        from urllib.parse import urlparse\n    \
          \    parsed = urlparse(uri)\n        pp = parsed.path.lstrip('/').split('/',\
          \ 1)\n        bucket, key = pp[0], pp[1] if len(pp) > 1 else ''\n    else:\n\
          \        bucket, key = BUCKET, uri.split('/')[-1]\n    r = s3.get_object(Bucket=bucket,\
          \ Key=key)\n    data = json.loads(r['Body'].read().decode())\n    transcripts\
          \ = data.get('results', {}).get('transcripts', [])\n    text = transcripts[0].get('transcript',\
          \ '') if transcripts else ''\n    logger.info(f'Transcribed: {text[:100]}')\n\
          \    return {'text': text}\n"
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  ProcessTranscriptionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${ProcessTranscriptionFunction}
      RetentionInDays: 7
  TextToSignFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName:
        Fn::Sub: ndx-try-bsl-text-to-sign-${AWS::Region}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          STATE_MACHINE_ARN:
            Ref: TextToSignStateMachine
          DATA_BUCKET:
            Ref: DataBucket
          TEXT_TO_GLOSS_FN:
            Fn::GetAtt:
            - TextToGlossFunction
            - Arn
          GLOSS_TO_VIDEO_FN:
            Fn::GetAtt:
            - GlossToVideoFunction
            - Arn
      Code:
        ZipFile: "import json\nimport os\nimport uuid\nimport boto3\nimport logging\n\
          \nlogger = logging.getLogger()\nlogger.setLevel(logging.INFO)\nlam = boto3.client('lambda')\n\
          sfn = boto3.client('stepfunctions')\n\ndef lambda_handler(event, context):\n\
          \    try:\n        body = json.loads(event.get('body', '{}'))\n        text\
          \ = body.get('text', '')\n        input_type = body.get('type', 'text')\n\
          \n        if input_type == 'audio':\n            # Audio path: use Step\
          \ Functions (async with Transcribe polling)\n            execution = sfn.start_execution(\n\
          \                stateMachineArn=os.environ['STATE_MACHINE_ARN'],\n    \
          \            name=f'bsl-{uuid.uuid4().hex[:8]}',\n                input=json.dumps({'text':\
          \ text, 'type': input_type, 'audioUri': body.get('audioUri', '')}))\n  \
          \          return resp(202, {'executionArn': execution['executionArn'],\
          \ 'status': 'RUNNING'})\n\n        # Text path: synchronous direct Lambda\
          \ invocation\n        # 1. Text to gloss\n        gloss_resp = lam.invoke(FunctionName=os.environ['TEXT_TO_GLOSS_FN'],\n\
          \            InvocationType='RequestResponse',\n            Payload=json.dumps({'text':\
          \ text}))\n        gloss_result = json.loads(gloss_resp['Payload'].read().decode())\n\
          \        logger.info(f'Gloss: {gloss_result.get(\"gloss\", \"\")}')\n\n\
          \        # 2. Gloss to video\n        video_resp = lam.invoke(FunctionName=os.environ['GLOSS_TO_VIDEO_FN'],\n\
          \            InvocationType='RequestResponse',\n            Payload=json.dumps({\n\
          \                'glossWords': gloss_result.get('glossWords', []),\n   \
          \             'gloss': gloss_result.get('gloss', '')}))\n        video_result\
          \ = json.loads(video_resp['Payload'].read().decode())\n\n        return\
          \ resp(200, {\n            'gloss': gloss_result.get('gloss', ''),\n   \
          \         'glossBreakdown': video_result.get('glossBreakdown', []),\n  \
          \          'videoUrl': video_result.get('videoUrl', ''),\n            'videoUrls':\
          \ video_result.get('videoUrls', []),\n            'originalText': text})\n\
          \    except Exception as e:\n        logger.error(f'Error: {e}', exc_info=True)\n\
          \        return resp(500, {'error': str(e)})\n\ndef resp(code, body):\n\
          \    return {'statusCode': code,\n        'headers': {'Content-Type': 'application/json',\
          \ 'Access-Control-Allow-Origin': '*'},\n        'body': json.dumps(body)}\n"
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
  TextToSignIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId:
        Ref: BSLHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::GetAtt:
        - TextToSignFunction
        - Arn
      PayloadFormatVersion: '2.0'
  TextToSignRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Ref: BSLHttpApi
      RouteKey: POST /text-to-sign
      Target:
        Fn::Sub: integrations/${TextToSignIntegration}
  TextToSignApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: TextToSignFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${BSLHttpApi}/*/*/text-to-sign
  TextToSignLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${TextToSignFunction}
      RetentionInDays: 7
  TextToSignStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: ndx-try-bsl-text-to-sign
      RoleArn:
        Fn::GetAtt:
        - StepFunctionsRole
        - Arn
      DefinitionString:
        Fn::Sub: "{\n  \"Comment\": \"BSL Text-to-Sign Translation Pipeline\",\n \
          \ \"StartAt\": \"InputCheck\",\n  \"States\": {\n    \"InputCheck\": {\n\
          \      \"Type\": \"Choice\",\n      \"Choices\": [\n        {\n        \
          \  \"Variable\": \"$.type\",\n          \"StringEquals\": \"audio\",\n \
          \         \"Next\": \"StartTranscription\"\n        }\n      ],\n      \"\
          Default\": \"TextToGloss\"\n    },\n    \"StartTranscription\": {\n    \
          \  \"Type\": \"Task\",\n      \"Resource\": \"arn:aws:states:::aws-sdk:transcribe:startTranscriptionJob\"\
          ,\n      \"Parameters\": {\n        \"TranscriptionJobName.$\": \"States.Format('bsl-{}',\
          \ $$.Execution.Name)\",\n        \"LanguageCode\": \"en-GB\",\n        \"\
          Media\": {\n          \"MediaFileUri.$\": \"$.audioUri\"\n        },\n \
          \       \"OutputBucketName\": \"${DataBucket}\"\n      },\n      \"ResultPath\"\
          : \"$.transcriptionJob\",\n      \"Next\": \"WaitForTranscription\"\n  \
          \  },\n    \"WaitForTranscription\": {\n      \"Type\": \"Wait\",\n    \
          \  \"Seconds\": 2,\n      \"Next\": \"CheckTranscription\"\n    },\n   \
          \ \"CheckTranscription\": {\n      \"Type\": \"Task\",\n      \"Resource\"\
          : \"arn:aws:states:::aws-sdk:transcribe:getTranscriptionJob\",\n      \"\
          Parameters\": {\n        \"TranscriptionJobName.$\": \"$.transcriptionJob.TranscriptionJob.TranscriptionJobName\"\
          \n      },\n      \"ResultPath\": \"$.transcriptionResult\",\n      \"Next\"\
          : \"IsTranscriptionComplete\"\n    },\n    \"IsTranscriptionComplete\":\
          \ {\n      \"Type\": \"Choice\",\n      \"Choices\": [\n        {\n    \
          \      \"Variable\": \"$.transcriptionResult.TranscriptionJob.TranscriptionJobStatus\"\
          ,\n          \"StringEquals\": \"COMPLETED\",\n          \"Next\": \"ProcessTranscription\"\
          \n        },\n        {\n          \"Variable\": \"$.transcriptionResult.TranscriptionJob.TranscriptionJobStatus\"\
          ,\n          \"StringEquals\": \"FAILED\",\n          \"Next\": \"TranscriptionFailed\"\
          \n        }\n      ],\n      \"Default\": \"WaitForTranscription\"\n   \
          \ },\n    \"ProcessTranscription\": {\n      \"Type\": \"Task\",\n     \
          \ \"Resource\": \"${ProcessTranscriptionFunction.Arn}\",\n      \"ResultPath\"\
          : \"$.processedText\",\n      \"Next\": \"TextToGlossFromTranscription\"\
          \n    },\n    \"TextToGlossFromTranscription\": {\n      \"Type\": \"Task\"\
          ,\n      \"Resource\": \"${TextToGlossFunction.Arn}\",\n      \"Parameters\"\
          : {\n        \"text.$\": \"$.processedText.text\"\n      },\n      \"ResultPath\"\
          : \"$.glossResult\",\n      \"Next\": \"GlossToVideo\",\n      \"Retry\"\
          : [\n        {\n          \"ErrorEquals\": [\"States.TaskFailed\"],\n  \
          \        \"IntervalSeconds\": 15,\n          \"MaxAttempts\": 5,\n     \
          \     \"BackoffRate\": 1.5\n        }\n      ]\n    },\n    \"TextToGloss\"\
          : {\n      \"Type\": \"Task\",\n      \"Resource\": \"${TextToGlossFunction.Arn}\"\
          ,\n      \"Parameters\": {\n        \"text.$\": \"$.text\"\n      },\n \
          \     \"ResultPath\": \"$.glossResult\",\n      \"Next\": \"ParallelVideoAndSpeech\"\
          ,\n      \"Retry\": [\n        {\n          \"ErrorEquals\": [\"States.TaskFailed\"\
          ],\n          \"IntervalSeconds\": 15,\n          \"MaxAttempts\": 5,\n\
          \          \"BackoffRate\": 1.5\n        }\n      ]\n    },\n    \"ParallelVideoAndSpeech\"\
          : {\n      \"Type\": \"Parallel\",\n      \"Branches\": [\n        {\n \
          \         \"StartAt\": \"GlossToVideoParallel\",\n          \"States\":\
          \ {\n            \"GlossToVideoParallel\": {\n              \"Type\": \"\
          Task\",\n              \"Resource\": \"${GlossToVideoFunction.Arn}\",\n\
          \              \"Parameters\": {\n                \"glossWords.$\": \"$.glossResult.glossWords\"\
          ,\n                \"gloss.$\": \"$.glossResult.gloss\"\n              },\n\
          \              \"Retry\": [\n                {\n                  \"ErrorEquals\"\
          : [\"States.TaskFailed\"],\n                  \"IntervalSeconds\": 2,\n\
          \                  \"MaxAttempts\": 3,\n                  \"BackoffRate\"\
          : 2.0\n                }\n              ],\n              \"End\": true\n\
          \            }\n          }\n        },\n        {\n          \"StartAt\"\
          : \"GenerateSpeech\",\n          \"States\": {\n            \"GenerateSpeech\"\
          : {\n              \"Type\": \"Task\",\n              \"Resource\": \"arn:aws:states:::aws-sdk:polly:synthesizeSpeech\"\
          ,\n              \"Parameters\": {\n                \"Engine\": \"neural\"\
          ,\n                \"LanguageCode\": \"en-GB\",\n                \"OutputFormat\"\
          : \"mp3\",\n                \"Text.$\": \"$.text\",\n                \"\
          VoiceId\": \"Amy\"\n              },\n              \"ResultPath\": \"$.speechResult\"\
          ,\n              \"End\": true\n            }\n          }\n        }\n\
          \      ],\n      \"ResultPath\": \"$.parallelResults\",\n      \"Next\"\
          : \"FormatOutput\"\n    },\n    \"GlossToVideo\": {\n      \"Type\": \"\
          Task\",\n      \"Resource\": \"${GlossToVideoFunction.Arn}\",\n      \"\
          Parameters\": {\n        \"glossWords.$\": \"$.glossResult.glossWords\"\
          ,\n        \"gloss.$\": \"$.glossResult.gloss\"\n      },\n      \"ResultPath\"\
          : \"$.videoResult\",\n      \"Retry\": [\n        {\n          \"ErrorEquals\"\
          : [\"States.TaskFailed\"],\n          \"IntervalSeconds\": 2,\n        \
          \  \"MaxAttempts\": 3,\n          \"BackoffRate\": 2.0\n        }\n    \
          \  ],\n      \"Next\": \"FormatOutputFromTranscription\"\n    },\n    \"\
          FormatOutput\": {\n      \"Type\": \"Pass\",\n      \"Parameters\": {\n\
          \        \"videoUrl.$\": \"$.parallelResults[0].videoUrl\",\n        \"\
          glossBreakdown.$\": \"$.parallelResults[0].glossBreakdown\",\n        \"\
          gloss.$\": \"$.glossResult.gloss\",\n        \"originalText.$\": \"$.text\"\
          \n      },\n      \"End\": true\n    },\n    \"FormatOutputFromTranscription\"\
          : {\n      \"Type\": \"Pass\",\n      \"Parameters\": {\n        \"videoUrl.$\"\
          : \"$.videoResult.videoUrl\",\n        \"glossBreakdown.$\": \"$.videoResult.glossBreakdown\"\
          ,\n        \"gloss.$\": \"$.glossResult.gloss\",\n        \"originalText.$\"\
          : \"$.processedText.text\"\n      },\n      \"End\": true\n    },\n    \"\
          TranscriptionFailed\": {\n      \"Type\": \"Fail\",\n      \"Error\": \"\
          TranscriptionFailed\",\n      \"Cause\": \"Amazon Transcribe job failed\"\
          \n    }\n  }\n}\n"
      Tags:
      - Key: Project
        Value: ndx-try
      - Key: Scenario
        Value: bsl-sign-language
      - Key: AutoCleanup
        Value: 'true'
