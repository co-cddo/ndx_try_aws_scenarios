<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSL Sign Language Translation - NDX:Try</title>
    <link rel="stylesheet" href="styles.css">
    <!-- TensorFlow.js + MediaPipe for browser-side pose overlay -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5.1675471629/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Runtime config (generated by seed Lambda) -->
    <script src="config.js"></script>

    <!-- Nav -->
    <nav class="nav" role="navigation" aria-label="Main navigation">
        <div class="nav-brand" aria-label="BSL Translation">BSL Translation</div>
        <div class="nav-modes" role="tablist" aria-label="Translation modes">
            <button class="nav-btn active" role="tab" aria-selected="true" data-mode="live"
                    aria-controls="live-panel" tabindex="0">Live Translation</button>
            <button class="nav-btn" role="tab" aria-selected="false" data-mode="practice"
                    aria-controls="practice-panel" tabindex="-1">Practice</button>
            <button class="nav-btn" role="tab" aria-selected="false" data-mode="kiosk"
                    aria-controls="kiosk-panel" tabindex="-1">Kiosk</button>
        </div>
        <div class="nav-user">
            <button class="nav-btn active" id="domHandBtn" aria-label="Dominant hand: Right"
                    style="font-size:0.8rem;padding:0.3rem 0.7rem;white-space:nowrap;">
                Dominant: <strong id="domHandLabel">Right</strong>
            </button>
            <span class="status-dot" id="statusDot" aria-label="Connection status: disconnected"></span>
            <button class="btn-auth" id="authBtn" aria-label="Sign in">Sign In</button>
        </div>
    </nav>

    <div class="app-container">
        <!-- ============ LIVE TRANSLATION MODE ============ -->
        <div class="live-mode" id="live-panel" role="tabpanel" aria-labelledby="live-tab">
            <div class="video-area" id="videoArea">
                <div class="camera-placeholder" id="cameraPlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                        <path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9.75a2.25 2.25 0 002.25-2.25V7.5a2.25 2.25 0 00-2.25-2.25H4.5A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z"/>
                    </svg>
                    <p>Camera access required for sign recognition</p>
                    <button class="btn-start-camera" id="startCameraBtn" aria-label="Start camera">
                        Start Camera
                    </button>
                </div>
                <video id="cameraVideo" autoplay playsinline style="display:none" aria-label="Camera feed"></video>
                <canvas id="overlayCanvas" style="display:none" aria-hidden="true"></canvas>

                <!-- PiP for BSL video output -->
                <div class="pip-overlay" id="pipOverlay" aria-label="BSL sign video">
                    <video id="pipVideo" autoplay aria-label="BSL sign language video output"></video>
                </div>

                <!-- Sentence transcript -->
                <div class="sentence-bar" id="sentenceBar" aria-live="polite">
                    <div class="sentence-text" id="sentenceText"></div>
                    <button class="sentence-clear" id="clearSentenceBtn" aria-label="Clear sentence" style="display:none">Clear</button>
                </div>

                <!-- Caption bar -->
                <div class="caption-bar" aria-live="polite" aria-atomic="true">
                    <div class="caption-text" id="captionText">Waiting for signs...</div>
                    <div class="caption-confidence" id="captionConfidence"></div>
                    <div class="nmf-indicators" id="nmfIndicators"></div>
                </div>
            </div>

            <!-- Text input panel -->
            <div class="text-panel" id="textPanel">
                <div class="text-panel-header">
                    <h3>Text → BSL</h3>
                    <button class="btn-speak" id="micBtn" aria-label="Dictate text">🎤 Dictate</button>
                </div>
                <div class="text-input-area">
                    <textarea id="textInput" placeholder="Type English text to translate to BSL..."
                              aria-label="English text input"></textarea>
                    <button class="btn-translate" id="translateBtn">Translate to BSL</button>
                    <div class="gloss-output" id="glossOutput" aria-label="BSL gloss output"
                         role="status" aria-live="polite"></div>
                    <button class="btn-speak" id="speakBtn" style="display:none"
                            aria-label="Read text aloud">🔊 Read Aloud</button>
                </div>
            </div>

            <button class="btn-toggle-panel" id="togglePanelBtn" aria-label="Toggle text panel">◀</button>
        </div>

        <!-- ============ PRACTICE MODE ============ -->
        <div class="practice-mode" id="practice-panel" role="tabpanel" aria-labelledby="practice-tab" hidden>
            <div class="practice-sets" role="radiogroup" aria-label="Practice sign sets">
                <button class="practice-set-btn active" data-set="greetings" role="radio" aria-checked="true">Greetings</button>
                <button class="practice-set-btn" data-set="questions" role="radio" aria-checked="false">Questions</button>
                <button class="practice-set-btn" data-set="actions" role="radio" aria-checked="false">Actions</button>
                <button class="practice-set-btn" data-set="descriptions" role="radio" aria-checked="false">Descriptions</button>
            </div>
            <div class="practice-target">
                <h2 id="practiceWord" aria-live="polite">HELLO</h2>
                <video id="practiceVideo" controls aria-label="Reference sign video"></video>
                <button class="btn-translate" id="nextSignBtn">Next Sign →</button>
            </div>
            <div class="practice-camera">
                <video id="practiceCameraVideo" autoplay playsinline aria-label="Practice camera"></video>
                <canvas id="practiceCanvas" aria-hidden="true"></canvas>
                <div class="practice-score" id="practiceScore" aria-live="polite">
                    <span class="star" aria-hidden="true">★</span>
                    <span class="star" aria-hidden="true">★</span>
                    <span class="star" aria-hidden="true">★</span>
                    <span class="star" aria-hidden="true">★</span>
                    <span class="star" aria-hidden="true">★</span>
                </div>
            </div>
            <div class="practice-progress">
                <span id="progressText">0 of 0 signs learned</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- ============ KIOSK MODE ============ -->
        <div class="kiosk-mode" id="kiosk-panel" role="tabpanel" aria-labelledby="kiosk-tab" hidden>
            <h1 class="kiosk-title">BSL Translation Service</h1>
            <div class="kiosk-buttons">
                <button class="kiosk-btn" id="kioskSignBtn" aria-label="I want to sign">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                        <path d="M10.05 4.575a1.575 1.575 0 10-3.15 0v3.15M10.05 4.575a1.575 1.575 0 013.15 0v1.575m-3.15-1.575v7.65m3.15-9.225a1.575 1.575 0 013.15 0v1.575m0 0v3.15m0-3.15a1.575 1.575 0 013.15 0M6.9 7.725a1.575 1.575 0 10-3.15 0v8.55a6.3 6.3 0 006.3 6.3h2.925a5.25 5.25 0 005.25-5.25v-4.5"/>
                    </svg>
                    I want to sign
                </button>
                <button class="kiosk-btn" id="kioskTypeBtn" aria-label="I want to type">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                        <path d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 01.865-.501 48.172 48.172 0 003.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z"/>
                    </svg>
                    I want to type
                </button>
            </div>
            <div class="kiosk-timeout" id="kioskTimeout" aria-live="polite">
                Session resets in <span id="kioskCountdown">120</span>s
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay" style="display:none" role="alert" aria-label="Loading">
        <div class="spinner"></div>
    </div>

    <script src="camera.js"></script>
    <script src="sign-dictionary.js"></script>
    <script src="sign-recogniser.js"></script>
    <script src="mediapipe-overlay.js"></script>
    <script src="api-client.js"></script>
    <script src="player.js"></script>
    <script src="practice.js"></script>
    <script src="kiosk.js"></script>
    <script src="app.js"></script>
</body>
</html>
