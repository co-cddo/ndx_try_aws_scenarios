                border-color: #00703c;
                border-style: solid;
              }
              .upload-icon {
                width: 80px;
                height: 80px;
                margin-bottom: 20px;
              }
              .upload-icon svg {
                width: 100%;
                height: 100%;
                fill: #505a5f;
              }
              .upload-zone h3 {
                font-size: 24px;
                margin-bottom: 10px;
              }
              .upload-zone p {
                color: #505a5f;
                margin-bottom: 15px;
              }
              .upload-zone .small {
                font-size: 16px;
                margin: 10px 0;
              }
              .file-info {
                display: none;
                background: #f8f8f8;
                padding: 15px;
                border-radius: 4px;
                margin-top: 15px;
              }
              .file-info.visible { display: block; }
              .file-info strong { color: #00703c; }
              .govuk-button {
                background: #00703c;
                color: white;
                border: none;
                padding: 10px 20px;
                font-size: 19px;
                font-weight: bold;
                cursor: pointer;
                text-decoration: none;
                display: inline-block;
                box-shadow: 0 2px 0 #002d18;
              }
              .govuk-button:hover { background: #005a30; }
              .govuk-button:focus {
                outline: 3px solid #ffdd00;
