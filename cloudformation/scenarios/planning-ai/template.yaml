              }
              .button-group {
                display: flex;
                gap: 15px;
                margin-top: 20px;
                flex-wrap: wrap;
              }
              #analyzeBtn {
                display: none;
              }
              #analyzeBtn.visible {
                display: inline-block;
              }
              .results {
                display: none;
                background: white;
                padding: 30px;
                border-radius: 8px;
                margin-top: 30px;
              }
              .results.visible { display: block; }
              .results h3 {
                font-size: 24px;
                margin-bottom: 20px;
                padding-bottom: 10px;
                border-bottom: 4px solid #1d70b8;
              }
              .loading {
                display: none;
                text-align: center;
                padding: 40px;
              }
              .loading.visible { display: block; }
              .loading-spinner {
                width: 50px;
                height: 50px;
                border: 4px solid #f3f2f1;
                border-top-color: #1d70b8;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin: 0 auto 20px;
              }
              @keyframes spin {
                to { transform: rotate(360deg); }
              }
              .extracted-data {
                background: #f8f8f8;
                padding: 20px;
                border-radius: 4px;
                margin-bottom: 20px;
              }
              .data-grid {
                display: grid;
                grid-template-columns: 200px 1fr;
                gap: 10px 20px;
              }
              .data-label {
                font-weight: bold;
                color: #505a5f;
              }
              .data-value { color: #0b0c0c; }
              .raw-text {
                background: #f0f4f8;
                padding: 20px;
                border-radius: 4px;
                margin-top: 20px;
                font-family: monospace;
                font-size: 14px;
                white-space: pre-wrap;
                max-height: 300px;
                overflow-y: auto;
                border-left: 4px solid #1d70b8;
              }
              .analysis-section {
                margin-top: 30px;
                padding: 20px;
                border-left: 4px solid #1d70b8;
                background: #f0f4f8;
              }
              .analysis-section h4 {
                font-size: 19px;
                margin-bottom: 15px;
              }
              .confidence-badge {
                display: inline-block;
                padding: 4px 12px;
                border-radius: 4px;
                font-size: 14px;
                font-weight: bold;
                margin-left: 10px;
              }
              .confidence-high { background: #00703c; color: white; }
              .confidence-medium { background: #f47738; color: white; }
              .confidence-low { background: #d4351c; color: white; }
              .textract-info {
                background: #d4edda;
                border-left: 4px solid #00703c;
                padding: 15px;
                margin-top: 20px;
                font-size: 16px;
              }
              .footer {
                background: #f3f2f1;
                padding: 20px;
                margin-top: 40px;
                border-top: 1px solid #b1b4b6;
                text-align: center;
                color: #505a5f;
                font-size: 14px;
              }
              @media (max-width: 768px) {
                h2 { font-size: 27px; }
                .lead { font-size: 19px; }
                .upload-zone { padding: 30px 20px; }
                .data-grid {
                  grid-template-columns: 1fr;
                }
                .button-group { flex-direction: column; }
              }
            </style>
          </head>
          <body>
            <a href="#main-content" class="skip-link">Skip to main content</a>

            <header class="header">
              <div class="header-content">
                <h1><span>NDX</span>:Try</h1>
                <span>Planning Application AI</span>
              </div>
            </header>

            <div class="banner">Powered by Amazon Textract + Amazon Bedrock AI</div>

            <div class="phase-banner">
              <div class="phase-banner-content">
                <span class="phase-tag">Sandbox</span>
                <span>Try the sample document to experience AI-powered document analysis</span>
              </div>
            </div>

            <main class="main" id="main-content">
              <h2>Analyze Planning Applications</h2>
              <p class="lead">Upload a planning application document to extract text with Amazon Textract and get AI-powered analysis from Amazon Bedrock — including committee summaries, completeness checks, and application classification.</p>

              <div class="upload-zone" id="uploadZone" role="region" aria-label="Document upload area">
                <div class="upload-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                  </svg>
                </div>
                <h3>Drag and drop your document here</h3>
                <p>Supported formats: PNG, JPG, PDF</p>
                <p class="small">or</p>
                <label class="file-label govuk-button govuk-button--secondary">
                  Choose file
                  <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.pdf" aria-label="Choose planning document file">
                </label>
                <div class="file-info" id="fileInfo" aria-live="polite">
                  <strong>Selected:</strong> <span id="fileName"></span>
                </div>
              </div>

              <div class="button-group">
                <button type="button" id="sampleBtn" class="govuk-button govuk-button--secondary">
                  Use Sample Document
                </button>
                <button type="button" id="analyzeBtn" class="govuk-button" aria-disabled="true">
                  Analyze with AI
                </button>
              </div>

              <div class="loading" id="loading" aria-live="polite">
                <div class="loading-spinner" aria-hidden="true"></div>
                <p><strong>Analyzing document with Amazon Textract + Bedrock AI...</strong></p>
                <p>Extracting text, generating committee summary, and checking completeness</p>
              </div>

              <div class="results" id="results" aria-live="polite">
                <div class="document-preview" id="documentPreview" style="margin-bottom: 30px; background: #f8f8f8; border: 2px solid #b1b4b6; border-radius: 5px; padding: 20px;">
                  <h3 style="margin-top: 0;">Document Analysed</h3>
                  <div id="documentPdfContainer" style="display: none;">
                    <embed id="documentPdf" type="application/pdf" width="100%" height="600px" style="border: 1px solid #dee0e2;" />
                  </div>
                  <div id="documentImageContainer" style="max-height: 500px; overflow-y: auto; border: 1px solid #dee0e2; background: #fff; display: none;">
                    <img id="documentImage" style="width: 100%; display: block;" alt="The planning application document that was analysed" />
                  </div>
                  <div id="documentTextContainer" style="max-height: 500px; overflow-y: auto; border: 1px solid #dee0e2; background: #fff; display: none; padding: 25px 30px;">
                    <pre id="documentText" style="white-space: pre-wrap; font-family: monospace; font-size: 14px; line-height: 1.6; margin: 0; color: #0b0c0c;"></pre>
                  </div>
                </div>

                <h3>AI Analysis Results</h3>

                <div class="ai-analysis" id="aiAnalysis">
                  <div class="ai-summary" id="aiSummary" style="border-left: 4px solid #00703c; background: #f0faf0; padding: 20px; margin-bottom: 20px;">
                    <h4 style="margin: 0 0 10px 0; font-size: 19px; color: #00703c;">Committee Summary</h4>
                    <p id="summaryText" style="font-size: 19px; line-height: 1.6; margin: 0;"></p>
                  </div>

                  <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px;">
                    <div class="ai-classification" id="aiClassification" style="flex: 1; min-width: 200px; background: #f8f8f8; padding: 15px; border-left: 4px solid #1d70b8;">
                      <h4 style="margin: 0 0 8px 0; font-size: 16px;">Application Type</h4>
                      <p style="margin: 0;"><span id="classType" style="font-weight: bold;"></span> <span id="classConfidence" class="confidence-badge"></span></p>
                      <p id="classReasoning" style="margin: 8px 0 0 0; font-size: 14px; color: #505a5f;"></p>
                    </div>

                    <div class="ai-completeness" id="aiCompleteness" style="flex: 1; min-width: 200px; background: #f8f8f8; padding: 15px; border-left: 4px solid #1d70b8;">
                      <h4 style="margin: 0 0 8px 0; font-size: 16px;">Completeness Check</h4>
                      <p style="margin: 0;"><span id="completenessStatus" class="confidence-badge"></span></p>
                      <p id="completenessNotes" style="margin: 8px 0 0 0; font-size: 14px; color: #505a5f;"></p>
                      <ul id="missingFields" style="margin: 8px 0 0 0; font-size: 14px; color: #d4351c;"></ul>
                    </div>
                  </div>

                  <div class="ai-error" id="aiError" style="display: none; background: #fef7e5; border-left: 4px solid #f47738; padding: 15px; margin-bottom: 20px;">
                    <p style="margin: 0; font-weight: bold;">AI analysis unavailable</p>
                    <p id="aiErrorMessage" style="margin: 5px 0 0 0; font-size: 14px;"></p>
                  </div>
                </div>

                <div class="extracted-data">
                  <h4 style="margin-bottom: 15px;">Extracted Application Details</h4>
                  <div class="data-grid" id="extractedData">
                    <!-- Populated by JavaScript -->
                  </div>
                </div>

                <div class="analysis-section">
                  <h4>Raw Extracted Text</h4>
                  <p style="margin-bottom: 10px;">Text extracted by Amazon Textract:</p>
                  <div class="raw-text" id="rawText"></div>
                </div>

                <div class="textract-info" id="textractInfo">
                  <strong>Amazon Textract + Bedrock AI Results:</strong>
                  <span id="textractStats"></span>
                </div>
              </div>
            </main>

            <footer class="footer">
              <p>NDX:Try Environment | Planning Application AI - Powered by Amazon Textract + Bedrock</p>
            </footer>

            <script>
              var uploadZone = document.getElementById("uploadZone");
              var fileInput = document.getElementById("fileInput");
              var fileInfo = document.getElementById("fileInfo");
              var fileName = document.getElementById("fileName");
              var analyzeBtn = document.getElementById("analyzeBtn");
              var sampleBtn = document.getElementById("sampleBtn");
              var loading = document.getElementById("loading");
              var results = document.getElementById("results");
              var selectedFile = null;
              var usingSample = false;
              var fileBase64 = null;
              var documentDataUrl = null;

              // Drag and drop handlers
              uploadZone.addEventListener("dragover", function(e) {
                e.preventDefault();
                uploadZone.classList.add("drag-over");
              });

              uploadZone.addEventListener("dragleave", function(e) {
                e.preventDefault();
                uploadZone.classList.remove("drag-over");
              });

              uploadZone.addEventListener("drop", function(e) {
                e.preventDefault();
                uploadZone.classList.remove("drag-over");
                var files = e.dataTransfer.files;
                if (files.length > 0) {
                  handleFile(files[0]);
                }
              });

              // File input change
              fileInput.addEventListener("change", function(e) {
                if (e.target.files.length > 0) {
                  handleFile(e.target.files[0]);
                }
              });

              function handleFile(file) {
                // Check file size (max 5MB for Textract sync)
                if (file.size > 5 * 1024 * 1024) {
                  alert("File too large. Maximum size is 5MB for Textract processing.");
                  return;
                }

                selectedFile = file;
                usingSample = false;
                fileName.textContent = file.name + " (" + formatFileSize(file.size) + ")";
                fileInfo.classList.add("visible");
                uploadZone.classList.add("has-file");

                // Read file as base64
                var reader = new FileReader();
                reader.onload = function(e) {
                  documentDataUrl = e.target.result;
                  fileBase64 = documentDataUrl.split(",")[1]; // Remove data:...;base64, prefix
                  analyzeBtn.classList.add("visible");
                  analyzeBtn.removeAttribute("aria-disabled");
                };
                reader.readAsDataURL(file);
              }

              function formatFileSize(bytes) {
                if (bytes < 1024) return bytes + " B";
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
                return (bytes / 1048576).toFixed(1) + " MB";
              }

              // Sample document button
              sampleBtn.addEventListener("click", function() {
                usingSample = true;
                selectedFile = null;
                fileBase64 = null;
                fileName.textContent = "sample-planning-application.pdf (17-page comprehensive application)";
                fileInfo.classList.add("visible");
                uploadZone.classList.add("has-file");
                analyzeBtn.classList.add("visible");
                analyzeBtn.removeAttribute("aria-disabled");
              });

              // Analyze button
              analyzeBtn.addEventListener("click", function() {
                if (!fileBase64 && !usingSample) return;

                loading.classList.add("visible");
                results.classList.remove("visible");
                uploadZone.style.display = "none";
                document.querySelector(".button-group").style.display = "none";

                var requestBody = usingSample
                  ? { useSample: true }
                  : { documentBase64: fileBase64, filename: selectedFile.name };

                fetch(window.location.href, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(requestBody)
                })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                  loading.classList.remove("visible");
                  if (data.error) {
                    alert("Error: " + data.error);
                    uploadZone.style.display = "block";
                    document.querySelector(".button-group").style.display = "flex";
                  } else {
                    displayResults(data);
                  }
                })
                .catch(function(error) {
                  loading.classList.remove("visible");
                  alert("Error analyzing document: " + error.message);
                  uploadZone.style.display = "block";
                  document.querySelector(".button-group").style.display = "flex";
                });
              });

              function displayResults(data) {
                results.classList.add("visible");

                // Document preview
                var pdfContainer = document.getElementById("documentPdfContainer");
                var imgContainer = document.getElementById("documentImageContainer");
                var textContainer = document.getElementById("documentTextContainer");
                pdfContainer.style.display = "none";
                imgContainer.style.display = "none";
                textContainer.style.display = "none";

                if (data.documentUrl) {
                  // PDF document - show embedded PDF viewer
                  document.getElementById("documentPdf").src = data.documentUrl;
                  pdfContainer.style.display = "block";
                } else if (documentDataUrl) {
                  // Uploaded file - show the image
                  document.getElementById("documentImage").src = documentDataUrl;
                  imgContainer.style.display = "block";
                } else if (data.rawText) {
                  // Fallback - show raw text
                  document.getElementById("documentText").textContent = data.rawText;
                  textContainer.style.display = "block";
                }

                // AI Analysis section
                var ai = data.aiAnalysis;
                var aiAnalysisDiv = document.getElementById("aiAnalysis");
                var aiErrorDiv = document.getElementById("aiError");
                var aiSummaryDiv = document.getElementById("aiSummary");
                var aiClassDiv = document.getElementById("aiClassification");
                var aiComplDiv = document.getElementById("aiCompleteness");

                if (ai && ai.error) {
                  // Bedrock failed - show warning
                  aiSummaryDiv.style.display = "none";
                  aiClassDiv.style.display = "none";
                  aiComplDiv.style.display = "none";
                  aiErrorDiv.style.display = "block";
                  document.getElementById("aiErrorMessage").textContent = ai.message || "AI analysis could not be completed.";
                } else if (ai) {
                  aiErrorDiv.style.display = "none";

                  // Committee Summary
                  if (ai.summary) {
                    document.getElementById("summaryText").textContent = ai.summary;
                    aiSummaryDiv.style.display = "block";
                  } else {
                    aiSummaryDiv.style.display = "none";
                  }

                  // Classification
                  if (ai.classification) {
                    document.getElementById("classType").textContent = ai.classification.applicationType || "Unknown";
                    var confBadge = document.getElementById("classConfidence");
                    var conf = (ai.classification.confidence || "").toLowerCase();
                    confBadge.textContent = conf;
                    confBadge.className = "confidence-badge confidence-" + conf;
                    document.getElementById("classReasoning").textContent = ai.classification.reasoning || "";
                    aiClassDiv.style.display = "block";
                  } else {
                    aiClassDiv.style.display = "none";
                  }

                  // Completeness
                  if (ai.completeness) {
                    var statusBadge = document.getElementById("completenessStatus");
                    var status = (ai.completeness.status || "").toLowerCase();
                    statusBadge.textContent = status;
                    statusBadge.className = "confidence-badge " + (status === "complete" ? "confidence-high" : "confidence-medium");
                    document.getElementById("completenessNotes").textContent = ai.completeness.notes || "";
                    var missingList = document.getElementById("missingFields");
                    missingList.innerHTML = "";
                    if (ai.completeness.missingFields && ai.completeness.missingFields.length > 0) {
                      ai.completeness.missingFields.forEach(function(field) {
                        var li = document.createElement("li");
                        li.textContent = field;
                        missingList.appendChild(li);
                      });
                    }
                    aiComplDiv.style.display = "block";
                  } else {
                    aiComplDiv.style.display = "none";
                  }
                } else {
                  aiAnalysisDiv.style.display = "none";
                }

                // Extracted structured data
                var extractedHtml = "";
                var fields = [
                  ["Application Reference", data.extractedData.applicationRef || "Not found"],
                  ["Applicant Name", data.extractedData.applicantName || "Not found"],
                  ["Site Address", data.extractedData.siteAddress || "Not found"],
                  ["Proposal Type", data.extractedData.proposalType || "Not found"],
                  ["Description", data.extractedData.description || "Not found"]
                ];
                fields.forEach(function(field) {
                  extractedHtml += '<div class="data-label">' + field[0] + '</div>';
                  extractedHtml += '<div class="data-value">' + field[1] + '</div>';
                });
                document.getElementById("extractedData").innerHTML = extractedHtml;

                // Raw text from Textract
                document.getElementById("rawText").textContent = data.rawText || "No text extracted";

                // Textract stats
                var stats = "Detected " + (data.textractStats.lineCount || 0) + " lines, " +
                           (data.textractStats.wordCount || 0) + " words. " +
                           "Average confidence: " + (data.textractStats.avgConfidence || 0).toFixed(1) + "%";
                document.getElementById("textractStats").textContent = stats;
              }
            </script>
          </body>
          </html>'''

