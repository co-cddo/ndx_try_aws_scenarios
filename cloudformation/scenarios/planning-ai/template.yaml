                box-shadow: none;
              }
              .govuk-button--secondary {
                background: #f3f2f1;
                color: #0b0c0c;
                box-shadow: 0 2px 0 #929191;
              }
              .govuk-button--secondary:hover { background: #dbdad9; }
              .govuk-button--secondary:focus {
                background: #ffdd00;
