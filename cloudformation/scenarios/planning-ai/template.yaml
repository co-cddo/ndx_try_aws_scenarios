AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  NDX:Try - Planning Application AI Scenario
  Intelligent document analysis using Amazon Textract for text extraction
  and Amazon Bedrock (Nova Pro) for AI-powered analysis including committee
  summaries, completeness checks, and application classification.
  Version: 3.0.0

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Scenario Configuration
        Parameters:
          - Environment

Parameters:
  Environment:
    Type: String
    Default: sandbox
    AllowedValues:
      - sandbox
      - development
      - production
    Description: Deployment environment


Resources:
  # S3 Bucket for Planning Documents
  PlanningDocsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ndx-try-planning-docs-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedOrigins:
              - '*'
            MaxAge: 3000
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: planning-ai
        - Key: AutoCleanup
          Value: 'true'

  # IAM Role for Lambda with Textract permissions
  PlanningAIRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ndx-try-planning-ai-role-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub '${PlanningDocsBucket.Arn}'
                  - !Sub '${PlanningDocsBucket.Arn}/*'
        - PolicyName: TextractAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - textract:DetectDocumentText
                  - textract:AnalyzeDocument
                Resource: '*'
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - 'arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0'
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: planning-ai

  # Lambda Function - Planning Document Analyzer with real Textract
  PlanningAnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ndx-try-planning-analyzer-${AWS::Region}'
      Description: Analyzes planning documents using Amazon Textract
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt PlanningAIRole.Arn
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          DOCUMENTS_BUCKET: !Ref PlanningDocsBucket
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          import json
          import boto3
          import uuid
          import base64
          import os
          from datetime import datetime

          s3 = boto3.client('s3')
          textract = boto3.client('textract')
          bedrock = boto3.client('bedrock-runtime', region_name='us-east-1')
          BUCKET = os.environ.get('DOCUMENTS_BUCKET', '')

          PLANNING_ANALYSIS_PROMPT = """You are a UK planning application analyst. Analyse the following planning application text and return a JSON response with exactly this structure:

          {
            "summary": "A 2-3 sentence committee-ready summary suitable for planning officer reports. Describe the applicant, location, and proposed development concisely.",
            "completeness": {
              "status": "complete or incomplete",
              "missingFields": ["list of any missing required fields"],
              "notes": "Brief explanation of completeness assessment"
            },
            "classification": {
              "applicationType": "One of: Householder, Full, Outline, Listed Building Consent, Change of Use, Advertisement, Prior Approval, Reserved Matters, Other",
              "confidence": "high, medium, or low",
              "reasoning": "One sentence explaining the classification"
            }
          }

          Respond ONLY with valid JSON. Do not include any text before or after the JSON object."""

          def analyze_with_bedrock(raw_text):
              """Call Amazon Bedrock Nova Pro for AI analysis of planning application"""
              try:
                  response = bedrock.invoke_model(
                      modelId='amazon.nova-pro-v1:0',
                      body=json.dumps({
                          "messages": [
                              {"role": "user", "content": [{"text": f"Analyse this planning application:\n\n{raw_text}"}]}
                          ],
                          "system": [{"text": PLANNING_ANALYSIS_PROMPT}],
                          "inferenceConfig": {
                              "max_new_tokens": 1024,
                              "temperature": 0.3
                          }
                      })
                  )
                  result = json.loads(response['body'].read())
                  ai_text = result['output']['message']['content'][0]['text']

                  try:
                      analysis = json.loads(ai_text)
                  except json.JSONDecodeError:
                      analysis = {
                          "summary": ai_text,
                          "completeness": None,
                          "classification": None
                      }

                  return analysis

              except Exception as e:
                  print(f"Bedrock error: {str(e)}")
                  return None

          def render_upload_html():
              """Render the Planning AI upload interface"""
              return '''<!DOCTYPE html>
          <html lang="en-GB">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Planning Application AI | NDX:Try</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                font-family: "GDS Transport", Arial, sans-serif;
                font-size: 19px;
                line-height: 1.5;
                color: #0b0c0c;
                background: #f3f2f1;
                min-height: 100vh;
              }
              .skip-link {
                position: absolute;
                left: -9999px;
                z-index: 1000;
              }
              .skip-link:focus {
                left: 10px;
                top: 10px;
                background: #ffdd00;
                padding: 8px 12px;
                outline: 3px solid #0b0c0c;
              }
              .header {
                background: #0b0c0c;
                padding: 10px 20px;
                color: white;
              }
              .header-content {
                max-width: 960px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                justify-content: space-between;
              }
              .header h1 {
                font-size: 24px;
                font-weight: bold;
                margin: 0;
              }
              .header h1 span { color: #00703c; }
              .banner {
                background: #1d70b8;
                color: white;
                padding: 8px 20px;
                text-align: center;
                font-size: 14px;
              }
              .phase-banner {
                background: #f3f2f1;
                padding: 10px 20px;
                border-bottom: 1px solid #b1b4b6;
              }
              .phase-banner-content {
                max-width: 960px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                gap: 10px;
              }
              .phase-tag {
                background: #00703c;
                color: white;
                padding: 2px 8px;
                font-size: 14px;
                font-weight: bold;
                text-transform: uppercase;
              }
              .main {
                max-width: 960px;
                margin: 0 auto;
                padding: 40px 20px;
              }
              h2 {
                font-size: 36px;
                font-weight: bold;
                margin-bottom: 20px;
              }
              .lead {
                font-size: 24px;
                color: #505a5f;
                margin-bottom: 30px;
              }
              .upload-zone {
                border: 3px dashed #b1b4b6;
