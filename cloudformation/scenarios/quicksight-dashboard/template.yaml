AWSTemplateFormatVersion: '2010-09-09'
Description: |
  NDX:Try - QuickSight Dashboard Scenario
  Real Amazon QuickSight analytics and reporting with council performance data.
  Uses Amazon QuickSight for business intelligence dashboards.
  Version: 3.0.0 (Auto-subscribe QuickSight, fix ISB sandbox deployment)

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Scenario Configuration
        Parameters:
          - Environment
          - SampleDataset

Parameters:
  Environment:
    Type: String
    Default: sandbox
    AllowedValues:
      - sandbox
      - development
      - production
    Description: Deployment environment (controls lifecycle rules and retention)

  SampleDataset:
    Type: String
    Default: council-metrics
    Description: Sample dataset identifier for council performance metrics

Resources:
  # ============================================================================
  # S3 BUCKET FOR QUICKSIGHT DATA
  # ============================================================================
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ndx-quicksight-data-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: quicksight-dashboard
        - Key: AutoCleanup
          Value: 'true'
        - Key: awsApplication
          Value: !GetAtt AppRegistryApplication.Arn

  # ============================================================================
  # S3 BUCKET POLICY - ALLOW QUICKSIGHT ACCESS
  # ============================================================================
  DataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowQuickSightServiceAccess
            Effect: Allow
            Principal:
              Service: quicksight.amazonaws.com
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - !GetAtt DataBucket.Arn
              - !Sub '${DataBucket.Arn}/*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  # ============================================================================
  # IAM ROLE FOR DATA GENERATOR LAMBDA
  # ============================================================================
  DataGeneratorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ndx-quicksight-data-generator-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3DataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:ListBucket
                  - s3:ListBucketVersions
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub '${DataBucket.Arn}/*'
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: quicksight-dashboard
        - Key: awsApplication
          Value: !GetAtt AppRegistryApplication.Arn

  # ============================================================================
  # DATA GENERATOR LAMBDA FUNCTION
  # ============================================================================
  DataGeneratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ndx-quicksight-data-generator-${AWS::Region}'
      Description: Generates sample council performance data for QuickSight
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DataGeneratorRole.Arn
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucket
          ACCOUNT_ID: !Ref AWS::AccountId
          REGION: !Ref AWS::Region
      Code:
        ZipFile: |
          import json
          import boto3
          import random
          import csv
          import urllib3
          from datetime import datetime, timedelta
          import os

          s3 = boto3.client('s3')
          http = urllib3.PoolManager()

          SERVICE_AREAS = [
              'Waste Collection', 'Planning Applications', 'Housing',
              'Council Tax', 'Highways', 'Environmental Health',
              'Benefits', 'Customer Services', 'Parking'
          ]

          REGIONS = [
              'London', 'South East', 'South West', 'West Midlands',
              'East Midlands', 'North West', 'North East', 'Yorkshire'
          ]

          def generate_council_data():
              """Generate 12 months of council performance data"""
              rows = []

              # Generate data for the last 12 months
              for month_offset in range(12):
                  month_date = datetime.now() - timedelta(days=30 * month_offset)
                  month_str = month_date.strftime('%Y-%m')

                  for region in REGIONS:
                      council_name = f'Demo {region} Council'

                      for service in SERVICE_AREAS:
                          # Generate realistic performance data
                          cases_received = random.randint(100, 500)
                          resolution_rate = random.uniform(0.75, 0.95)
                          cases_resolved = int(cases_received * resolution_rate)
                          avg_response_hours = round(random.uniform(12, 72), 1)
                          satisfaction_score = round(random.uniform(3.5, 4.8), 2)

                          rows.append({
                              'council_name': council_name,
                              'region': region,
                              'service_area': service,
                              'month': month_str,
                              'cases_received': cases_received,
                              'cases_resolved': cases_resolved,
                              'avg_response_hours': avg_response_hours,
                              'satisfaction_score': satisfaction_score
                          })

              return rows

          def write_csv_to_s3(bucket, key, data):
              """Write data as CSV to S3"""
              if not data:
                  raise ValueError("No data to write")

              # Create CSV content
              csv_buffer = []
              fieldnames = data[0].keys()

              # Add header
              csv_buffer.append(','.join(fieldnames))

              # Add rows
              for row in data:
                  csv_buffer.append(','.join(str(row[field]) for field in fieldnames))

              csv_content = '\n'.join(csv_buffer)

              # Upload to S3
              s3.put_object(
                  Bucket=bucket,
                  Key=key,
                  Body=csv_content.encode('utf-8'),
                  ContentType='text/csv'
              )

              return len(data)

          def create_manifest(bucket, region, data_key):
              """Create QuickSight manifest file"""
              manifest = {
                  "fileLocations": [
                      {
                          "URIs": [
                              f"https://{bucket}.s3.{region}.amazonaws.com/{data_key}"
                          ]
                      }
                  ],
                  "globalUploadSettings": {
                      "format": "CSV",
                      "delimiter": ",",
                      "textqualifier": "\"",
                      "containsHeader": True
                  }
              }

              return manifest

          def send_cfn_response(event, context, status, data=None, physical_id=None, reason=None):
              """Send CloudFormation custom resource response"""
              response_body = {
                  'Status': status,
                  'Reason': reason or f'See CloudWatch Log Stream: {context.log_stream_name}',
                  'PhysicalResourceId': physical_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              }

              json_response = json.dumps(response_body).encode('utf-8')

              headers = {
                  'Content-Type': 'application/json',
                  'Content-Length': str(len(json_response))
              }

              try:
                  http.request(
                      'PUT',
                      event['ResponseURL'],
                      body=json_response,
                      headers=headers
                  )
              except Exception as e:
                  print(f"Failed to send response: {str(e)}")

          def handler(event, context):
              """Lambda handler for Custom Resource and data generation"""
              print(f"Event: {json.dumps(event)}")

              # Get environment variables
              bucket = os.environ['DATA_BUCKET']
              region = os.environ['REGION']
              account_id = os.environ['ACCOUNT_ID']

              data_key = 'data/council-metrics.csv'
              manifest_key = 'manifests/council-data-manifest.json'

              # Check if this is a CloudFormation Custom Resource event
              request_type = event.get('RequestType')

              if request_type:
                  # This is a CloudFormation Custom Resource event
                  try:
                      if request_type in ['Create', 'Update']:
                          print("Generating sample data for QuickSight...")

                          # Generate data
                          data = generate_council_data()
                          row_count = write_csv_to_s3(bucket, data_key, data)

                          # Create manifest
                          manifest = create_manifest(bucket, region, data_key)
                          s3.put_object(
                              Bucket=bucket,
                              Key=manifest_key,
                              Body=json.dumps(manifest, indent=2).encode('utf-8'),
                              ContentType='application/json'
                          )

                          response_data = {
                              'RowCount': row_count,
                              'DataKey': data_key,
                              'ManifestKey': manifest_key,
                              'BucketName': bucket
                          }

                          send_cfn_response(
                              event, context, 'SUCCESS',
                              data=response_data,
                              physical_id=f'{bucket}-data-generator',
                              reason=f'Generated {row_count} rows of sample data'
                          )

                      elif request_type == 'Delete':
                          print("Emptying versioned bucket...")

                          try:
                              paginator = s3.get_paginator('list_object_versions')
                              for page in paginator.paginate(Bucket=bucket):
                                  objects = []
                                  for v in page.get('Versions', []):
                                      objects.append({'Key': v['Key'], 'VersionId': v['VersionId']})
                                  for dm in page.get('DeleteMarkers', []):
                                      objects.append({'Key': dm['Key'], 'VersionId': dm['VersionId']})
                                  if objects:
                                      s3.delete_objects(Bucket=bucket, Delete={'Objects': objects, 'Quiet': True})
                                      print(f"Deleted {len(objects)} object versions/markers")
                          except Exception as e:
                              print(f"Error emptying bucket: {str(e)}")

                          send_cfn_response(
                              event, context, 'SUCCESS',
                              physical_id=f'{bucket}-data-generator',
                              reason='Bucket emptied'
                          )

                  except Exception as e:
                      print(f"Error: {str(e)}")
                      send_cfn_response(
                          event, context, 'FAILED',
                          reason=str(e)
                      )

              else:
                  # Direct invocation (not CloudFormation)
                  try:
                      data = generate_council_data()
                      row_count = write_csv_to_s3(bucket, data_key, data)

                      manifest = create_manifest(bucket, region, data_key)
                      s3.put_object(
                          Bucket=bucket,
                          Key=manifest_key,
                          Body=json.dumps(manifest, indent=2).encode('utf-8'),
                          ContentType='application/json'
                      )

                      return {
                          'statusCode': 200,
                          'body': json.dumps({
                              'success': True,
                              'rowCount': row_count,
                              'dataKey': data_key,
                              'manifestKey': manifest_key
                          })
                      }

                  except Exception as e:
                      print(f"Error: {str(e)}")
                      return {
                          'statusCode': 500,
                          'body': json.dumps({
                              'success': False,
                              'error': str(e)
                          })
                      }
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: quicksight-dashboard
        - Key: awsApplication
          Value: !GetAtt AppRegistryApplication.Arn

  # ============================================================================
  # CLOUDWATCH LOG GROUP
  # ============================================================================
  DataGeneratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${DataGeneratorFunction}'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: quicksight-dashboard
        - Key: awsApplication
          Value: !GetAtt AppRegistryApplication.Arn

  # ============================================================================
  # CUSTOM RESOURCE - TRIGGER DATA GENERATION
  # ============================================================================
  DataGeneratorTrigger:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - DataBucket
      - DataBucketPolicy
      - DataGeneratorLogGroup
    Properties:
      ServiceToken: !GetAtt DataGeneratorFunction.Arn
      Timestamp: !Sub '${AWS::StackName}-${AWS::StackId}'

  # ============================================================================
  # QUICKSIGHT ACCOUNT SETUP - AUTO-SUBSCRIBE AND REGISTER ADMIN USER
  # ============================================================================
  QuickSightSetupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ndx-quicksight-setup-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: QuickSightSetup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - quicksight:CreateAccountSubscription
                  - quicksight:Subscribe
                  - quicksight:DescribeAccountSubscription
                  - quicksight:RegisterUser
                  - quicksight:ListUsers
                  - quicksight:DeleteUser
                  - quicksight:CreateGroup
                  - quicksight:DeleteGroup
                  - quicksight:CreateGroupMembership
                  - quicksight:DeleteGroupMembership
                  - quicksight:DeleteAccountSubscription
                  - quicksight:UpdateAccountSettings
                  - quicksight:UpdateSPICECapacityConfiguration
                  - quicksight:DescribeAccountSettings
                Resource: '*'
              - Effect: Allow
                Action:
                  - ds:AuthorizeApplication
                  - ds:CheckAlias
                  - ds:CreateAlias
                  - ds:CreateIdentityPoolDirectory
                  - ds:DeleteDirectory
                  - ds:DescribeDirectories
                  - ds:DescribeTrusts
                  - ds:UnauthorizeApplication
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:AWSServiceName: quicksight.amazonaws.com
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: quicksight-dashboard
        - Key: awsApplication
          Value: !GetAtt AppRegistryApplication.Arn

  QuickSightSetupFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ndx-quicksight-setup-${AWS::Region}'
      Description: Auto-subscribes QuickSight and registers an IAM admin user
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt QuickSightSetupRole.Arn
      Timeout: 600
      MemorySize: 128
      Code:
        ZipFile: |
          import json
          import boto3
          import time
          import urllib3

          qs = boto3.client('quicksight')
          sts = boto3.client('sts')
          http = urllib3.PoolManager()

          def send_cfn_response(event, context, status, data=None, physical_id=None, reason=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f'See CloudWatch Log Stream: {context.log_stream_name}',
                  'PhysicalResourceId': physical_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              }).encode('utf-8')
              try:
                  http.request('PUT', event['ResponseURL'], body=body,
                               headers={'Content-Type': 'application/json', 'Content-Length': str(len(body))})
              except Exception as e:
                  print(f"Failed to send response: {e}")

          def wait_for_active(account_id, timeout=480):
              """Poll until QuickSight subscription is ACCOUNT_CREATED."""
              deadline = time.time() + timeout
              while time.time() < deadline:
                  try:
                      resp = qs.describe_account_subscription(AwsAccountId=account_id)
                      status = resp['AccountInfo']['AccountSubscriptionStatus']
                      print(f"QuickSight status: {status}")
                      if status == 'ACCOUNT_CREATED':
                          return True
                      if status == 'SIGNING_UP_FAILED':
                          raise RuntimeError(f"QuickSight subscription failed: {status}")
                  except qs.exceptions.ResourceNotFoundException:
                      print("Subscription not found yet, retrying...")
                  time.sleep(15)
              raise TimeoutError("QuickSight did not become active in time")

          def wait_for_unsubscribed(account_id, timeout=480):
              """Poll until QuickSight subscription is gone."""
              deadline = time.time() + timeout
              while time.time() < deadline:
                  try:
                      resp = qs.describe_account_subscription(AwsAccountId=account_id)
                      status = resp['AccountInfo']['AccountSubscriptionStatus']
                      print(f"Waiting for unsubscribe, status: {status}")
                  except qs.exceptions.ResourceNotFoundException:
                      print("QuickSight subscription removed")
                      return True
                  time.sleep(15)
              raise TimeoutError("QuickSight did not unsubscribe in time")

          def ensure_admin_user(account_id):
              """Register an IAM admin user, return (user_arn, user_name)."""
              namespace = 'default'
              caller = sts.get_caller_identity()
              iam_arn = caller['Arn']
              # Use the role ARN (strip assumed-role session to get the role)
              # arn:aws:sts::ACCT:assumed-role/ROLE/session -> arn:aws:iam::ACCT:role/ROLE
              if ':assumed-role/' in iam_arn:
                  parts = iam_arn.split(':assumed-role/')
                  role_name = parts[1].split('/')[0]
                  acct = parts[0].split(':')[4]
                  iam_arn = f'arn:aws:iam::{acct}:role/{role_name}'

              session_name = 'ndx-admin'
              expected_user_name = f'{iam_arn}/ndx-admin'

              # Retry with backoff — QuickSight IAM integration can take time after subscription
              for attempt in range(6):
                  try:
                      resp = qs.register_user(
                          AwsAccountId=account_id,
                          Namespace=namespace,
                          IdentityType='IAM',
                          IamArn=iam_arn,
                          UserRole='ADMIN',
                          SessionName=session_name,
                          Email='ndx-quicksight@example.com'
                      )
                      user = resp['User']
                      print(f"Registered QuickSight user: {user['Arn']}")
                      return user['Arn'], user['UserName']
                  except qs.exceptions.ResourceExistsException:
                      print("User already exists, constructing ARN...")
                      region = qs.meta.region_name
                      arn = f'arn:aws:quicksight:{region}:{account_id}:user/{namespace}/{expected_user_name}'
                      print(f"User ARN: {arn}")
                      return arn, expected_user_name
                  except qs.exceptions.PreconditionNotMetException as e:
                      wait = 15 * (attempt + 1)
                      print(f"RegisterUser not ready (attempt {attempt+1}/6): {e}. Retrying in {wait}s...")
                      time.sleep(wait)
              raise RuntimeError("RegisterUser failed after retries — QuickSight IAM integration not ready")

          def ensure_group(account_id, admin_user_name, namespace='default'):
              """Create a group and add the admin user to it."""
              group_name = 'ndx-all-users'
              try:
                  qs.create_group(
                      AwsAccountId=account_id,
                      Namespace=namespace,
                      GroupName=group_name)
                  print(f"Created group: {group_name}")
              except qs.exceptions.ResourceExistsException:
                  print(f"Group {group_name} already exists")

              try:
                  qs.create_group_membership(
                      AwsAccountId=account_id,
                      Namespace=namespace,
                      GroupName=group_name,
                      MemberName=admin_user_name)
                  print(f"Added {admin_user_name} to group")
              except Exception as e:
                  print(f"Add admin to group: {e}")

              region = qs.meta.region_name
              return f'arn:aws:quicksight:{region}:{account_id}:group/{namespace}/{group_name}'

          def handler(event, context):
              print(f"Event: {json.dumps(event)}")
              account_id = event['ResourceProperties']['AccountId']
              request_type = event['RequestType']

              try:
                  if request_type in ['Create', 'Update']:
                      # Step 1: Ensure QuickSight is subscribed and active
                      need_subscribe = False
                      try:
                          sub = qs.describe_account_subscription(AwsAccountId=account_id)
                          status = sub['AccountInfo']['AccountSubscriptionStatus']
                          print(f"QuickSight already present, status: {status}")
                          if status == 'ACCOUNT_CREATED':
                              pass  # Already active
                          elif status == 'UNSUBSCRIBED':
                              # Fully unsubscribed — just resubscribe
                              need_subscribe = True
                          elif status == 'UNSUBSCRIBE_IN_PROGRESS':
                              print("Waiting for in-progress unsubscribe to finish...")
                              wait_for_unsubscribed(account_id)
                              need_subscribe = True
                          elif status == 'UNSUBSCRIBE_FAILED':
                              print("Cleaning up failed unsubscribe...")
                              try:
                                  qs.update_account_settings(
                                      AwsAccountId=account_id,
                                      DefaultNamespace='default',
                                      TerminationProtectionEnabled=False)
                              except Exception as e:
                                  print(f"disable termination protection: {e}")
                              try:
                                  qs.delete_account_subscription(AwsAccountId=account_id)
                              except Exception as e:
                                  print(f"delete_account_subscription: {e}")
                              wait_for_unsubscribed(account_id)
                              need_subscribe = True
                          else:
                              print("Waiting for existing subscription to become active...")
                              wait_for_active(account_id)
                      except qs.exceptions.ResourceNotFoundException:
                          need_subscribe = True

                      if need_subscribe:
                          print("Subscribing to QuickSight Enterprise (IAM_ONLY)...")
                          qs.create_account_subscription(
                              AwsAccountId=account_id,
                              Edition='ENTERPRISE',
                              AuthenticationMethod='IAM_ONLY',
                              AccountName=f'ndx-sandbox-{account_id}',
                              NotificationEmail='ndx-quicksight@example.com'
                          )
                          wait_for_active(account_id)

                      # Allow a brief settle after subscription becomes active
                      time.sleep(10)

                      # Step 2: Register admin user
                      user_arn, user_name = ensure_admin_user(account_id)

                      # Step 3: Enable SPICE auto-purchase
                      try:
                          qs.update_spice_capacity_configuration(
                              AwsAccountId=account_id,
                              PurchaseMode='AUTO_PURCHASE')
                          print("SPICE auto-purchase enabled")
                      except Exception as e:
                          print(f"SPICE config: {e}")

                      # Step 4: Create group and add admin user
                      group_arn = ensure_group(account_id, user_name)

                      send_cfn_response(event, context, 'SUCCESS',
                          data={'GroupArn': group_arn},
                          physical_id=f'qs-setup-{account_id}')

                  elif request_type == 'Delete':
                      # Only delete the admin user; leave the QuickSight
                      # subscription intact — AWS Nuke handles full cleanup.
                      print("Deleting QuickSight admin user...")
                      try:
                          qs.delete_user(
                              AwsAccountId=account_id,
                              Namespace='default',
                              UserName=f'ndx-qs-admin'
                          )
                      except Exception as e:
                          print(f"User cleanup (OK to ignore): {e}")

                      send_cfn_response(event, context, 'SUCCESS',
                          physical_id=f'qs-setup-{account_id}')

              except Exception as e:
                  print(f"Error: {e}")
                  send_cfn_response(event, context, 'FAILED', reason=str(e)[:200])
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: quicksight-dashboard
        - Key: awsApplication
          Value: !GetAtt AppRegistryApplication.Arn

  QuickSightSetupLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/ndx-quicksight-setup-${AWS::Region}'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: quicksight-dashboard
        - Key: awsApplication
          Value: !GetAtt AppRegistryApplication.Arn

  QuickSightSetupTrigger:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - QuickSightSetupLogGroup
    Properties:
      ServiceToken: !GetAtt QuickSightSetupFunction.Arn
      AccountId: !Ref AWS::AccountId

  # ============================================================================
  # AUTO-ADD QUICKSIGHT USERS TO ndx-all-users GROUP (EventBridge + Lambda)
  # ============================================================================
  QuickSightGroupSyncFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - QuickSightSetupTrigger    # Ensure QuickSight is subscribed & IAM role is propagated
    Properties:
      FunctionName: !Sub 'ndx-quicksight-group-sync-${AWS::Region}'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      MemorySize: 128
      Role: !GetAtt QuickSightSetupRole.Arn
      Environment:
        Variables:
          AWS_ACCOUNT_ID_PARAM: !Ref AWS::AccountId
          QUICKSIGHT_GROUP: ndx-all-users
          QUICKSIGHT_NAMESPACE: default
      Code:
        ZipFile: |
          import json
          import os
          import logging
          import boto3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          qs = boto3.client('quicksight')
          ACCOUNT_ID = os.environ['AWS_ACCOUNT_ID_PARAM']
          GROUP = os.environ['QUICKSIGHT_GROUP']
          NAMESPACE = os.environ['QUICKSIGHT_NAMESPACE']


          def extract_username(event):
              """Extract the QuickSight username from a CloudTrail event."""
              detail = event.get('detail', {})

              # 1. Response contains the created user object (RegisterUser API)
              resp_user = (detail.get('responseElements') or {}).get('user', {})
              if resp_user.get('userName'):
                  return resp_user['userName']

              # 2. Request parameters contain the target username (RegisterUser API)
              req_user = (detail.get('requestParameters') or {}).get('userName')
              if req_user:
                  return req_user

              # 3. Console self-provisioning (CreateUser service event)
              # Event uses "Role:Session" but QuickSight usernames use "Role/Session"
              svc = (detail.get('serviceEventDetails') or {})
              svc_user = (svc.get('eventRequestDetails') or {}).get('userName')
              if svc_user:
                  return svc_user.replace(':', '/', 1)

              # 4. Fallback: derive from IAM/SSO caller identity ARN
              arn = (detail.get('userIdentity') or {}).get('arn', '')
              if '/assumed-role/' in arn:
                  # arn:aws:sts::ACCT:assumed-role/RoleName/SessionName
                  return arn.split('/')[-1]

              return None


          def handler(event, context):
              logger.info('Event: %s', json.dumps(event))

              username = extract_username(event)
              if not username:
                  logger.warning('Could not extract username from event')
                  return {'status': 'skipped', 'reason': 'no username'}

              logger.info('Adding user %s to group %s', username, GROUP)
              try:
                  qs.create_group_membership(
                      MemberName=username,
                      GroupName=GROUP,
                      AwsAccountId=ACCOUNT_ID,
                      Namespace=NAMESPACE,
                  )
                  logger.info('Successfully added %s to %s', username, GROUP)
                  return {'status': 'added', 'username': username}
              except qs.exceptions.ResourceExistsException:
                  logger.info('User %s already in group %s', username, GROUP)
                  return {'status': 'already_member', 'username': username}
              except Exception:
                  logger.exception('Failed to add %s to group %s', username, GROUP)
                  return {'status': 'error', 'username': username}
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: quicksight-dashboard
        - Key: awsApplication
          Value: !GetAtt AppRegistryApplication.Arn

  QuickSightGroupSyncLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${QuickSightGroupSyncFunction}'
      RetentionInDays: 7

  QuickSightGroupSyncRule:
    Type: AWS::Events::Rule
    DependsOn:
      - QuickSightSetupTrigger    # No point enabling the rule before QuickSight exists
    Properties:
      Name: !Sub 'ndx-quicksight-user-sync-${AWS::Region}'
      Description: Auto-add new QuickSight users to ndx-all-users group
      State: ENABLED
      EventPattern:
        source:
          - aws.quicksight
        detail:
          eventSource:
            - quicksight.amazonaws.com
          eventName:
            - RegisterUser
            - BatchCreateUser
            - CreateUser
      Targets:
        - Id: QuickSightGroupSyncTarget
          Arn: !GetAtt QuickSightGroupSyncFunction.Arn

  QuickSightGroupSyncPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref QuickSightGroupSyncFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt QuickSightGroupSyncRule.Arn

  # ============================================================================
  # IAM ROLE FOR QUICKSIGHT S3 ACCESS (Story 25.2)
  # ============================================================================
  QuickSightS3AccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ndx-quicksight-s3-access-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: quicksight.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub '${DataBucket.Arn}/*'
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: quicksight-dashboard
        - Key: awsApplication
          Value: !GetAtt AppRegistryApplication.Arn

  # ============================================================================
  # QUICKSIGHT DATASOURCE - S3 MANIFEST (Story 25.2)
  # ============================================================================
  CouncilDataSource:
    Type: AWS::QuickSight::DataSource
    DependsOn:
      - DataGeneratorTrigger
      - QuickSightS3AccessRole
      - QuickSightSetupTrigger
    Properties:
      AwsAccountId: !Ref AWS::AccountId
      DataSourceId: !Sub 'ndx-council-data-source-${AWS::Region}'
      Name: NDX Council Performance Data
      Type: S3
      DataSourceParameters:
        S3Parameters:
          ManifestFileLocation:
            Bucket: !Ref DataBucket
            Key: manifests/council-data-manifest.json
          RoleArn: !GetAtt QuickSightS3AccessRole.Arn
      Permissions:
        - Principal: !Sub 'arn:aws:quicksight:${AWS::Region}:${AWS::AccountId}:group/default/ndx-all-users'
          Actions:
            - quicksight:DescribeDataSource
            - quicksight:DescribeDataSourcePermissions
            - quicksight:PassDataSource
            - quicksight:UpdateDataSource
            - quicksight:DeleteDataSource
            - quicksight:UpdateDataSourcePermissions
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: quicksight-dashboard
        - Key: awsApplication
          Value: !GetAtt AppRegistryApplication.Arn

  # ============================================================================
  # QUICKSIGHT DATASET - SPICE IMPORT (Story 25.3)
  # SPICE auto-purchase enabled via UpdateSPICECapacityConfiguration API
  # ============================================================================
  CouncilDataSet:
    Type: AWS::QuickSight::DataSet
    DependsOn:
      - CouncilDataSource
    Properties:
      AwsAccountId: !Ref AWS::AccountId
      DataSetId: !Sub 'ndx-council-data-set-${AWS::Region}'
      Name: NDX Council Performance DataSet
      ImportMode: SPICE
      PhysicalTableMap:
        CouncilDataPhysical:
          S3Source:
            DataSourceArn: !GetAtt CouncilDataSource.Arn
            InputColumns:
              - Name: council_name
                Type: STRING
              - Name: region
                Type: STRING
              - Name: service_area
                Type: STRING
              - Name: month
                Type: STRING
              - Name: cases_received
                Type: STRING
              - Name: cases_resolved
                Type: STRING
              - Name: avg_response_hours
                Type: STRING
              - Name: satisfaction_score
                Type: STRING
            UploadSettings:
              ContainsHeader: true
              Delimiter: ','
              Format: CSV
              TextQualifier: DOUBLE_QUOTE
      LogicalTableMap:
        CouncilDataLogical:
          Alias: Council Performance Data
          Source:
            PhysicalTableId: CouncilDataPhysical
          DataTransforms:
            # Cast numeric columns from STRING to proper types
            - CastColumnTypeOperation:
                ColumnName: cases_received
                NewColumnType: INTEGER
            - CastColumnTypeOperation:
                ColumnName: cases_resolved
                NewColumnType: INTEGER
            - CastColumnTypeOperation:
                ColumnName: avg_response_hours
                NewColumnType: DECIMAL
            - CastColumnTypeOperation:
                ColumnName: satisfaction_score
                NewColumnType: DECIMAL
            # Add calculated column for resolution rate
            - CreateColumnsOperation:
                Columns:
                  - ColumnId: resolution_rate
                    ColumnName: resolution_rate
                    Expression: '{cases_resolved} / {cases_received}'
      Permissions:
        - Principal: !Sub 'arn:aws:quicksight:${AWS::Region}:${AWS::AccountId}:group/default/ndx-all-users'
          Actions:
            - quicksight:DescribeDataSet
            - quicksight:DescribeDataSetPermissions
            - quicksight:PassDataSet
            - quicksight:DescribeIngestion
            - quicksight:ListIngestions
            - quicksight:UpdateDataSet
            - quicksight:DeleteDataSet
            - quicksight:CreateIngestion
            - quicksight:CancelIngestion
            - quicksight:UpdateDataSetPermissions
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: quicksight-dashboard
        - Key: awsApplication
          Value: !GetAtt AppRegistryApplication.Arn

  # ============================================================================
  # QUICKSIGHT DASHBOARD (Story 25.4)
  # ============================================================================
  CouncilDashboard:
    Type: AWS::QuickSight::Dashboard
    DependsOn:
      - CouncilDataSet
    Properties:
      AwsAccountId: !Ref AWS::AccountId
      DashboardId: !Sub 'ndx-council-dashboard-${AWS::Region}'
      Name: NDX Council Performance Dashboard
      VersionDescription: 'Version 2.0 - Dashboard with filters for Service Area and Region'
      Definition:
        DataSetIdentifierDeclarations:
          - Identifier: CouncilData
            DataSetArn: !GetAtt CouncilDataSet.Arn
        # FilterGroups for dashboard interactivity (Story 25.5)
        FilterGroups:
          - FilterGroupId: service-area-filter-group
            Filters:
              - CategoryFilter:
                  FilterId: service-area-filter
                  Column:
                    DataSetIdentifier: CouncilData
                    ColumnName: service_area
                  Configuration:
                    FilterListConfiguration:
                      MatchOperator: CONTAINS
                      SelectAllOptions: FILTER_ALL_VALUES
            ScopeConfiguration:
              SelectedSheets:
                SheetVisualScopingConfigurations:
                  - SheetId: main-dashboard
                    Scope: ALL_VISUALS
            CrossDataset: ALL_DATASETS
            Status: ENABLED
          - FilterGroupId: region-filter-group
            Filters:
              - CategoryFilter:
                  FilterId: region-filter
                  Column:
                    DataSetIdentifier: CouncilData
                    ColumnName: region
                  Configuration:
                    FilterListConfiguration:
                      MatchOperator: CONTAINS
                      SelectAllOptions: FILTER_ALL_VALUES
            ScopeConfiguration:
              SelectedSheets:
                SheetVisualScopingConfigurations:
                  - SheetId: main-dashboard
                    Scope: ALL_VISUALS
            CrossDataset: ALL_DATASETS
            Status: ENABLED
        Sheets:
          - SheetId: main-dashboard
            Name: Council Performance Overview
            ContentType: INTERACTIVE
            # FilterControls for user interaction (Story 25.5)
            FilterControls:
              - Dropdown:
                  FilterControlId: service-area-dropdown
                  Title: Service Area
                  SourceFilterId: service-area-filter
                  Type: MULTI_SELECT
              - Dropdown:
                  FilterControlId: region-dropdown
                  Title: Region
                  SourceFilterId: region-filter
                  Type: MULTI_SELECT
            Visuals:
              # KPI Visual - Total Cases
              - KPIVisual:
                  VisualId: kpi-total-cases
                  Title:
                    Visibility: VISIBLE
                    FormatText:
                      PlainText: Total Cases Received
                  ChartConfiguration:
                    FieldWells:
                      Values:
                        - NumericalMeasureField:
                            FieldId: total-cases-field
                            Column:
                              DataSetIdentifier: CouncilData
                              ColumnName: cases_received
                            AggregationFunction:
                              SimpleNumericalAggregation: SUM
              # KPI Visual - Resolution Rate
              - KPIVisual:
                  VisualId: kpi-resolution-rate
                  Title:
                    Visibility: VISIBLE
                    FormatText:
                      PlainText: Average Resolution Rate
                  ChartConfiguration:
                    FieldWells:
                      Values:
                        - NumericalMeasureField:
                            FieldId: resolution-rate-field
                            Column:
                              DataSetIdentifier: CouncilData
                              ColumnName: resolution_rate
                            AggregationFunction:
                              SimpleNumericalAggregation: AVERAGE
              # KPI Visual - Satisfaction Score
              - KPIVisual:
                  VisualId: kpi-satisfaction
                  Title:
                    Visibility: VISIBLE
                    FormatText:
                      PlainText: Average Satisfaction Score
                  ChartConfiguration:
                    FieldWells:
                      Values:
                        - NumericalMeasureField:
                            FieldId: satisfaction-field
                            Column:
                              DataSetIdentifier: CouncilData
                              ColumnName: satisfaction_score
                            AggregationFunction:
                              SimpleNumericalAggregation: AVERAGE
              # Bar Chart - Cases by Service Area
              - BarChartVisual:
                  VisualId: bar-cases-by-service
                  Title:
                    Visibility: VISIBLE
                    FormatText:
                      PlainText: Cases by Service Area
                  ChartConfiguration:
                    FieldWells:
                      BarChartAggregatedFieldWells:
                        Category:
                          - CategoricalDimensionField:
                              FieldId: service-category-field
                              Column:
                                DataSetIdentifier: CouncilData
                                ColumnName: service_area
                        Values:
                          - NumericalMeasureField:
                              FieldId: cases-value-field
                              Column:
                                DataSetIdentifier: CouncilData
                                ColumnName: cases_received
                              AggregationFunction:
                                SimpleNumericalAggregation: SUM
                    Orientation: HORIZONTAL
                    BarsArrangement: CLUSTERED
              # Bar Chart - Satisfaction by Service Area
              - BarChartVisual:
                  VisualId: bar-satisfaction-by-service
                  Title:
                    Visibility: VISIBLE
                    FormatText:
                      PlainText: Satisfaction by Service Area
                  ChartConfiguration:
                    FieldWells:
                      BarChartAggregatedFieldWells:
                        Category:
                          - CategoricalDimensionField:
                              FieldId: service-satisfaction-category
                              Column:
                                DataSetIdentifier: CouncilData
                                ColumnName: service_area
                        Values:
                          - NumericalMeasureField:
                              FieldId: satisfaction-value-field
                              Column:
                                DataSetIdentifier: CouncilData
                                ColumnName: satisfaction_score
                              AggregationFunction:
                                SimpleNumericalAggregation: AVERAGE
                    Orientation: HORIZONTAL
                    BarsArrangement: CLUSTERED
              # Table Visual - Service Breakdown
              - TableVisual:
                  VisualId: table-service-breakdown
                  Title:
                    Visibility: VISIBLE
                    FormatText:
                      PlainText: Service Performance Breakdown
                  ChartConfiguration:
                    FieldWells:
                      TableAggregatedFieldWells:
                        GroupBy:
                          - CategoricalDimensionField:
                              FieldId: table-service-field
                              Column:
                                DataSetIdentifier: CouncilData
                                ColumnName: service_area
                          - CategoricalDimensionField:
                              FieldId: table-region-field
                              Column:
                                DataSetIdentifier: CouncilData
                                ColumnName: region
                        Values:
                          - NumericalMeasureField:
                              FieldId: table-cases-field
                              Column:
                                DataSetIdentifier: CouncilData
                                ColumnName: cases_received
                              AggregationFunction:
                                SimpleNumericalAggregation: SUM
                          - NumericalMeasureField:
                              FieldId: table-resolved-field
                              Column:
                                DataSetIdentifier: CouncilData
                                ColumnName: cases_resolved
                              AggregationFunction:
                                SimpleNumericalAggregation: SUM
                          - NumericalMeasureField:
                              FieldId: table-satisfaction-field
                              Column:
                                DataSetIdentifier: CouncilData
                                ColumnName: satisfaction_score
                              AggregationFunction:
                                SimpleNumericalAggregation: AVERAGE
      Permissions:
        - Principal: !Sub 'arn:aws:quicksight:${AWS::Region}:${AWS::AccountId}:group/default/ndx-all-users'
          Actions:
            - quicksight:DescribeDashboard
            - quicksight:ListDashboardVersions
            - quicksight:UpdateDashboardPermissions
            - quicksight:QueryDashboard
            - quicksight:UpdateDashboard
            - quicksight:DeleteDashboard
            - quicksight:UpdateDashboardPublishedVersion
            - quicksight:DescribeDashboardPermissions
      Tags:
        - Key: Project
          Value: ndx-try
        - Key: Scenario
          Value: quicksight-dashboard
        - Key: awsApplication
          Value: !GetAtt AppRegistryApplication.Arn

  # AppRegistry Application - visible in myApplications on the AWS Console
  AppRegistryApplication:
    Type: AWS::ServiceCatalogAppRegistry::Application
    Properties:
      Name: !Sub 'NDXTry_QuickSight_Dashboard_${AWS::AccountId}'
      Description: 'NDX:Try - Service performance analytics with Amazon QuickSight'
      Tags:
        Project: ndx-try
        Scenario: quicksight-dashboard

  AppRegistryAssociation:
    Type: AWS::ServiceCatalogAppRegistry::ResourceAssociation
    Properties:
      Application: !GetAtt AppRegistryApplication.Id
      Resource: !Ref 'AWS::StackId'
      ResourceType: CFN_STACK

# ============================================================================
# OUTPUTS
# ============================================================================
Outputs:
  DataBucket:
    Description: S3 bucket name for QuickSight data
    Value: !Ref DataBucket
    Export:
      Name: !Sub '${AWS::StackName}-DataBucket'

  DataBucketArn:
    Description: S3 bucket ARN for QuickSight data
    Value: !GetAtt DataBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DataBucketArn'

  DataGeneratorFunctionArn:
    Description: Lambda function ARN for data generation
    Value: !GetAtt DataGeneratorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DataGeneratorFunctionArn'

  ManifestKey:
    Description: S3 key for QuickSight manifest file
    Value: manifests/council-data-manifest.json
    Export:
      Name: !Sub '${AWS::StackName}-ManifestKey'

  DataKey:
    Description: S3 key for council metrics CSV file
    Value: data/council-metrics.csv
    Export:
      Name: !Sub '${AWS::StackName}-DataKey'

  ManifestUri:
    Description: Full S3 URI for QuickSight manifest (use for DataSource creation)
    Value: !Sub 's3://${DataBucket}/manifests/council-data-manifest.json'
    Export:
      Name: !Sub '${AWS::StackName}-ManifestUri'

  DataUri:
    Description: Full S3 URI for council metrics data
    Value: !Sub 's3://${DataBucket}/data/council-metrics.csv'
    Export:
      Name: !Sub '${AWS::StackName}-DataUri'

  DataSourceArn:
    Description: QuickSight DataSource ARN
    Value: !GetAtt CouncilDataSource.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DataSourceArn'

  DataSourceId:
    Description: QuickSight DataSource ID
    Value: !Sub 'ndx-council-data-source-${AWS::Region}'
    Export:
      Name: !Sub '${AWS::StackName}-DataSourceId'

  QuickSightS3RoleArn:
    Description: IAM Role ARN for QuickSight S3 access
    Value: !GetAtt QuickSightS3AccessRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QuickSightS3RoleArn'

  DataSetArn:
    Description: QuickSight DataSet ARN
    Value: !GetAtt CouncilDataSet.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DataSetArn'

  DataSetId:
    Description: QuickSight DataSet ID
    Value: !Sub 'ndx-council-data-set-${AWS::Region}'
    Export:
      Name: !Sub '${AWS::StackName}-DataSetId'

  DashboardArn:
    Description: QuickSight Dashboard ARN
    Value: !GetAtt CouncilDashboard.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DashboardArn'

  DashboardId:
    Description: QuickSight Dashboard ID
    Value: !Sub 'ndx-council-dashboard-${AWS::Region}'
    Export:
      Name: !Sub '${AWS::StackName}-DashboardId'

  DashboardUrl:
    Description: QuickSight Dashboard Console URL
    Value: !Sub 'https://${AWS::Region}.quicksight.aws.amazon.com/sn/dashboards/ndx-council-dashboard-${AWS::Region}'
    Export:
      Name: !Sub '${AWS::StackName}-DashboardUrl'

  ScenarioInfo:
    Description: NDX:Try scenario information
    Value: !Sub |
      {
        "scenario": "quicksight-dashboard",
        "version": "3.0.0",
        "story": "Auto-subscribe QuickSight, fix ISB sandbox deployment",
        "environment": "${Environment}",
        "dataset": "${SampleDataset}",
        "services": ["S3", "Lambda", "QuickSight", "CloudFormation"],
        "features": ["KPI Visuals", "Bar Charts", "Data Table", "Filters"],
        "nextStories": ["25.6 - Integration Testing"]
      }
