      height: 1080

    - id: knowledge-update
      filename: explore-knowledge-update.png
      alt: "S3 bucket containing knowledge base documents"
      caption: "Add your own council documents to expand the chatbot's knowledge"
      width: 1920
      height: 1080

  limits:
    - id: boundary-testing
      filename: explore-boundary-testing.png
      alt: "Chatbot response showing how it handles off-topic questions appropriately"
      caption: "The chatbot stays on-topic and handles inappropriate requests safely"
