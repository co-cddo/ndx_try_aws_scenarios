# Screenshot data for Smart Car Park scenario (Story 13.2)
# Used by screenshot.njk component to display S3-hosted screenshots
# S3 Base: https://ndx-try-screenshots.s3.us-east-1.amazonaws.com/current/smart-car-park/

scenario: smart-car-park
scenarioTitle: "Smart Car Park IoT"
awsService: "AWS IoT Core"
totalSteps: 4

# Step-specific screenshots
steps:
  - step: 1
    title: "Access the Dashboard"
    screenshots:
      - id: cloudformation-outputs
        filename: step-1-cloudformation-outputs.png
        alt: "CloudFormation stack outputs showing DashboardURL and CloudWatchDashboardURL"
        caption: "Find both dashboard URLs in your CloudFormation stack Outputs tab"
        width: 1920
        height: 1080
        annotations:
          - number: 1
            x: "10%"
            y: "42%"
            label: "DashboardURL output"
            arrow: "right"

      - id: function-url-dashboard
        filename: step-1-function-url-dashboard.png
        alt: "Function URL HTML dashboard showing zone cards, overall stats, and 24-hour sparkline"
        caption: "The Function URL dashboard provides instant access to live occupancy data"
        width: 1920
        height: 1080

      - id: cloudwatch-dashboard
        filename: step-1-cloudwatch-dashboard.png
        alt: "CloudWatch console dashboard with 4 metric widgets showing occupancy data"
        caption: "CloudWatch dashboard offers deeper metric exploration and time range controls"
        width: 1920
        height: 1080

  - step: 2
    title: "View Real-Time Data"
    screenshots:
      - id: occupied-spaces-widget
        filename: step-2-occupied-spaces-widget.png
        alt: "Line graph widget showing occupied spaces count over 24 hours with daily patterns"
        caption: "Occupied Spaces Over Time widget shows clear peak and off-peak patterns"
        width: 1920
        height: 1080
        annotations:
          - number: 1
            x: "36%"
            y: "30%"
            label: "24-hour occupancy line"
            arrow: "down"

      - id: zone-breakdown-widget
        filename: step-2-zone-breakdown-widget.png
        alt: "Stacked area chart showing occupancy by zone: Ground Floor, Level 1, Level 2"
        caption: "Zone breakdown reveals Ground Floor fills first, Level 2 has most availability"
        width: 1920
        height: 1080

  - step: 3
    title: "Understand IoT Data Flow"
    screenshots:
      - id: iot-core-topic-rule
        filename: step-3-iot-core-topic-rule.png
        alt: "AWS IoT Core console showing the TopicRule routing sensor batch messages to Lambda"
        caption: "IoT Core TopicRule routes batch MQTT messages to the processor Lambda"
        width: 1920
        height: 1080
        annotations:
          - number: 1
            x: "14%"
            y: "37%"
            label: "Topic rule action"
            arrow: "right"

      - id: dynamodb-items
        filename: step-3-dynamodb-items.png
        alt: "DynamoDB console showing recent sensor reading items with zone and occupancy data"
        caption: "Check the DynamoDB table Items tab to verify sensor data is being stored"
        width: 1920
        height: 1080

      - id: lambda-monitoring
        filename: step-3-lambda-monitoring.png
        alt: "Lambda monitoring tab showing invocation count and duration metrics"
        caption: "Lambda Monitor tab confirms the processor function runs every minute"
        width: 1920
        height: 1080

  - step: 4
    title: "Explore Trends & ROI"
    screenshots:
      - id: occupancy-patterns
        filename: step-4-occupancy-patterns.png
        alt: "CloudWatch dashboard showing peak hours at 85% and off-peak at 60% occupancy"
        caption: "24-hour patterns reveal peak (8-10am, 12-2pm, 5-7pm) and off-peak periods"
        width: 1920
        height: 1080

      - id: roi-calculator
        filename: step-4-roi-calculator.png
        alt: "Interactive ROI calculator showing 178:1 return on investment for IoT car park"
        caption: "ROI calculator demonstrates the business case for IoT sensor deployment"
        width: 1920
        height: 1080

# Explore section screenshots (Epic 9 content)
explore:
  architecture:
    - id: architecture-overview
      filename: explore-architecture-overview.png
      alt: "Architecture diagram showing IoT Core, Lambda, DynamoDB, and CloudWatch dashboard"
      caption: "How Smart Car Park processes sensor data in real-time"
      width: 1920
      height: 1080

    - id: iot-rules
      filename: explore-iot-rules.png
      alt: "IoT Core rule configuration routing sensor batch data to Lambda"
      caption: "IoT Rules Engine routes batch messages for processing and storage"
      width: 1920
      height: 1080

    - id: dynamodb-table
      filename: explore-dynamodb-table.png
      alt: "Amazon DynamoDB table showing parking sensor readings"
      caption: "DynamoDB stores sensor data with automatic TTL expiry"
      width: 1920
      height: 1080

  experiments:
    - id: new-sensors
      filename: explore-new-sensors.png
      alt: "Adding a new simulated sensor to the IoT fleet"
      caption: "Add new parking sensors to expand coverage"
      width: 1920
      height: 1080

    - id: rule-modification
      filename: explore-rule-modification.png
      alt: "Editing an IoT rule to add an alerting action"
      caption: "Modify routing rules to add alerts when car parks fill up"
      width: 1920
      height: 1080

  limits:
    - id: scale-testing
      filename: explore-scale-testing.png
      alt: "Load testing simulation with high-frequency sensor events"
      caption: "Test how the system handles high message volumes"
      width: 1920
      height: 1080

  production:
    - id: production-security
      filename: explore-production-security.png
      alt: "IoT security best practices including device certificates"
      caption: "Security considerations: certificates, policies, encryption"
      width: 1920
      height: 1080
