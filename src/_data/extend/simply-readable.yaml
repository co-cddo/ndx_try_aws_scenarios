        url: "https://aws.amazon.com/blogs/machine-learning/improving-inclusion-and-accessibility-through-automated-document-translation-with-an-open-source-app-using-amazon-translate/"
        external: true

  - id: "leadership"
    title: "Senior Leadership / Finance"
    description: "You're considering strategic investment in AI-powered accessibility tools."
    nextSteps:
      - title: "AWS Case Study"
        description: "Official AWS case study documenting Swindon's journey, cost savings, and outcomes."
        url: "https://aws.amazon.com/solutions/case-studies/swindon-borough-council-case-study-amazon-translate/"
        external: true
      - title: "LGA Case Study"
        description: "Local Government Association case study covering the Simply Readable Easy Read solution."
        url: "https://www.local.gov.uk/case-studies/swindon-borough-council-simply-readable-ai-easy-read-solution"
        external: true
      - title: "GOV.UK Debt Toolkit reference"
        description: "Simply Readable is referenced in the GOV.UK Public Sector Debt Management Communications Toolkit."
        url: "https://www.gov.uk/government/publications/public-sector-toolkits/debt-management-communications-toolkit-v1"
        external: true

