        description: "Join the growing network of councils using Document Translation - Edinburgh, Newport, Southampton, West Berkshire are already live."
        url: "https://socitm.net/resource-hub/case-studies/translate-machine-learning-swindon-bc/"
        external: true
      - title: "Explore commercial support"
        description: "CityTrax offers commercial support and managed hosting for councils that need hands-off deployment."
