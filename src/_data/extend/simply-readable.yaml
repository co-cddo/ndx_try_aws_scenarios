# Production considerations
productionConsiderations:
  title: "Moving to Production"
  description: "Key considerations when deploying Simply Readable for real use"
  categories:
    - name: "Security & Compliance"
      items:
        - "Review Cognito user pool settings for production authentication"
        - "Enable AWS WAF for web application firewall protection"
        - "Configure VPC with private subnets for Lambda and AppSync"
        - "Enable AWS CloudTrail for audit logging"
        - "Review IAM policies for least privilege access"
    - name: "Scalability"
      items:
        - "Configure Lambda concurrency limits based on expected usage"
        - "Monitor DynamoDB capacity and enable auto-scaling"
        - "Implement CloudFront CDN for the React web application"
        - "Consider Step Functions Express Workflows for high-throughput translation"
    - name: "Backup & Recovery"
      items:
        - "Enable DynamoDB point-in-time recovery"
        - "Configure S3 versioning for translated documents"
        - "Document and test disaster recovery procedures"
        - "Implement cross-region backup for critical data"
    - name: "Monitoring"
      items:
        - "Set up CloudWatch alarms for Lambda errors and duration"
        - "Monitor Step Functions execution failures"
        - "Configure X-Ray for end-to-end request tracing"
        - "Set up SNS notifications for critical alerts"

