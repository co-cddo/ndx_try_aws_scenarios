productionConsiderations:
  - title: "Data residency"
    description: "This NDX:Try deployment uses us-east-1 (N. Virginia). For production, any region is suitable per the UK government multi-region cloud guidance. Check Amazon Translate and Bedrock availability in your chosen region."
  - title: "Bedrock model access"
    description: "Production deployments require Amazon Bedrock model access to be enabled in the target region. Submit a model access request for Anthropic Claude via the Bedrock console."
  - title: "Custom terminology"
    description: "Amazon Translate supports custom terminology to ensure consistent translation of council-specific terms, acronyms, and names."
  - title: "Integration options"
    description: "The tool can be integrated with existing council systems via its GraphQL API, or documents can be submitted programmatically via S3."

relatedScenarios:
