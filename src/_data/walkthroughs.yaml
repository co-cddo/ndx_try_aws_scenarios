        time: "4 minutes"
      - title: "Application reviewed"
        description: "Open an application to see the full assessment workflow"
        time: "5 minutes"
      - title: "Applicants portal explored"
        description: "See the public-facing portal with maps and consultations"
        time: "4 minutes"

